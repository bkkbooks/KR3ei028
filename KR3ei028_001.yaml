body:
  text: 上卷總論類婦人九證婦人諸病本與男子無異而其有異者則惟經水胎産之屬故本門亦止列此九證曰經脈類胎孕類産育類産後類帶濁類乳病類子嗣類癥瘕類前陰類凡此九者乃其最切之病不得不另詳方論此外雜證但與男子相同者自有各門論治之法故不以男女分而資贅於此論難易諺云寧治十男子莫治一婦人此謂婦人之病不易治也何也不知婦人之病本與男子同而婦人之情則與男子異蓋以婦人幽居多郁常無所伸陰性偏拗每不可解加之慈戀愛憎嫉妒憂恚罔知義命每多怨憂或有懷不能暢遂或有病不可告人或信師巫或畏藥餌故染著堅牢根深蒂固而治之有不易耳此其情之使然也然尚有人事之難如寇宗奭引黃帝之論曰凡治病察其形氣色澤形氣相得謂之可治色澤以浮謂之易已形氣相失色夭不澤謂之難治又曰診病之道觀人勇怯骨肉皮膚能知其虛實以為診法故曰治之要極無失色脈此治之大則也今富貴之家居奧室之中處帷幔之內復有以綿帕蒙其手者既不能行望色之神又不能盡切脈之巧使脈有弗合未免多問問之覺繁必謂醫學不精往往並藥不信不知問亦非易其有善問者正非醫之善者不能也望聞問切欲於四者去其三吾恐神醫不神矣世之通患若此最多此婦人之所以不易也故凡醫家病家皆當以此為意經脈類經脈之本上古天真論曰女子二七天癸至任脈通太衝脈盛月事以時下故有子蓋天癸者言後天之陰氣陰氣足而月事通是即所謂月經也正以女體屬陰其氣應月月以三旬而一虛經以三旬而一至月月如期經常不變故謂之月經又謂之月信夫經者常也一有不調則失其常度而諸病見矣然經本陰血何臟無之惟臟腑之血皆歸衝脈而沖為五臟六腑之血海故經言太衝脈盛則月事以時下此可見衝脈為月經之本也然血氣之化由於水穀水穀盛則血氣亦盛水穀衰則血氣亦衰而水穀之海又在陽明考之痿論曰陽明者五臟六腑之海主潤宗筋宗筋主束骨而利機關也衝脈者經脈之海也主滲灌溪谷與陽明合於宗筋陰陽總宗筋之會會於氣街而陽明為之長是以男精女血皆由前陰而降此可見衝脈之血又總由陽明水穀之所化而陽明胃氣又為經脈之本也故月經之本所重在衝脈所重在胃氣所重在心脾生化之源耳其他如七情六淫飲食起居之失宜者無非皆心脾胃氣之賊何者當顧何者當去學者於此當知所從矣經脈諸臟病因女人以血為主血旺則經調而子嗣身體之盛衰無不肇端於此故治婦人之病當以經血為先而血之所主在古方書皆言心主血肝藏血脾統血故凡傷心傷脾傷肝者均能為經脈之病又曰腎為陰中之陰腎主閉藏肝為陰中之陽肝主疏泄二臟俱有相火其繫上屬於心故心火一動則相火翕然從之多致血不靜而妄行此固一説然相火動而妄行者有之由火之盛也若中氣脫陷及門戶不固而妄行者亦有之此由脾腎之虛不得盡言為火也再如氣道逆而不行者有之由肝之滯也若精血敗而不行者亦有之此由真陰之枯竭其證極多不得誤認為滯也是固心脾肝腎四臟之病而獨於肺臟多不言及不知血之行與不行無不由氣如經脈別論曰飲入於胃遊溢精氣上輸於脾脾氣散精上歸於肺通調水道下輸膀胱水精四布五經並行合於四時五行陰陽揆度以為常也此言由胃達脾由脾達肺而後傳布諸經故血脫者當益氣血滯者當調氣氣主於肺其義可知是皆諸經之當辨者如此然其微甚本末則猶有當辨者蓋其病之肇端則或由思慮或由鬱怒或以積勞或以六淫飲食多起於心肺肝脾四臟及其甚也則四臟相移必歸脾腎蓋陽分日虧則飲食日減而脾氣胃氣竭矣陰分日虧則精血日涸而衝任腎氣竭矣故豫曰陽邪之至害必歸陰五臟之傷窮必及腎此源流之必然即治療之要著故凡治經脈之病或其未甚則宜解初病而先其所因若其已劇則必計所歸而專當顧本甚至脾腎大傷泉源日涸由色淡而短少由短少而斷絶此其枯竭已甚也昧者無知由云積血而通之破之禍不旋踵矣經不調經血為水穀之精氣和調於五臟灑陳於六腑乃能入於脈也凡其源源而來生化於脾總統於心藏受於肝宣布於肺施泄於腎以灌溉一身在男子則化而為精婦人則上為乳汁下歸血海而為經脈但使精氣無損情志調和飲食得宜則陽生陰長而百脈充實又何不調之有苟不知慎則七情之傷為甚而勞倦次之又或為欲不謹強弱相陵當作凌以致衝任不守者亦復不少此外則外感內傷或醫藥誤謬但傷營氣無不有以致之凡人有衰弱多病不耐寒暑不勝勞役雖先天稟弱者常有之然以氣血方長而縱情虧損或精血未滿而早為斫喪致傷生化之源則終身受害此未病之先所當深察而調之者也若欲調其既病則惟虛實陰陽四者為要丹溪曰先期而至者血熱也後期而至者血虛也王子亨曰陽太過則先期而至陰不及則後時而來其有乍多乍少斷絶不行崩漏不止皆由陰陽盛衰所致是固不調之大略也然先期而至雖曰有火若虛而挾火則所重在虛當以養營安血為主矧亦有無火而先期者則或補中氣或固命門皆不宜過用寒涼也後期而至者本屬血虛然亦有血熱而燥瘀者不得不為清補有血逆而留滯者不得不為疏利總之調經之法但欲得其和平在詳察其脈證耳若形氣脈氣俱有餘方可用清用利然虛者極多實者極少故調經之要貴在補脾胃以資血之源養腎氣以安血之室知斯二者則盡善矣若營氣本虛而不知培養則未有不日枯而竭者不可不察也凡經行之際大忌寒涼等藥飲食亦然初虞世曰經以月至有常也其來過與不及皆謂之病若榮血虧損不能滋養百骸則發落面黃羸瘦燥熱燥氣盛則金受邪金受邪則為咳為嗽為肺癰為肺痿必矣但助胃壯氣則榮血生而經自行若果怒氣逆經閉不行當用行氣破血之劑褚氏遺書精血篇曰男子精未通而御女以通其精則五體有不滿之處異日有難狀之疾陰已痿而思色以降其精則精不出而內敗小便澀而為淋精已耗而復竭之則大小便牽痛愈痛則愈便愈便則愈痛女人天癸既至逾十年無男子合則不調未逾十年思男子合亦不調不調則舊血不去新血誤行或潰而入骨或變而為腫後雖合而難子合多則瀝枯虛人産衆則血枯殺人觀其精血思過半矣産寶方序論曰婦人以血為基本苟能謹於調護則血氣宣行其神自清月水如期血凝成孕若脾胃虛弱不能飲食營衛不足月經不行肌膚黃燥面無光澤寒熱腹痛難於子息或帶下崩漏血不流行則成瘕證薛立齋曰經云二陽之病發心脾有不得隱曲為女子不月故心脾平和則百骸五臟皆潤澤而經候如常苟或心脾受傷則血無所養亦無所統而月經不調矣是故調經者當理心脾為主丹溪先生亦曰先期而至者血熱也後期而至者血虛也竊謂先期而至者有因脾經血燥有因脾經鬱火有因肝經怒火有因血分有熱有因勞役動火過期而至者有因脾經血虛有因肝經血虛有因氣虛血弱主治之法脾經血燥者加味逍遙散脾經鬱滯者歸脾湯肝經怒火者加味小柴胡湯血分有熱者加味四物湯勞役動血者補中益氣湯其過期而至者若脾經血虛宜人參養營湯肝經血少宜六味地黃丸氣虛血弱宜八珍湯蓋血生於脾故云脾統血凡血病當用辛甘之劑以助其陽氣以生陰血俱屬不足也大凡肝脾血燥四物湯為主肝脾血弱補中益氣湯為主肝脾鬱結歸脾湯為主肝經怒火加味逍遙散為主薛氏加味逍遙散見古方八陳補陳治肝脾血虛發熱小水不利當歸芍藥白朮茯神甘草柴胡各等分丹皮梔子各七分右加薑水煎服歸脾湯見古方八陳補陳治思慮傷脾不能攝血致血妄行或健忘怔忡驚悸盜汗嗜臥少食或大便不調心脾疼痛瘧痢鬱結或因病用藥失宜克伐傷脾以致變證者最宜用之人參黃耆白朮茯苓棗仁各二錢遠志當歸各一錢木香炙甘草各五分水二鍾加圓眼肉七枚煎七分食遠即食後隔一段時間服愚意此湯之用木香特因鬱結疼痛者設如無痛郁等證必須除去木香以避香燥豈不於氣虛血動者為尤善乎又遠志味辛氣升而散凡多汗而躁熱者亦宜酌用薛氏加味小柴胡湯見古方八陳散陳亦名柴胡梔子散治乳母肝火發熱致兒為患及風熱生痰等證柴胡二三錢半夏黃芩各一二錢人參二三錢甘草五七分丹皮二錢梔子二錢上加薑棗水煎服薛氏加味四物湯見古方八陳補陳熟地黃當歸各三錢川芎一錢芍藥二錢山梔二錢柴胡二錢丹皮二錢水二鍾煎服東垣補中益氣湯見古方八陳補陳治勞倦傷脾中氣不足清陽不升外感不解體倦食少寒熱瘧痢氣虛不能攝血等證人參黃耆炒白朮炒甘草炙各錢半當歸一錢陳皮五分升麻柴胡各三分上加薑棗水煎空心午前服局方人參養營湯見古方八陳補陳治脾肺俱虛惡寒發熱肢體瘦倦食少作瀉口乾心悸自汗等證人參黃耆當歸白朮炙甘草桂心陳皮各一錢熟地五味茯苓各七分白芍錢半遠志五分加薑棗水煎服金匱六味地黃丸見古方八陳補陳即金匱腎氣丸亦名地黃丸治腎水虧損小便淋閉頭目眩暈腰腿痠軟陰虛發熱自汗盜汗憔悴瘦弱精神疲困失血失音水泛為痰病為腫脹壯水制火之劑也熟地黃八兩蒸搗山茱萸山藥炒各四兩丹皮澤瀉白茯苓各三兩上為細末和地黃膏加煉蜜為丸桐子大每服七八十丸空心食前滾白湯或淡鹽湯任下此方用水煎湯即名六味地黃湯六味地黃丸並非金匱腎氣丸而是宋代錢乙以金匱腎氣丸為溫補腎陽之劑而於小兒應滋養腎陰故於腎氣丸去附桂創制六味地黃丸以補益腎陰景嶽以六味地黃丸出自金匱實誤今正之局方八珍湯見古方八陳補陳治氣血兩虛調和陰陽人參白朮茯苓各二錢炙甘草一錢熟地黃當歸各三錢川芎一錢芍藥二錢加薑棗水煎服或加粳米百粒局方四物湯見古方八陳補陳治血虛營弱一切血病當以此為主熟地黃當歸各三錢川芎一錢芍藥二錢水二鍾煎服又曰胃者衛之源脾者榮之本榮出中焦衛出上焦衛不足益之必以辛榮不足補之必以甘甘辛相合脾胃健而榮衛生是以氣血俱旺也或因勞心虛火妄動月經錯行宜安心補血瀉火此東垣先生治法也又曰人之少有老態不耐寒暑不勝勞役四時迭病皆因氣血方長而勞心虧損或精血未滿而早年斫喪故其見證難以名狀若左尺脈虛弱或細數是左腎之真陰不足也用六味丸右尺脈遲軟或沉細而數欲絶是命門之相火不足也用八味丸至於兩尺微弱是陰陽俱虛用十補丸此皆滋其化源也不可輕用黃柏知母之類設或六淫外侵而見證亦因其氣內虛而外邪湊集耳尤當用前藥六味丸即六味地黃丸見上段崔氏八味丸見古方八陳補陳治命門火衰不能生土以致脾胃虛寒飲食少思大便不實或下元冷憊臍腹疼痛等證熟地黃八兩蒸搗山茱萸山藥炒各四兩丹皮澤瀉白茯苓各三兩肉桂製附子各一兩用法同六味丸十補丸見古方八陳熱陳治腎臟虛冷面黑足寒耳聾膝軟小便不利等證附子炮五味各二兩山藥山茱萸丹皮桂心鹿茸制茯苓澤瀉各一兩熟地二兩古方八陳熱陳中本方無熟地今據證治準繩補入合成十味藥符合十補之名調經論外備用方集驗加味八珍湯見婦人規古方補血調經治婦人思慮過傷飲食日減氣血兩虛月經不調夜夢交感或出盜汗寢成勞損人參白朮茯苓當歸生地各一錢炙甘草川芎芍藥軟柴胡黃耆各五分香附制丹皮各八分水鍾半大棗一枚煎七分食前服集驗調衛養榮湯見婦人規古方退熱調經治婦人室女一切月經不調或先或後或絶閉不通憎寒壯熱口苦無味咳嗽躁煩頭眩漸成勞證者當歸生地麥冬沙參陳皮白朮各一錢牡丹皮地骨皮各八分柴胡梢桔梗各五分穀芽一錢甘草四分上加蓮子薑棗水煎服痰中見血加側柏葉煩躁口乾加炒山梔倍麥門冬脅下脹疼加青皮川芎胸膈滿悶加黃連薑炒枳實去麥冬地骨皮夜出盜汗加黃連黃耆去柴胡桔梗大便祕結加桃仁倍當歸咳嗽不已加栝蔞仁阿膠小水不利加木通茯苓金匱膠艾湯見婦人規古方治勞傷血氣沖任虧損月水過多淋瀝不止阿膠炒川芎炙甘草各一兩艾葉當歸各兩半白芍熟地各二兩上㕮咀每服五錢水煎服一方加地榆黃耆即名安胎散良方當歸散見婦人規古方治經水妄行不止及産後氣血虛弱惡露內停憎寒發熱宜服此去之當歸酒洗川芎白芍炒白朮炒黃芩炒各半兩山茱萸肉一兩半上為末每服二錢酒調日三服一方無山茱萸氣虛者去芩加桂心一兩四物二連湯見婦人規古方治婦人血虛發熱或口舌生瘡或晝安夜熱當歸川芎芍藥熟地胡黃連川黃連各一錢上作一劑水煎服滑氏補肝散見婦人規古方治肝腎二經氣血虧損脅脹作痛或脅脹頭暈寒熱發熱或遍身作痛經候不調熟地白朮炒各一兩棗仁炒獨活各四兩當歸川芎黃耆炒山藥五味子炒杵山茱萸肉木瓜各半兩上㕮咀每服五錢棗水煎服良方益陰腎氣丸見古方八陳補陳治陰虛潮熱盜汗煩熱作渴筋骨疼痛月經不調等證即前六味丸加當歸生地各四兩五味子二兩良方丹參散見婦人規古方良方云丹參一味其治頗類四物湯能破宿血補新血安生胎落死胎止崩中帶下調經下産後惡血兼治冷熱勞腰脊痛骨節煩疼丹參酒洗去土晾乾切上為細末每服二錢溫酒調下經脈不調食前服冷熱勞不拘時服琥珀散見婦人規古方治心膈迷悶肚腹撮痛月信不通等疾烏藥二兩當歸酒洗蓬朮醋製各一兩上為末每服二錢溫酒調服白芷散見婦人規古方固經治下元虛弱赤白帶下或經行不止等證白芷一兩海螵蛸二枚燒胎髮一團煅上為末每服二錢溫酒調下良方黃龍湯見婦人規古方治妊娠寒熱頭疼默默不食脅痛嘔痰及産後經後外感風寒熱入胞宮寒熱如瘧等證按此即小柴胡湯之去半夏也柴胡二錢黃芩炒人參甘草各一錢上用水煎服良方人參湯見婦人規古方補虛調經治産後諸虛不足發熱盜汗內熱晡熱等證此即參歸湯亦名團參散人參當歸等分上為末先以豬腰子一枚切片糯米半合蔥白二莖入水二鍾煎汁八分再入藥三錢煎服十全大補湯見古方八陳補陳溫補氣血治氣血俱虛惡寒發熱自汗盜汗肢體困倦眩暈驚悸晡熱作渴遺精白濁二便見血小便短少便泄閉結喘咳下墜等證即前八珍湯加黃耆肉桂各一錢六物煎見新方八陳因陳治男婦氣血俱虛等證炙甘草當歸熟地或用生地川芎三四分不宜多芍藥俱隨宜加減人參或有或無隨虛實用之氣不虛者不必用上咀用水煎服如脾氣稍滯者宜加陳皮山楂如胃氣虛寒多嘔者加乾薑炒用或加丁香如腹痛兼滯者加木香陳皮血熱經早凡血熱者多有先期而至然必察其陰氣之虛實若形色多赤或紫而濃或去多其脈洪滑其臟氣飲食喜冷畏熱皆火之類也治血熱有火者宜清化飲主之若火之甚者如抽薪飲之類亦可暫用但不可以假火作真火以虛火作實火也清化飲見新方八陳因陳治婦人産後因火發熱及血熱妄行陰虧諸火不清等證芍藥麥冬各二錢丹皮茯苓黃芩生地各二三錢石斛一錢水一鍾半煎七分食遠溫服如覺骨蒸多汗者加地骨皮一錢半熱甚而渴或頭痛者加石膏一二三錢下熱便澀者加木通一二錢或黃柏梔子皆可隨證用之如兼外邪發熱加柴胡一二錢抽薪飲見新方八陳寒陳治諸凡火熾盛而不宜補者黃芩石斛木通梔子炒黃柏各一二錢枳殼錢半澤瀉錢半細甘草三分水一鍾半煎七分食遠溫服內熱甚者冷服更佳如熱在經絡肌膚者加連翹天花粉以解之熱在血分大小腸者加槐蕊黃連以清之熱在陽明頭面或躁煩便實者加生石膏以降之熱在下焦小水痛澀者加龍膽草車前以利之熱在陰分津液不足者加門冬生地芍藥之類以滋之熱在腸胃實結者加大黃芒硝以通之按上為原方份量臨床時可隨證適當增加以免病重藥輕收不到預期的療效其餘各方均按此例不分別注釋大都熱則善流而懋期不止者如續斷地榆丹參茜根梔子之屬皆可用若微火陰虛而經多早者治宜滋陰清火用保陰煎之類主之保陰煎見新方八陳寒陳治男婦帶濁遺淋色赤帶血脈滑多熱便血不止及血崩血淋或經期太早凡一切陰虛內熱動血等證生地熟地芍藥各二錢山藥川續斷黃芩黃柏各一錢半生甘草一錢水二鍾煎七分食遠溫服如小水多熱或兼怒火動血者加焦梔子一二錢如夜熱身熱加地骨皮一錢五分如肺熱多汗者加麥冬棗仁如血熱甚者加黃連一錢五分如血虛血滯筋骨腫痛者加當歸二三錢如氣滯而痛去熟地加陳皮青皮丹皮香附之屬如血脫血滑及便血久不止者加地榆一二錢或烏梅一二個或百藥煎一二錢文蛤亦可如少年或血氣正盛者不必用熟地山藥如肢節筋骨疼痛或腫者加秦艽丹皮各一二錢所謂經早者當以每月大概論所謂血熱者當以通身藏象論勿以素多不調而偶見先期者為早勿以脈證無火而單以經早者為熱若脈證無火而經早不及期者乃其心脾氣虛不能固攝而然宜大營煎大補元煎或五福飲加杜仲五味子之類主之此輩極多若作火治必誤之矣若一月二三至或半月或旬日而至者此血氣敗亂之證當因其寒熱而調治之不得以經早者並論大營煎見新方八陳補陳治真陰精血虧損及婦人經遲血少腰膝筋骨疼痛或氣血虛寒心腹疼痛等證當歸二三錢或五錢熟地三五七錢枸杞二錢炙甘草一二錢杜仲二錢牛膝一錢半肉桂一二錢水二鍾煎七分食遠溫服如寒滯在經氣血不能流通筋骨疼痛之甚者必加製附子一二錢方效如帶濁腹痛者加故紙一錢炒用如氣虛者加人參白朮中氣虛寒嘔惡者加炒焦乾薑一二錢大補元煎見新方八陳補陳治男婦氣血大壞精神失守危劇等證此回天贊化救本培元第一要方人參補氣補陽以此為主少則用一二錢多則用一二兩山藥炒二錢熟地補精補陰以此為主少則用二三錢多則用二三兩杜仲二錢當歸二三錢若泄瀉者去之山茱萸一錢如畏酸吞酸者去之枸杞二三錢炙甘草一二錢水二鍾煎七分食遠溫服如元陽不足多寒者於本方加附子肉桂炮薑之類隨宜用之如氣分偏虛者加黃耆白朮如胃口多滯者不必用如血滯者加川芎去山茱萸如滑泄者加五味故紙之屬五福飲見新方八陳補陳凡五臟氣血虧損者此能兼治之足稱王道之最人參隨宜心熟地隨宜腎當歸二三錢肝白朮炒一錢半肺炙甘草一錢脾水二鍾煎七分食遠溫服或加生薑三五片凡治氣血俱虛等證以此為主或宜溫者加薑附宜散者加升麻柴葛左右逢源無不可也血熱論外方良方續斷湯見婦人規古方治妊娠下血尿血當歸生地黃各一兩續斷赤芍藥各半兩上為末每服二錢空心用蔥白煎湯調下四物二連湯見調經論外備用方二黃散見婦人規古方治胎漏下血或內熱虛熱或頭痛頭暈或煩躁作渴或脅肋脹痛等證生地熟地上為末每服三錢煎白朮枳殼湯下一母丸見婦人規古方一名知母丸治妊娠血熱頓僕胎動不安或欲墮産知母炒為末上搗棗肉為丸彈子大每服一丸人參湯嚼送或丸桐子大每服三四十丸白湯下或嚼咽之良方當歸散見經論外備用方延年益嗣丹見婦人規古方滋補元氣益精黑髮按此方即還元丹也但製法分量不同宜參酌用之人參天門冬酒浸去心麥門冬同上各三兩熟地黃酒蒸搗生地黃各二兩白茯苓酒浸曬乾地骨皮酒浸各五兩何首烏鮮者半斤上將何首烏去皮切片如干者用米泔水浸軟拈切外用砂鍋入黑羊肉一斤黑豆三合量著水上用甑箅箅上放首烏煮而蒸之以肉爛為度鍋蓋須密勿令泄氣取起曬乾為末煉蜜丸梧子大每服七八十丸空心溫酒送下奇效四物湯見婦人規古方治肝經虛熱血沸騰而崩久不止當歸酒拌熟地白芍川芎阿膠炒艾葉炒黃芩上每服四錢水煎子芩散見婦人規古方一名黃芩散治壯熱崩中下血是陽乘陰分故經血泛溢宜清其北方條黃芩不拘多少為細末上燒稱錘淬酒食前調下三四錢一方有乾薑白芷一方以木耳黃芩等分為丸俱效血熱經遲血熱者經期常早此營血流利及未甚虧者多有之其有陰火內爍血本熱而亦每過期者此水虧血少燥澀而然治宜清火滋陰以加味四物湯加減一陰煎滋陰八味丸之類主之加味四物湯見經不調加減一陰煎見新方八陳補陳此治水虧火勝之劑凡腎水真陰虛損而脈證多陽虛火發熱及陰虛動血等證或瘧疾傷寒屢散之後取汗既多脈虛氣弱而煩渴不止潮熱不退者此以汗多傷陰水虧而然也皆宜用此湯加減主之生地芍藥麥冬各二錢熟地三五錢炙甘草五七分知母地骨皮各一錢水二鍾煎服如煩躁熱甚便結者加石膏二三錢如小水熱澀者加梔子一二錢如火浮於上者加澤瀉一二錢或黃芩一錢如血燥血少者加當歸一二錢滋陰八味丸見新方八陳寒陳治陰虛火盛下焦濕熱等證此方變丸為湯即名滋陰八味煎山藥四兩丹皮三兩白茯苓三兩山茱萸肉四兩澤瀉三兩黃柏鹽水炒三兩熟地黃八兩蒸搗知母鹽水炒三兩上加煉蜜搗丸梧桐子大或空心或午前用滾白湯或淡鹽湯送下百餘丸血寒經遲凡血寒者經必後期而至然血何以寒亦惟陽氣不足則寒從內生而生化失期是即所謂寒也至若陰寒由外而入生冷由內而傷或至血逆或為疼痛是又寒滯之證非血寒經遲之謂也當詳辨也凡陽氣不足血寒經遲者色多不鮮或色見沉黑或澀滯而少其脈或微或細或沉遲弦澀其臟色形氣必惡寒喜暖凡此者皆無火之證治宜溫養血氣以大營煎理陰煎之類加減主之大約寒則多滯宜加薑桂吳茱萸蓽茇之類甚者須加附子大營煎見血熱經早理陰煎見新方八陳熱陳此理中湯之變方也凡脾腎中虛等證宜剛燥者當用理中六君之類宜溫潤者當用理陰大營之類欲知調補當先察此此方通治真陰虛弱脹滿嘔噦痰飲噁心吐瀉腹痛婦人經遲血滯等證又凡真陰不足或素多勞倦之輩因而忽感寒邪不能疏解或發熱或頭身疼痛或面赤舌焦或雖渴而不喜冷飲或背心肢體畏寒但脈見無力者悉是假熱之證若用寒涼攻之必死宜速用此湯照後加減以溫補陰分托散表邪連進數服使陰氣漸充則汗從陰達而寒邪不攻自散此最切於時用者也神效不可盡述熟地三五七錢或一二兩當歸二三錢或五七錢炙甘草一二錢乾薑炒黃色一二三錢或加桂肉一二錢水二鍾煎七八分熱服此方加附子即名附子理陰煎再加人參即名六味回陽飲治命門火衰陰中無陽等證若風寒外感邪未入深但見發熱身痛脈數不洪凡內無火證素稟不足者但用此湯加柴胡一錢半或二錢連進一二服其效如神若寒凝陰盛而邪有難解者必加麻黃一二錢放心用之或不用柴胡亦可恐其清利也此寒邪初感溫散第一方惟仲景獨知此義但仲景之溫散首用麻黃桂枝二湯余之溫散即以理陰煎及大溫中飲為增減此雖一從陽分一從陰分其迹若異然一逐於外一托於內而用溫則一也學者當因所宜酌而用之若陰勝之時外感寒邪脈細惡寒或背惡寒者乃太陽少陰證也加細辛一二錢甚者再加附子一二錢真神劑也或並加柴胡以助之亦可若陰虛火盛其有內熱不宜用溫而氣血俱虛邪不能解者宜去薑桂單以三味加減與之或只加人參亦可若脾腎兩虛水泛為痰或嘔或脹者於前方加茯苓一錢半或加白芥子五分以行之若泄瀉不止及腎泄者少用當歸或並去之加山藥扁豆吳茱萸破故紙肉豆蔻附子之屬若腰腹有痛加杜仲枸杞若腹有脹滯疼痛加陳皮木香砂仁之屬血寒論外方五物煎見新方八陳因陳治婦人血虛凝滯蓄積不行小腹痛急産難經滯及痘瘡血虛寒滯等證神效此即四物湯加肉桂也當歸三五七錢熟地三四錢芍藥二錢酒炒川芎一錢肉桂一二三錢水一鍾半煎服兼胃寒或嘔惡者加乾薑炮用水道不利加澤瀉或豬苓氣滯者加香附或丁香木香砂仁烏藥陰虛疝痛者加小茴香血瘀不行臍下如覆杯漸成積塊者加桃仁或酒炒紅花痘瘡血虛寒勝寒邪在表者加細辛麻黃柴胡紫蘇之屬祕方烏雞煎丸見婦人規古方治婦人百病血氣虛勞赤白帶下人參官桂地骨皮各二兩茯苓三兩黃耆蜜炙當歸各六兩生地熟地香附各四兩上將烏骨白雞一隻男用雌女用雄籠住將黃耆末和炒麵丸如芡實餵雞二七日將雞縛死干撏去毛並腸雜令淨捶碎其骨入前藥於腹內縫密用酒醋各一瓶煮一宿取去骨焙乾為末用前汁打麵糊丸桐子大每服五六十丸空心鹽湯下增損四物湯見婦人規古方治脾虛不攝血去不止人參當歸芍藥炒川芎乾薑炒各一兩甘草炙四錢上每服四錢水煎服四神散見婦人規古方治産後血虛或瘀血腹痛當歸川芎芍藥炒各一錢炮薑五分上水煎服血虛經亂凡女人血虛者或遲或早經多不調此當察臟氣審陰陽詳參形證脈色辨而治之庶無誤也蓋血虛之候或色淡或澀少或過期不至或行後反痛痛則喜暖喜按或經後則困憊難支腰膝如折或脈息則微弱弦澀或飲食素少或形色薄弱凡經有不調而值此不足之證皆不可妄行克削及寒涼等劑再傷脾腎以伐生氣則惟有日甚矣凡肝脾血虛微滯微痛者宜四物湯主之或加肉桂或加黃芩隨寒熱而用之自無不可四物湯見經不調三陰虧弱無熱無寒平臟者宜小營煎五福飲六物煎之類主之此常人最宜之劑或八珍湯十全大補湯之類皆宜擇用三陰虧弱兼陽虛宜大營煎理陰煎之類主之小營煎見新方八陳補陳治血少陰虛此性味平和之方也當歸二錢熟地二三錢芍藥炒酒二錢山藥炒二錢枸杞二錢炙甘草一錢水二鍾煎七分食遠溫服如營虛於上而為驚恐怔忡不眠多汗者加棗仁茯神各二錢如營虛兼寒者去芍藥加生薑如氣滯有痛者加香附一二錢引而行之五福飲見血熱經早六物煎見調經論外備用方八珍湯見經不調十全大補湯見調經論外備用方大營煎見血熱經早理陰煎見血寒經遲憂思過度心脾受傷者七福飲歸脾湯之類主之七福飲見新方八陳補陳治氣血俱虛而以心脾為甚者人參二錢熟地四五錢當歸二三錢白朮炒二錢棗仁二錢遠志三五分制用炙甘草一錢水二鍾煎七分食遠溫服歸脾湯見經不調脾土不健飲食減少宜燥宜溫者溫胃飲理中湯之類主之溫胃飲見新方八陳熱陳治中寒嘔吐吞酸泄瀉不思飲食及婦人臟寒嘔惡胎氣不安等證人參一二三錢或一兩白朮炒一二錢或一兩扁豆二錢炒陳皮一錢或不用乾薑炒焦一二三錢炙甘草一錢當歸一二錢滑泄者勿用水二鍾煎七分食遠溫服如下寒帶濁者加破故紙一錢如氣滯或兼胸腹痛者加藿香丁香木香白豆蔻砂仁白芥子之屬如兼外邪及肝腎之病者加桂枝肉桂甚者加柴胡如脾氣陷而身熱者加升麻五七分如水泛為痰而胸腹痞滿者加茯苓一二錢如脾胃虛極大嘔大吐不能止者倍用參朮仍加胡椒二三分許煎熟徐徐服之仲景理中丸見古方八陳熱陳即名人參理中湯治太陰即病自利不渴陰寒腹痛短氣咳嗽霍亂嘔吐飲食難化胸膈噎塞或瘧疾瘴氣瘟疫中氣虛損久不能愈或中虛生痰等證人參白朮炒乾薑炒炙甘草各三兩上四味搗篩為末蜜丸雞子黃大以沸湯數合和一丸研碎溫服之日三四夜二服腹中未熱益至三四丸然不及湯湯法以四物依數切用水八升煮取三升去渣溫服一升日三服賓景嶽按上方兩數乃漢時權度今後世所用惟每味數錢而甘草半之酌宜可也脾土虛陷不能統攝營氣而為漏為頻者宜五福飲歸脾湯壽脾煎祕元煎或四君子加芎歸主之五福飲見血熱經早歸脾湯見經不調壽脾煎見新方八陳熱陳一名攝脾煎治脾虛不能攝血等證凡憂思鬱怒積勞及誤用攻伐等藥犯損脾陰以致中氣虧陷神魂不寧大便脫血不止或婦人無火崩淋等證凡兼嘔惡尤為危候速宜用此單救脾氣則統攝固而血自歸源此歸脾湯之變方其效如神若犯此證而再用寒涼則胃氣必脫無不即斃者白朮二三錢當歸二錢山藥二錢炙甘草一錢棗仁錢半遠志制三五分乾薑炮一二三錢蓮肉去心炒二十粒人參隨宜一二錢急者用一兩水二鍾煎服如血未止加烏梅二個凡畏酸者不可用或加地榆一錢半亦可滑脫不禁者加醋炒文蛤一錢下焦虛滑不禁加鹿角霜二錢為末攪入藥中服之氣虛甚者加炙黃耆二三錢氣陷而墜者加炒升麻五七分或白芷亦可兼溏泄者加補骨脂一錢炒用陽虛畏寒者加製附子一至三錢去血過多陰虛氣餒心跳不寧者加熟地七八錢或一二兩祕元煎見新方八陳固陳治遺精帶濁等病此方專主心脾遠志八分炒山藥二錢炒芡實二錢炒棗仁炒搗碎二錢白朮炒茯苓各錢半炙甘草一錢人參一二錢五味十四粒畏酸者去之金櫻子去核二錢水二鍾煎七分食遠服此治久遺無火不痛而滑者乃可用之如尚有火覺熱者加苦參一二錢如氣大虛者加黃耆一二三錢四君子湯見古方八陳補陳治脾胃虛弱飲食少思或大便不實體瘦面黃或胸膈虛痞吞酸痰嗽或脾胃虛弱善患瘧痢等證人參白朮茯苓各二錢炙甘草一錢加薑棗水煎服或加粳米百粒肝虛不能藏血或多驚惕或多小腹急痛宜三陰煎補肝散之類主之三陰煎見新方八陳補陳此治肝脾虛損精血不足及營虛失血等病故曰三陰凡中風血不養筋及瘧疾汗多邪散而寒熱猶不能止是皆少陽厥陰陰虛少血之病無火者宜此主之當歸二三錢熟地三五錢炙甘草一錢芍藥酒炒二錢棗仁二錢人參隨宜水二鍾煎七分食遠服如嘔惡者加生薑三五片汗多煩躁者加五味子十四粒汗多氣虛者加黃耆一二錢小腹隱痛加枸杞二三錢如有脹悶加陳皮一錢如腰膝筋骨無力加杜仲牛膝補肝散見調經論外備用方若陰血虛水不制火而邪火盛者或為夜熱盜汗或為煩渴生痰是即勞損之漸速宜調治用一二三四五陰等煎擇宜治之否則恐成血枯也一陰煎見新方八陳補陳此治水虧火勝之劑故曰一陰凡腎水真陰虛損而脈證多陽虛火發熱及陰虛動血等證或瘧疾傷寒屢散之後取汗既多脈虛氣弱而煩渴不止潮熱不退者此以汗多傷陰水虧而然也皆宜用此加減主之生地二錢熟地三五錢芍藥二錢麥冬二錢甘草一錢牛膝一錢半丹參二錢水二鍾煎七分食遠溫服如火盛躁煩者入真龜膠二三錢化服如氣虛者間用人參一二錢如心虛不眠多汗者加棗仁當歸各一二錢如汗多煩躁者加五味子十粒或加山藥山茱萸如見微火者加女貞子一二錢如虛火上浮或吐血或衄血不止者加澤瀉一二錢茜根二錢或加川續斷一二錢以澀之亦妙二陰煎見新方八陳補陳此治心經有熱水不制火之病故曰二陰凡驚狂失志多言多笑或瘍疹煩熱失血等證宜此主之生地二三錢麥冬二三錢棗仁二錢生甘草一錢玄參一錢半黃連或一二錢茯苓一錢半木通一錢半水二鍾加燈草二十根或竹葉亦可煎七分食遠服如痰勝熱甚者加九制膽星一錢或天花粉一錢五分三陰煎見上段四陰煎見新方八陳補陳此保肺清金之劑故曰四陰治陰虛勞損相火熾盛津枯煩渴咳嗽吐衄多熱等證生地二三錢麥冬二錢白芍藥二錢百合二錢沙參二錢生甘草一錢茯苓一錢半水二鍾煎七分食遠服如夜熱盜汗加地骨皮一二錢如痰多氣盛加貝母二三錢阿膠一二錢天花粉亦可如金水不能相滋而乾燥喘嗽者加熟地三五錢如多汗不眠神魂不寧加棗仁二錢如多汗兼渴加北五味十四粒如熱甚者加黃柏一二錢鹽水炒用或玄參亦可但分上下用之如血燥經遲枯澀不至者加牛膝二錢如血熱吐衄加茜根二錢如多火便燥或肺乾咳咯者加天門冬二錢或加童便亦可如火載血上者去甘草加炒梔子一二錢五陰煎見新方八陳補陳凡真陰虧損脾虛失血等證或見溏泄未甚者所重在脾故曰五陰忌用潤滑宜此主之熟地五七錢或一兩山藥炒二錢扁豆炒二三錢炙甘草一二錢茯苓一錢半芍藥炒黃二錢五味子草粒人參隨宜用白朮炒一二錢水二鍾加蓮肉去心二十粒煎服腎虛經亂婦人因情欲房室以致經脈不調者其病皆在腎經此證最多所當辨而治之凡欲念不遂沉思積鬱心脾氣結致傷衝任之源而腎氣日消輕則或早或遲重則漸成枯閉此宜兼治心脾腎以逍遙飲祕元煎之類主之逍遙飲見新方八陳因陳治婦人思郁過度致傷心脾衝任之源血氣日枯漸至經脈不調者當歸二三錢芍藥錢半熟地三五錢棗仁二錢炒茯神錢半遠志制三五分陳皮八分炙甘草一錢水二鍾煎七分食遠溫服如氣虛者加人參一二錢如經水過期兼痛滯者加酒炒香附一二錢祕元煎見血虛經亂若或欲火熾盛以致真陰日潰者宜保陰煎祕元煎之類主之保陰煎見血熱經早祕元煎見血虛經亂若房室縱肆不慎者必傷衝任之流而腎氣不守治須扃固命門宜固陰煎祕元煎之類主之固陰煎見新方八陳固陳治陰虛滑泄帶濁淋遺及經水因虛不固等證此方專主肝腎人參隨宜熟地三五錢山藥炒二錢山茱萸一錢半遠志七分炒炙甘草一二錢五味十四粒菟絲子炒香二三錢水二鍾煎七分食遠溫服如虛滑遺甚者加金櫻子肉二三錢或醋炒文蛤一錢或烏梅二個如陰虛微熱而經血不固者加續斷二錢如下焦陽氣不足而兼腹痛溏泄者加補骨脂吳茱萸之類隨宜用之如肝腎血虛小腹痛而血不歸經者加當歸二三錢如脾虛多濕或兼嘔惡者加白朮一二錢如氣陷不固者加炒升麻一錢如兼心虛不眠或多汗者加棗仁二錢炒用祕元煎見血虛經亂若左腎真陰不足而經脈不調者宜左歸飲左歸丸六味地黃丸之類主之左歸飲見新方八陳補陳此壯水之劑也凡命門之陰衰陽勝者宜此方加減主之此一陰煎四陰煎之主方也熟地二三錢或加至一二兩山藥二錢枸杞二錢炙甘草一錢茯苓一錢半山茱萸一二錢畏酸者少用之水二鍾煎七分食遠服如肺熱而煩者加麥冬二錢血滯者加丹皮二錢心熱而躁者加玄參二錢脾熱易飢者加芍藥二錢腎熱骨蒸多汗者加地骨皮二錢血熱妄動者加生地二三錢陰虛不寧者加女貞子二錢上實下虛者加牛膝二錢以導之血虛而燥滯者加當歸二錢左歸丸見新方八陳補陳治真陰腎水不足不能滋養營衛漸至衰弱或虛熱往來自汗盜汗或神不守舍血不歸源或虛損傷陰或遺淋不禁或氣虛昏運或眼花耳聾或口燥舌乾或腰痠腿軟凡精髓內虧津液枯涸等證俱速宜壯水之主以培左腎之元陰而精血自充矣宜此方主之大懷熟地八兩山藥炒四兩枸杞四兩山茱萸肉四兩川牛膝酒洗蒸熟三兩精滑者不用菟絲子制四兩鹿膠敲碎炒珠四兩龜膠切碎炒珠四兩無火者不必用上先將熟地蒸爛杵膏加煉蜜丸桐子大每食前用滾湯或淡鹽湯送下百餘丸如真陰失守虛火炎上者宜用純陰至靜之劑於本方去枸杞鹿膠加女貞子三兩麥冬三兩如火爍肺金乾枯多嗽者加百合三兩如夜熱骨蒸加地骨皮三兩如小水不利不清加茯苓三兩如大便燥結去菟絲加肉蓯蓉三兩如氣虛者加人參三四兩如血虛微滯加當歸四兩如腰膝痠痛加杜仲三兩鹽水炒用如臟平無火而腎氣不充者加破故紙三兩去心蓮肉胡桃肉各四兩龜膠不必用凡五液皆主於腎故凡屬陰分之藥無不皆能走腎有謂必須導引者皆見之不明耳六味地黃丸見經不調若右腎真陽不足而經有不調者宜右歸飲右歸丸八味地黃丸之類主之右歸飲見新方八陳補陳此益火之劑也凡命門之陽衰陰勝者宜此方加減主之此方與大補元煎出入互用如治陰盛格陽真寒假熱等證宜加澤瀉二錢煎成用涼水浸冷服之尤妙熟地二三錢或加至一二兩山藥炒二錢山茱萸一錢枸杞二錢甘草炙一二錢杜仲薑製二錢肉桂一二錢製附子一二三錢水二鍾煎七分食遠溫服如氣虛血脫或厥或昏或汗或運同暈或虛狂或短氣者必大加人參白朮隨宜用之如火衰不能生土為嘔噦吞酸者加炮薑二三錢如陽衰中寒泄瀉腹痛加人參肉豆蔻隨宜用之如小腹多痛者加吳茱萸五七分如淋帶不止加破故紙一錢如血少血滯腰膝軟痛者加當歸二三錢右歸丸見新方八陳補陳治元陽不足或先天稟衰或勞傷過度以致命門火衰不能生土而為脾胃虛寒飲食少進或嘔惡膨脹或翻胃噎膈或怯寒畏冷或臍腹多痛或大便不實瀉痢頻作或小水自遺虛淋寒疝或寒侵溪谷而肢節痹痛或寒在下焦而水邪浮腫總之真陽不足者必神疲氣怯或心跳不寧或四體不收或眼見邪祟或陽衰無子等證俱速宜益火之源以培右腎之元陽而神氣自強矣此方主之大懷熟地八兩山藥炒四兩山茱萸微炒三兩枸杞微炒四兩鹿角膠炒珠四兩菟絲子制四兩杜仲薑湯炒四兩當歸三兩便溏勿用肉桂二兩漸可加至四兩製附子自二兩漸可加至五六兩上先將熟地蒸爛搗膏加煉蜜丸如彈子大每嚼服二三丸以滾白湯剛開的開水送下其效尤速如陽衰氣虛必加人參以為之主或二三兩或五六兩隨人虛實以為增減蓋人參之功隨陽藥則入陽分隨陰藥則入陰分欲補命門之陽非加人參不能捷效如陽虛精滑或帶濁便溏加補骨脂酒炒三兩如飧泄腎泄不止加北五味子三兩肉豆蔻三兩麵炒去油用如飲食減少或不易化或嘔惡吞酸皆脾胃虛寒之證加乾薑三四兩炒黃用如腹痛不止加吳茱萸二兩湯泡半日炒用如腰膝痠痛加胡桃肉連皮四兩如陰虛陽痿加巴戟肉四兩肉蓯蓉三兩或加黃狗外腎一二副以酒煮爛搗入之八味地黃丸即八味丸見經不調若思郁不解致病者非得情舒願遂多難取效房室不慎致病者使非勇於節欲亦難全恃藥餌也經期腹痛經行腹痛證有虛實實者或因寒滯或因血滯或因氣滯或因熱滯虛者有因血虛有因氣虛然實痛者多痛於未行之前經通而痛自減虛痛者於既行之後血去而痛未止或血去而痛益甚大都可按可揉者為虛拒按拒揉者為實有滯無滯於此可察但實中有虛虛中亦有實此當於形氣稟質兼而辨之當以察意言不能悉也凡婦人經期有氣逆作痛全滯而不虛者須順其氣宜調經飲主之甚者如排氣飲之類亦可用調經飲見新方八陳因陳治婦人經脈阻滯氣逆不調多痛而實者當歸三五錢牛膝二錢山楂一二錢香附二錢青皮茯苓各一錢半水二鍾煎七分食遠服如因不避生冷而寒滯其血者加肉桂吳茱萸之類如兼脹悶者加厚朴一錢或砂仁亦可如氣滯者加烏藥二錢或痛在小腹者加小茴香一錢半排氣飲見新方八陳和陳治氣逆食滯脹痛等證陳皮一錢五分木香七分或一錢藿香一錢五分香附二錢枳殼一錢五分澤瀉二錢烏藥二錢厚朴一錢水一鍾煎七分熱服如食滯者加山楂麥芽各二錢如寒滯者加焦乾薑吳茱萸肉桂之屬如氣逆之甚者加白芥子沉香青皮檳榔之屬如嘔而兼痛者加半夏丁香之屬如痛在小腹者加小茴香如兼疝者加荔枝核煨熟搗碎用二三錢若血瘀不行全滯無虛者但破其血宜通瘀煎主之通瘀煎見新方八陳因陳治婦人氣滯血積經脈不利痛極拒按及産後瘀血實痛並男婦血逆血厥等證歸尾三五錢山楂香附紅花新者炒黃各二錢烏藥一二錢青皮錢半木香七分澤瀉錢半水二鍾煎七分加酒一二小鐘食前服兼寒滯者加肉桂一錢或吳茱萸五分火盛內熱血燥不行者加炒梔子一二錢微熱血虛者加芍藥二錢血虛澀滯者加牛膝血瘀不行者加桃仁三十粒去皮尖用或加蘇木玄胡索之類瘀極而大便結燥者加大黃一二三錢或加芒硝蓬朮即蓬莪朮亦可若氣血俱滯者宜失笑散主之失笑散見婦人規古方治婦人心痛氣刺不可忍及産後兒枕蓄血惡血上攻疼痛並治小腸氣痛五靈脂淨者蒲黃等分俱炒上為末每服二三錢用酒煎熱服一方用好醋一杓熬成膏再入水一鍾煎至七分熱服一方用醋糊和丸龍眼大每服一丸以童便和水各半鍾煎七分溫服按此方若用以止痛蒲黃宜減半若用止血則宜等分或靈脂減半亦可若寒滯於經或因外寒所逆或素日不慎寒涼以致凝結不行則留聚為痛而無虛者須去其寒宜調經飲加薑桂吳茱萸之類主之或和胃飲亦可酌用調經飲見上三段和胃飲見新方八陳和陳治寒濕傷脾霍亂吐瀉及痰飲水氣胃脘不清嘔惡脹滿腹痛等證此即平胃散之變方也凡嘔吐等證多有胃氣虛者一聞蒼朮之氣亦能動嘔故以乾薑代之陳皮厚朴各一錢半乾薑炮一二錢炙甘草一錢水一鍾半煎七分溫服此方凡藿香木香丁香茯苓半夏扁豆砂仁澤瀉之類皆可隨宜增用之若胸腹有滯而兼時氣寒熱者加柴胡若血熱血燥以致滯澀不行而作痛者宜加味四物或用保陰煎去續斷加減主之薛氏加味四物湯見經不調保陰煎見血熱經早以上五證但察其有滯無虛方是真實若或兼虛弗得任行克伐凡婦人經行作痛挾虛者多全實者少即如以可按拒按及經前經後辨虛實固其大法也然有氣血本虛而血未得行者亦每拒按故於經前亦常有此證此以氣虛血滯無力流通而然但察其形證脈息凡涉虛弱不足而經滯作痛者惟用決津煎五物煎加減主之其效如神或用四神散之類亦可決津煎見新方八陳因陳治婦人血虛經滯不能流暢而痛極者當以水濟水若江河一缺而積垢皆去宜此湯隨證加減主之此用補為瀉之神劑也如氣虛者宜少用香附陳皮之類甚者不用亦可當歸三五錢或一兩澤瀉一錢半牛膝二錢肉桂一二三錢熟地二三錢或五七錢或不用亦可烏藥一錢如氣虛者不用亦可水二鍾煎七八分食前服如嘔惡者加焦薑一二錢如陰滯不行者非加附子不可如氣滯而痛脹者加香附一二錢或木香七八分如血滯血澀者加酒炒紅花一二錢如小腹不暖而痛者加吳茱萸七八分如大便結澀者加肉蓯蓉一至三錢或者以山楂代之五物煎見血寒論外方四神散見血寒論外方若痛在經後者多由血虛當用大小營煎隨宜加減主之或四物八珍俱可用然必察其寒熱虛實以為佐使自無不效其有餘滯未行者惟決津煎為妙大營煎見血熱經早小營煎見血虛經亂四物湯見經不調八珍湯見經不調決津煎見上段凡婦人但遇經期則必作痛或食則嘔吐肢體困倦或兼寒熱者是必素稟氣血不足止宜八珍湯大營煎之類若虛而寒甚者宜理陰煎漸加培補久必自愈有因帶濁多而虛痛者亦宜大小營煎隨其寒熱加佐使主之理陰煎見血寒經遲立齋曰前證若風寒傷脾者六君加炮薑思慮傷血者四物加參術思慮傷氣者歸脾加柴梔鬱怒傷血者歸脾逍遙兼服六君子湯見古方八陳補陳治脾胃虛弱飲食少思或久患瘧痢或食飲難化或嘔吐吞酸或咳嗽喘促若虛火等證須加炮薑其功尤速人參白朮炒茯苓各二錢炙甘草一錢陳皮半夏各一錢五分加薑棗水煎服或加粳米百粒四物湯見經不調歸脾湯見經不調元戎逍遙散見古方八陳補陳治肝脾血虛及鬱怒傷肝少血目暗發熱脅痛等證當歸芍藥白朮茯神甘草柴胡各等分上薑水煎服經痛論外方溫經湯見婦人規古方治寒氣客於血室以致血氣凝滯臍腹作痛其脈沉緊人參牛膝酒炒甘草炒各一錢當歸川芎芍藥牡丹皮蓬朮醋炒桂心各五分上水煎服良方交加散見婦人規古方治經脈不調腹中撮痛或結聚癥瘕産後中風生地一斤取汁生薑十二兩取汁上以地黃汁炒薑渣薑汁炒地黃渣干為末每服三錢溫酒調服加芍藥玄胡當歸蒲黃桂心各一兩沒藥紅花各五錢尤效醋附丸見婦人規古方治元臟虛冷月候不調腹中急痛赤白帶下渾身寒熱胎氣壅滯不固香附米半斤醋煮焙乾為末上以醋糊為丸桐子大每服三四十丸米飲下牛膝散見婦人規古方治月水不利臍腹作痛或小腹引腰氣攻胸膈當歸酒浸牛膝酒炒赤芍藥桂心桃仁去皮尖玄胡索炒牡丹皮各一兩木香三錢上為末每服一錢溫酒調下或每服五七錢水煎服薑黃散見婦人規古方治瘀血凝滯肚腹刺痛或腹脹發熱等證薑黃當歸酒拌各二錢蓬朮醋炒紅花桂心川芎玄胡索炒丹皮各五分上水酒各半煎服當歸沒藥丸見婦人規古方治血瘀作痛及血風筋攣骨痹手足麻木疼痛當歸五靈脂炒各一兩沒藥五錢上為末醋糊丸桐子大每服三十丸薑湯下玄胡當歸散見婦人規古方亦名延胡索散治血積小腹疼痛或因氣逆月經不行肚腹作痛當歸赤芍藥劉寄奴沒藥枳殼麵炒玄胡索炒等分上為末每服一錢熱酒調下琥珀丸見婦人規古方治婦人或老或少或産前産後百病及療三十六種諸病七疝八瘕心腹刺痛卒中癱瘓半身不遂八風十二痹手足痠疼乳中結核結毒懷胎驚動傷犯不安死胎不下並治琥珀硃砂各另研沉香阿膠炒珠附子制川芎肉桂五味子石斛各五錢牛膝酒浸當歸肉蓯蓉酒洗曬人參熟地續斷木香沒藥各一兩一方有牛黃珍珠乳香玄胡各一兩共二十一味上煉蜜為丸彈子大每服一丸空心食前午後溫酒化開服凡服法或薑湯或米湯或酒或燈草湯或隨證用引皆可下若傷寒中風角弓反張用麻黃湯隨證改湯引送下孕婦臨月宜一日一服至産順利不覺疼痛凡婦人服至五服十服之後日倍飲食其功言不盡述服者當自覺也崩淋經漏不止崩漏不止經亂之甚者也蓋亂則或前或後漏則不時妄行由漏而淋由淋而崩總因血病而但以其微甚耳陰陽別論曰陰虛陽搏謂之崩百病始生篇曰陽絡傷則血外溢陰絡傷則血內溢故凡陽搏必屬陰虛絡傷必致血溢知斯二者而崩淋之義及治療之法思過半矣惟是陰虛之説則但傷營氣無匪陰虛而五臟之陰皆能受病故神傷則血無所主病在心也氣傷則血無所從病在肺也意傷則不能統血攝血病在脾也魂傷則不能蓄血藏血病在肝也志傷則不能固閉真陰病在腎也所以五臟皆有陰虛五臟皆有陽搏故病陰虛者單以臟氣受傷血因之而失守也病陽搏者兼以火居陰分血得熱而妄行也凡治此之法宜審臟氣宜察陰陽無火者求其臟而培之補之有火者察其經而清之養之此不易之良法也然有火者不得不清但元氣既虛極多假熱設或不明真假而誤用寒涼必復傷脾胃生氣日見殆矣先賢有云凡下血證須用四君子輩以收功又云若大吐血後毋以脈診當急用獨參湯救之厥旨深矣故凡見血脫等證必當用甘藥先補脾胃以益生髮之氣蓋甘能生血甘能養營但使脾胃氣強則陽生陰長而血自歸經矣故曰脾統血治崩淋經漏之法若陰虛血熱妄行者宜保陰煎加減一陰煎保陰煎見血熱經早加減一陰煎見血熱經遲若火盛迫血妄行而無虛證者宜徙薪飲黃芩散加續斷丹參徙薪飲見新方八陳寒陳治三焦凡火一切內熱漸覺而未甚者先宜清以此劑其甚者宜抽薪飲陳皮八分黃芩二錢麥冬芍藥黃柏茯苓牡丹皮各一錢半水一鍾半煎七分食遠溫服如多鬱氣逆傷肝脅肋疼痛或致動血者加青皮梔子黃芩散即子芩散見血熱論外方若血熱兼滑者宜保陰煎槐榆散生地黃湯保陰煎見血熱經早槐榆散見婦人規古方治血崩及腸風下血槐花地榆等分炒焦上二味用酒煎飲之生地黃湯見古方八陳固陳治熱痢便血崩淋不止生地黃五錢地榆七錢半炙甘草二錢半上㕮咀用水二鍾煎一鍾分空心日晚二服若肝經怒火動血者加味四物湯加味四物湯見經不調若肝經怒火動血逆氣未散者化肝煎或保陰煎加減主之化肝煎見新方八陳寒陳治怒氣傷肝因而氣逆動血致為煩熱脅痛脹滿動血等證青皮陳皮各二錢芍藥二錢丹皮梔子炒澤瀉各錢半如血見下部者以甘草代之土貝母二三錢水一鍾半煎七八分食遠溫服如大便下血者加地榆小便下血者加木通各一錢五分如兼寒熱加柴胡一錢如火盛加黃芩一二錢如脅腹脹痛加白芥子一錢脹滯多者勿用芍藥保陰煎見血熱經早若血有滯逆而妄行者四物湯丹參散四物湯見經不調丹參散見調經論外備用方若營氣不足血不能調而妄行者五福飲四物湯四君子湯八珍湯擇宜用之五福飲見血熱經早四物湯見經不調四君子湯見血虛經亂八珍湯見經不調若脾氣虛陷不能收攝而脫血者壽脾煎歸脾湯四君子湯加芎歸再甚者舉元煎壽脾煎見血虛經亂歸脾湯見經不調四君子湯見血虛經亂舉元煎見新方八陳補陳治氣虛下陷血崩血脫亡陽垂危等證有不利於歸熟地等劑而但宜補氣者以此主之人參黃耆炙各三五錢炙甘草一二錢升麻五七分炒用白朮炒一二錢水一鍾半煎七八分溫服如兼陽氣虛寒者桂附乾薑隨宜佐用如兼滑脫者加烏梅二個或文蛤七八分若脾腎虛寒兼嘔兼溏泄而畏寒者理陰煎五君子煎理中湯理陰煎見血寒經遲五君子煎見新方八陳熱陳治脾胃虛寒嘔吐泄瀉而兼濕者人參二三錢白朮茯苓各二錢炙甘草一錢乾薑炒黃一二錢水一鍾半煎服理中湯見血虛經亂若陽氣大虛脫陷者四維散四維散見新方八陳熱陳治脾腎虛寒滑脫之甚或泄利不能止或氣虛下陷二陰血脫不能禁者無出此方之右人參一兩製附子二錢乾薑炒黃二錢炙甘草一二錢烏梅肉五分或一錢酌其味之微甚隨病人之意而用之或不用烏梅此即四味回陽飲也上為末和勻用水拌濕蒸一飯頃取起烘乾再為末每服一二錢溫湯調下若脾腎陰氣不固者固陰煎五陰煎祕元煎固陰煎見腎虛經亂五陰煎見血虛經亂祕元煎見血虛經亂若肝膽氣虛不能藏血者必多驚恐畏怯宜五福飲七福飲八珍湯兼陽虛者仍加薑桂五福飲見血熱經早七福飲見血虛經亂八珍湯見經不調若去血過多血脫氣竭者當速用獨參湯提握其氣以防脫絶或用當歸補血湯獨參湯見古方八陳補陳治諸氣虛氣脫及反胃嘔吐喘促粥粉入胃即吐凡諸虛證垂危者人參二兩水一升煮取四合乘熱頓服日再進之兼以人參煮粥食之尤妙寶鑑當歸補血湯見古方八陳補陳治血氣損傷或因誤攻致虛肌熱口渴目赤面紅脈大而虛重按全無及病因飢飽勞役者黃耆炙一兩當歸三錢水一鍾半煎八分食遠服若崩淋既久血滑不禁宜澀宜固者龍骨散如聖散七灰散之類同人參兼用之龍骨散見婦人規古方治血崩不止龍骨煅當歸香附炒各一兩棕毛炭五錢上為細末每服四錢空心米湯調下忌油膩雞魚炙煿物如聖散見婦人規古方治血崩三服全愈棕櫚子烏梅肉乾薑俱燒存性為末各等分上每服二錢空心烏梅湯調服一方單用棕皮半燒半生為末每空心服二錢亦妙七灰散見婦人規古方治血崩神效蓮蓬殼罌粟殼醃蟹殼益母草旱蓮草棕毛葉藕節各等分俱燒存性為末空心醋點湯調下三錢一祕方用棉花子以銅鍋炒黑為末黃酒調下二三錢三兩次即止並治崩漏小産血不止凡血淋治法大約如前但其穢臭脈滑者多火宜從清涼若腥臭清寒脈細者多寒必須溫補其或久病則精去無窮尾閭易竭非大加培補不可惟固陰煎及十全大補湯之類為宜固陰煎見腎虛經亂十全大補湯見調經論外備用方崩淋之病有暴崩者有久崩者暴崩者其來驟其治亦易久崩者其患深其治亦難且凡血因崩去勢必漸少少而不止病則為淋此等證候未有不由憂思鬱怒先損脾胃次及衝任而然者崩淋既久真陰日虧多致寒熱咳嗽脈見弦數或豁大等證此乃元氣虧損陰虛假熱之脈尤當用參地歸術甘溫之屬以峻培本源庶可望生但得胃氣未敗受補可救若不能受補而日事清涼以苟延目前則終非吉兆也崩淋病治有五臟之分然有可分者有不可分者可分者如心肺居於膈上二陽臟也肝脾腎居於膈下三陰臟也治陽者宜治其氣治陰者宜治其精此可分之謂也然五臟相移精氣相錯此又其不可分者也即如病本於心君火受傷必移困於脾土故治脾即所以治心也病本於肺治節失職必殘及於腎水故治腎即所以治肺也脾為中州之官水穀所司餉道不資必五路俱病不究其母則必非治脾良策肝為將軍之官鬱怒是病勝則伐脾敗則自困不知強弱則攻補不無倒施不獨此也且五臟五氣無不相涉故五臟中皆有神氣皆有肺氣皆有胃氣皆有肝氣皆有腎氣而其中之或此或彼為利為害各有互相倚伏之妙故必悟臟氣之大本其強弱何在死生之權其緩急何在精氣之大要其消長何在攻補之大法其先後何在斯足稱慧然之明哲若謂心以棗仁遠志肺以桔梗麥冬脾以白朮甘草肝以青皮芍藥腎以獨活玄參之類是不過膚毛之見又安知性命之道也諸證皆然不止崩淋者若此婦人於四旬外經期將斷之年多有漸見阻隔經期不至者當此之際最宜防察若果氣血和平素無他疾此固漸止而然無足慮也若素多憂鬱不調之患而見此過期阻隔便有崩決之兆若隔之淺者其崩尚輕隔之久者其崩必甚此因隔而崩者也當預服四物八珍之類以調之否則恐其鬱久而決則為患滋大也若其既崩之後則當辨其有火無火有火者因火逼血宜保陰煎主之無火者因隔而決或其有滯當去其故而養其新宜調經飲先以理之然後各因其宜可養則養用小營煎可固則固用固陰煎之類主之保陰煎見血熱經早調經飲見經期腹痛小營煎見血虛經亂固陰煎見腎虛經亂王叔和曰五崩何等曰白崩者形如涕赤崩者形如絳津黃崩者形如爛瓜青崩者形如藍色黑崩者形如衃血也立齋曰前證治法因脾胃虧損不能攝血歸源者用六君加芎歸柴胡六君子湯見經期腹痛若因肝經之火而血下行用奇效四物湯或四物加柴梔芩術奇效四物湯見血熱論外方四物湯見經不調若肝經風熱而血妄行用加味逍遙散或小柴胡加梔芍丹皮若怒動肝火而血沸騰亦用前藥加味逍遙散見經不調小柴胡湯見古方八陳散陳治邪在肝膽半表半裡之間寒熱往來喜嘔或日晡發熱脅痛耳聾鬱怒痎瘧等證柴胡半斤半夏半斤人參甘草黃芩生薑各三兩大棗十二枚劈上七味以水一斗二升煮取六升去滓再煎取三升溫服一升日三服若胸中煩而不嘔去半夏人參加栝蔞實一枚若渴者去半夏加人參合前成四兩半栝蔞根四兩若腹中痛者去黃芩加芍藥三兩若脅下痞硬去大棗加牡蠣四兩若心下悸小便不利者去黃芩加茯苓四兩若不渴外有微熱者去人參加桂三兩溫覆取微汗愈若咳者去人參大棗生薑加五味子半升乾薑二兩按右方乃漢時古數也今方改用柴胡二三錢半夏黃芩各一二錢人參二三錢甘草五七分上加薑棗水煎服若脾經鬱結而血不歸經用歸脾加柴梔丹皮歸脾湯見經不調若悲傷胞絡而血下崩用四君加柴梔升麻四君子湯見血虛經亂附案大尹王天成之內久患崩自服四物涼血之劑或作或徹因怒發熱其血不止服前藥不應乃主降火更加脅腹大痛手足俱冷余曰此脾胃虛寒所致先用附子理中湯熱退痛止又用濟生歸脾湯補中益氣湯崩血頓愈若泥痛無補法則誤矣血崩簡易方一方治風熱血崩用荊芥穗燈火燒焦為末每服一二錢童便調服一方治血崩用陳槐花一兩百草霜半兩為末每服一二錢燒紅稱錘淬酒服崩漏論外方增損四物湯見血寒論外方良方一味防風散見婦人規古方治肝經有風以致血得風而流不歸經者用防風去蘆為末每服一錢白湯調服一名獨聖散每服二錢空心食前用酒煮白麵清飲調下極效良方防風黃芩丸見婦人規古方治肝經風熱以致血崩便血尿血等證條芩炒黑防風等分上為末酒糊丸桐子大每服三五十丸食遠或食前米飲或溫酒送下柏葉散見婦人規古方治元氣虛弱崩中漏血年久不愈亦治白帶柏葉炒當歸生地續斷川芎龜甲炙禹餘糧各一兩半阿膠炒五錢鱉甲炙兩半赤石脂煅牡蠣煅地榆艾葉炒鹿茸炙各五錢上為末每服二錢粥飲調下棕灰散見古方八陳和陳治大腸下血不止或婦人崩漏下血敗棕不拘多少燒灰存性為細末每服二錢空心好酒或清米飲調服龍腦雞蘇丸見古方八陳和陳治上焦之火除煩解勞安吐血衄血清五臟虛煩神志不定上而酒毒膈熱消渴下而血滯五淋血崩等疾麥冬四兩甘草一兩半龍腦薄荷葉一斤阿膠炒人參各二兩黃耆炙一兩生地六兩另為末木通銀柴胡各二兩此二味用沸湯浸一日夜絞取汁上用好白蜜二斤先煎一兩沸卻入地黃末不住手攪徐加木通柴胡汁慢火熬成膏然後加前諸藥末和丸如豌豆大每服二十丸隨證用引送下如室女虛勞寒熱潮作用人參柴胡湯下一方如前有黃連一兩殺血心痛陳臨川良方云婦人血崩而心痛甚名曰殺血心痛由心脾血虛也若小産去血過多而心痛甚者亦然用烏賊魚骨炒為末醋湯調下失笑散亦效失笑散見經期腹痛立齋曰前證若陰血耗散用烏賊丸收斂之若瘀血不散用失笑散行散之若心血虛弱用芎歸湯補養之若鬱結傷血用歸脾湯調補之烏賊魚骨丸見婦人規古方此即內經治血枯方烏賊魚骨去甲四兩蘆茹一兩即茜根上為末以雀卵搗丸小豆大每服五丸或十丸鮑魚煎湯下以飯壓下鮑魚即今之淡乾魚也芎歸湯見婦人規古方一名佛手散亦名當歸湯治産後去血過多煩暈不省並一切胎氣不安亦下死胎川芎二錢當歸三五錢上咀每用半兩水煎服若腹疼加桂若腹痛自汗頭眩少氣加羊肉若不應用八珍湯若用下胎當為末以酒調服歸脾湯見經不調附案一婦人血崩兼心痛三年矣諸藥不應每痛甚虛證悉具面色萎黃余曰心主血蓋由去血過多心無所養以致作痛宜用十全大補湯參術倍之三十餘劑稍愈百餘劑全愈愚謂殺血心痛既由血去過多而心痛甚明屬心無所養但當專用甘溫以養營氣如十全大補湯大營煎小營煎五福飲之類為宜若失笑散者惟氣滯血逆而用以行之散之則可必不可以治血虛也再如烏賊丸乃內經腹中論用治血枯者亦恐於血虛心痛未必即效用者審之熱入血室婦人傷寒或勞役或怒氣發熱適遇經行以致熱入血室或血不止或血不行令人晝則明瞭安靜夜則譫語如見鬼狀者是也若熱因外邪由表而入者宜一柴胡飲或三柴胡飲或四柴胡飲或良方黃龍湯加生地酌而用之一柴胡飲見新方八陳散陳一為水數從寒散也凡感四時不正之氣或為發熱或為寒熱或因勞因怒或婦人熱入血室或産後經後因冒風寒以致寒熱如瘧等證但外有邪而內兼火者須從涼散宜此主之柴胡二三錢黃芩一錢半芍藥二錢生地一錢半陳皮一錢半甘草八分水一鍾半煎七八分溫服如內熱甚者加連翹一二錢隨宜如外邪甚者加防風一錢佐之如邪結在胸而痞滿者去生地加枳實一二錢如熱在陽明而兼渴者加天花粉或葛根一二錢熱甚者加知母石膏亦可三柴胡飲見新方八陳散陳三為木數從肝經血分也凡人素稟陰分不足或肝經血少而偶感風寒者或感邪不深可兼補而散者或病後産後感冒有不得不從解散而血氣虛弱不能達者宜此主之柴胡二三錢芍藥一錢半炙甘草一錢陳皮一錢生薑三五片當歸二錢溏泄者易以熟地水一鍾半煎七八分溫服如微寒咳嘔者加半夏一二錢四柴胡飲見新方八陳散陳四為金數從氣分也凡人元氣不足或忍飢勞倦而外感風寒或六脈緊數微細正不勝邪等證必須培助元氣兼之解散庶可保全宜此主之若但知散邪不顧根本未有不元氣先敗者察之慎之柴胡一二三錢炙甘草一錢生薑三五七片當歸二三錢瀉者少用人參二三錢或五七錢酌而用之水二鍾煎七八分溫服如胸膈滯悶者加陳皮一錢良方黃龍湯見調經論外備用方若或怒或勞火由內生其人多汗而無表證者宜保陰煎清化飲當歸六黃湯之類加減主之保陰煎見血熱經早清化飲見血熱經早當歸六黃湯見古方八陳寒陳治盜汗之聖藥當歸黃耆蜜炙各二錢生地黃熟地黃黃連黃芩黃柏各一錢水二鍾煎服若病雖漸愈但元氣素弱而熱有未退血未止者宜補陰益氣煎或補中益氣湯若脾氣素弱宜歸脾湯血氣俱弱者宜十全大補湯庶無誤矣補陰益氣煎見新方八陳補陳此補中益氣湯之變方也治勞倦傷陰精不化氣或陰虛內乏以致外感不解寒熱痎瘧陰虛便結不通等證凡屬陰氣不足而虛邪外侵者用此升散無不神效人參一二三錢當歸二三錢山藥酒炒二三錢熟地三五錢或一二兩陳皮一錢炙甘草一錢升麻三五分火浮於上者去此不必用柴胡一二錢如無外邪者不必用水二鍾加生薑三五七片煎八分食遠溫服補中益氣湯見經不調歸脾湯見經不調十全大補湯見調經論外備用方若血熱多滯者宜小柴胡湯加丹皮紅花當歸小柴胡湯見崩淋經漏不止辨經色凡血色有辨固可以察虛實亦可以察寒熱若血濃而多者血之盛也色淡而少者血之衰也此固大概之易知者也至於紫黑之辨其證有如冰炭而人多不解誤亦甚矣蓋紫與黑相近今人但見紫色之血不分虛實便謂內熱之甚不知紫赤鮮紅濃而成片成條者是皆新血妄行多由內熱紫而兼黑或散或薄沉黑色敗者多以真氣內損必屬虛寒由此而甚則或如屋漏水或如腐敗之宿血是皆紫黑之變象也此肝脾大損陽氣大陷之證當速用甘溫如理陰煎理中湯歸脾湯四味回陽飲補中益氣湯之類單救脾土則陷者舉脫者固元氣漸復病無不愈若盡以紫色作熱證則無不隨藥而斃矣凡腸澼便血之屬無不皆然學者於此最有不可忽者理陰煎見血寒經遲理中湯見血虛經亂歸脾湯見經不調四味回陽飲見新方八陳熱陳治元陽虛脫危在頃刻者人參一二兩製附子二三錢炙甘草一二錢炮乾薑二三錢水二鍾武火即較旺之火煎七八分溫服徐徐飲之補中益氣湯見經不調血枯經閉評熱病論曰月事不來者胞脈閉也胞脈者屬心而絡於胞中今氣上迫肺心氣不得下通故月事不來也陰陽別論曰二陽之病發心脾有不得隱曲女子不月其傳為風消其傳為息奔者死不治邪氣臟腑病形篇曰腎脈微澀為不月血枯之與血隔本自不同蓋隔者阻隔也枯者枯竭也阻隔者因邪氣之隔滯血有所逆也枯竭者因衝任之虧敗源斷其流也凡婦女病損至旬月半載之後則未有不閉經者正因陰竭所以血枯枯之為義無血而然故或以羸弱或以困倦或以咳嗽或以夜熱或以食飲減少或以亡血失血及一切無脹無痛無阻無隔而經有久不至者即無非血枯經閉之候欲其不枯無如養營欲以通之無如克之但使雪消則春水自來血盈則經脈自至源泉混混又孰有能阻之者奈何今之為治者不論有滯無滯多兼開導之藥其有甚者則專以桃仁紅花之類通利為事豈知血滯者可通血枯者不可通也血既枯矣而復通之則枯者愈枯其與榨乾汁者何異為不知枯字之義耳為害不小無或蹈此弊也此之治法當與前血虛腎虛二條察而用之寇宗奭曰夫人之生以血氣為本人之病未有不先傷其血氣者若室女童男積想在心思慮過度多致勞損男子則神色消散女子則月水先閉蓋憂愁思慮則傷心而血逆氣竭神色先散月水先閉且心病不能養脾故不嗜食脾虛則金虧故發嗽腎水絶則木氣不榮而四肢干痿故多怒鬢髮焦筋骨痿若五臟傳遍則必至於死此一種於勞中最難治蓋病起於五臟之中無有已期藥力不可及也若或自能改易心志然後用藥扶接如此則可得九死一生舉此為例其餘諸方可按脈與證而治之張氏云室女月水久不行切不可用青蒿等涼藥醫家多以為室女血熱故以涼藥解之殊不知血得熱則行冷則凝養生必用方言之甚詳此説大有理不可不知若經候微少漸漸不通手足骨肉煩疼日漸羸瘦漸生潮熱其脈微數此由陰虛血弱陽往乘之少水不能減盛火火逼水涸耗亡津液治當養血益陰慎毋以毒藥通之宜用柏子仁丸澤蘭湯柏子仁丸見婦人規古方治血虛有火月經耗損漸至不通日漸羸瘦而生潮熱慎勿以毒藥通之宜柏子仁丸柏子仁炒研牛膝酒拌卷柏各半兩澤蘭葉續斷各二兩熟地黃三兩酒拌蒸爛杵膏上為末入地黃膏加煉蜜丸桐子大每服百餘丸空心米飲下澤蘭湯見婦人規古方治勞怯經閉澤蘭葉二錢當歸芍藥炒各一錢甘草炙五分用水煎服立齋曰夫經水陰血也屬衝任二脈主上為乳汁下為月水其為患有因脾胃虛不能生血而不行者調而補之有因脾郁傷血耗損而不行者解而補之有因胃火血消爍而不行者清而補之有因勞傷心血少而不行者靜而補之有因腎水虧不能生肝血而閉者補脾肺有因肺氣虛不能行血而閉者補脾胃經曰損其肺者益其氣損其心者調其榮衛損其脾者調其飲食適其寒溫損其肝者緩其中損其腎者益其精審而治之庶無誤矣五穀入胃化以為血以榮四末內養五臟六腑若服苦寒之劑復傷胃氣必致不起經閉論外方子和通經散見古方八陳攻陳治婦人氣逆血閉陳皮去白當歸各一兩甘遂以麵包勿令透水煮百餘滾取出用冷水浸過去面焙乾一兩上為細末每服三錢溫湯調下臨臥服胎孕類胎脈平人氣象論曰婦人手少陰動甚者任子也陰陽別論曰陰搏陽別謂之有子腹中論曰何以知懷子之且生也曰身有病而無邪脈也脈經曰尺中之脈按之不絶法妊娠也滑伯仁曰三部脈浮沉正等無他病而不月者妊也凡婦人懷孕者其血留氣聚胞宮內實故脈必滑數倍常此當然也然有中年受胎及血氣羸弱之婦則脈見細小不數者亦有之但於微弱之中亦必有隱隱滑動之象此正陰搏陽別之謂是即妊娠之脈有可辨也又胎孕之脈數勞損之脈亦數大有相似然損脈之數多兼弦澀胎孕之數必兼和滑此當於幾微中辨其邪氣胃氣之異而再審以證自有顯然可見者凡辨男女之法自古及今無不以陰陽二字為綱領然言多矛盾悉屬疑似茲余以坎離之象定之庶得其要蓋坎為天一之卦坎中滿陽在內也離為地二之卦離中虛陰在內也得坎象者為男得離象者為女所以男脈多沉實沉實者中滿之象女脈多浮虛浮虛者中虛之象無論人之老少強弱脈之部位大小但因象察象無不如響之應然尤於兩尺為最也足稱捷法脈訣云欲産之婦脈離經沉細而滑也同名夜半覺痛應分旦來日日午定知生質疑謂離經之脈即歇至者是也啓蒙曰欲産之婦脈離經離經之脈認分明其來大小不調勻或如雀啄屋漏應腰疼腹痛眼生花産在須臾卻非病胎候巫方氏顱囟經云一月為胞胎精血凝也二月為胎形始成胚也三月陽神為三魂四月陰靈為七魄五月五形分五臟也六月六律定六腑也七月睛開竅通光明也八月元神具降真靈也九月宮室羅布以定生人也十月受氣足萬象成也五臟論有耆婆論曰一月如珠露二月如桃花三月男女分四月形象具五月筋骨成六月毛髮生七月遊其魂男能動左手八月遊其魄兒能動右手九月三轉身十月受氣足孫真人曰凡兒在胎一月胚二月胎三月有血脈四月形體成五月能動六月諸骨具七月毛髮生八月臟腑具九月谷入胃十月百神備則生矣生後六十日瞳子成能咳笑應和人百五十日任脈成能自反覆百八十日髖骨成能獨坐二百一十日掌骨成能扶伏三百日臏骨成能行也若不能依期者必有不平之處巢氏病源論曰妊娠一月名胎胚足厥陰脈養之二月名始膏足少陽養之三月曰始胎手心主脈養之當此之時血不流行形象始化未有定儀因感而變欲子端正莊嚴常口談正言身行正事欲子美好宜佩白玉欲子賢能宜看詩書是謂外象而內感者也四月始成其血脈手少陽脈養之五月始成其氣足太陰脈養之六月始成其筋足陽明脈養之七月始成其骨手太陰脈養之八月始成其膚革手陽明脈養之九月始成毛髮足少陰脈養之十月五臟六腑關節人神皆備此其大略也陳臨川曰嘗試推巢氏所論云妊娠脈養之理若足厥陰肝脈也足少陽膽脈也為一臟一腑表裡之經余皆如此且四時之令必始於春木故十二經之養始於肝膽所以養胎在一月二月手心主心胞絡脈也手少陽三焦脈也屬火而旺夏所以養胎在三月四月手少陰手太陽乃心脈也以君主之官無為而專也足太陰脾脈也足陽明胃脈也屬土而旺長夏所以養胎在五月六月手太陰肺脈也手陽明大腸脈也屬金而旺秋所以養胎在七月八月足少陰腎脈也屬水而旺冬所以養胎在九月又況母之腎繫於胎是母之真氣子之所賴也至十月兒於母腹之中受足諸臟氣脈所養然後待時而生此論誠有至理世更有明之者亦未有過於巢氏之論矣余因述其説胎有男女之辨易曰乾道成男坤道成女顱囟經曰三陽所會則生男三陰所會則生女葛仙翁曰男從父氣女從母氣聖濟經曰天之德地之氣陰陽之至和流薄於一體因氣而左動則屬陽陽資之則成男因氣而右動則屬陰陰資之則成女是以胎有男女則成有遲速體有陰陽則懷有向背故男動在三月陽性早也女動在五月陰性遲也女胎肖母而懷故母之腹軟男胎面母而懷故母之腹硬此皆得理之談所當察也至若褚氏以精血之先後言男女道藏經以一日三日五日得者為男等説總屬臆度渺茫非有確見也余不敢遵信故別有微論列子嗣類安胎凡妊娠胎氣不安者證本非一治亦不同蓋胎氣不安必有所因或虛或實或寒或熱皆能為胎氣之病去其所病便是安胎之法故安胎之方不可執亦不可泥其月數但當隨證隨經因其病而藥之乃為至善若謂白朮黃芩乃安胎之聖藥執而用之鮮不誤矣胎氣有寒而不安者其證或吞酸吐酸或嘔惡脹滿或喜熱畏涼或下寒泄瀉或脈多沉細或絶無火證而胎有不安者皆屬陽虛寒證但溫其中而胎自安矣宜用溫胃飲理陰煎之類加減主之亦當以平素之臟氣察其何如酌而用之溫胃飲見血虛經亂理陰煎見血寒經遲胎氣有熱而不安者其證必多煩熱或渴或躁或上下不清或漏血溺赤或六脈滑數等證宜涼胎飲保陰煎之類主之若但熱無虛者如枳殼湯一母丸黃芩散之類皆可擇用清其火而胎自安矣涼胎飲見新方八陳因陳治胎氣內熱不安等證生地芍藥各二錢黃芩當歸各一二錢甘草生七分枳殼石斛各一錢茯苓錢半水一鍾半煎七分食遠溫服如熱甚者加黃柏一二錢保陰煎見血熱經早枳殼湯見婦人規古方治胎漏下血或因事下血亦進食和中並治惡阻枳殼炒黃芩炙各半兩白朮炒一兩上為末每服一錢白湯調下前四證若因脾胃虛弱宜用補中益氣湯加五味若因脾胃虛陷宜用前湯倍加升麻柴胡若因晡熱內熱宜用逍遙散一母丸見血熱論外方黃芩散即子芩散見血熱論外方胎氣有虛而不安者最費調停然有先天虛者有後天虛者胎元攸系盡在於此先天虛者由於稟賦當隨其陰陽之偏漸加培補萬毋欲速以期保全後天虛者由於人事凡色欲勞倦飲食七情之類皆能傷及胎氣治此者當察其所致之由因病而調仍加戒慎可也然總不離於血氣之虛皆當以胎元飲為主若心脾氣虛於上者宜逍遙飲歸脾湯壽脾煎之類主之若肝腎不足於下者宜左歸飲右歸飲固陰煎主之若氣血俱虛者宜五福飲八珍湯十全大補湯之類主之若脾腎氣虛而兼帶濁者宜祕元煎菟絲煎之類主之若多嘔惡者當隨前證前方各加二陳湯之類以和之凡治虛證貴在隨機應變誠有不可以鑿執言者胎元飲見新方八陳因陳治婦人衝任失守胎元不安不固者隨證加減用之或間日或二三日常服一二劑人參隨宜當歸杜仲芍藥各二錢熟地二三錢白朮錢半炙甘草一錢陳皮七分無滯者不必用水二鍾煎七分食遠服如下元不固而多遺濁者加山藥補骨脂五味之類如氣分虛甚者倍白朮加黃耆但耆朮氣浮能滯胃口倘胸膈有飽悶不快者須慎用之如虛而兼寒多嘔者加炮薑七八分或一二錢如虛而兼熱者加黃芩一錢五分或加生地二錢去杜仲如陰虛小腹作痛加枸杞二錢如多怒氣逆者加香附無妨或砂仁亦妙如有所觸而動血者加川續斷阿膠各一二錢如嘔吐不止加半夏一二錢生薑三五片逍遙飲見腎虛經亂歸脾湯見經不調壽脾煎見血虛經亂左歸飲見腎虛經亂右歸飲見腎虛經亂固陰煎見腎虛經亂五福飲見血熱經早八珍湯見經不調十全大補湯見調經論外備用方祕元煎見血虛經亂菟絲煎見新方八陳固陳治心脾氣弱凡遇思慮勞倦即苦遺精者宜此主之人參二三錢山藥炒二錢當歸錢半菟絲子制炒四五錢棗仁炒茯苓各錢半炙甘草一錢或五分遠志制四分鹿角霜為末每服加入四五匙上用水一鍾半煎成加鹿角霜末調服食前或加白朮一二錢局方二陳湯見古方八陳和陳治痰飲嘔惡風寒咳嗽或頭眩心悸或中脘不快或因生冷或飲酒過多脾胃不和等證陳皮半夏制各三錢茯苓二錢炙甘草一錢水二鍾薑三五片棗一枚煎八分食遠服胎氣有實滯氣滯凡為惡阻為脹滿而不安者惟其素本不虛而或多鬱滯者乃有之但察其所由而開之導之諸治實者固無難也嘔吐不止者二陳湯加枳殼砂仁主之或用人參橘皮湯亦妙食滯脹滿不安者小和中飲加減主之肝氣滯逆脹滿不安者解肝煎主之怒動肝氣兼火者化肝煎主之脾肺氣滯上攻作痛者紫蘇飲主之氣滯兼痰者四七湯二陳湯加當歸主之氣滯兼火為脹為煩者枳殼湯束胎丸之類主之人參橘皮湯見婦人規古方治妊娠脾胃虛弱氣滯惡阻嘔吐痰水飲食少進益胃和中一名參橘散人參陳皮麥門冬白朮各一錢厚朴制白茯苓各五分炙甘草三分上加淡竹茹一塊薑水煎溫服若因中脘停痰宜用二陳枳殼若因飲食停滯宜用六君加枳殼若因脾胃虛宜用異功散小和中飲見新方八陳和陳治胸膈脹悶或婦人胎氣滯滿等證陳皮一錢五分山楂二錢茯苓一錢半厚朴一錢五分甘草五分扁豆炒二錢水一鍾半加生薑三五片煎服如嘔者加半夏一二錢如脹滿氣不順者加砂仁七八分如火鬱於上者加焦梔子一二錢如婦人氣逆血滯者加紫蘇梗香附之屬如寒滯不行者加乾薑肉桂之屬解肝煎見新方八陳和陳治暴怒傷肝氣逆脹滿陰滯等證如兼肝火者宜用化肝煎陳皮半夏厚朴茯苓各一錢半蘇葉芍藥各一錢砂仁七分水一鍾半加生薑三五片煎服如脅肋脹痛加白芥子一錢如胸膈氣滯加枳殼香附藿香之屬化肝煎見崩淋經漏不止紫蘇飲見婦人規古方治妊娠失調胎氣不安上㽱作痛名曰子懸或臨産氣結不下等證大腹皮川芎白芍藥陳皮蘇葉當歸各一兩人參甘草各半兩上每服一兩薑蔥水煎服一方有香附無人參若肝脾氣血虛而有火不安宜兼逍遙散若脾氣虛弱而不安宜用四君芎歸局方四七湯見古方八陳和陳治七情之氣結成痰涎狀如破絮或如梅核在咽喉之間咯不出咽不下此七情所為也或中脘痞滿氣不舒快痰飲嘔惡皆治之半夏湯泡錢半茯苓一錢二分蘇葉六分厚朴薑製九分水一鍾半生薑七片紅棗二枚煎八分不時服枳殼湯見胎氣有熱而不安段束胎丸見婦人規古方懷胎七八個月恐胎氣展大難産用此扶母氣束兒胎易産然必胎氣強盛者乃可服條黃芩酒炒勿太熟冬月一兩夏月半兩白朮三兩陳皮二兩白茯苓七錢半上為末粥糊丸桐子大每服五十丸白湯下王節齋曰調理妊婦在於清熱養血白朮補脾為安胎君藥條實黃芩為安胎聖藥清熱故也暑月宜加用之此一説也雖若有理而實有大病即很大的毛病亦即很大的缺點不可不辨也夫孕之胎氣必隨母之臟氣大都陰虛者多熱氣陽虛者多寒氣寒之則寒熱之則熱者是為平氣今以十人言之則寒者居其三熱者居其三平者居其四此大較即大概也若謂受胎之後必增內熱自與常人不同則何以治惡阻者必用二陳六君生薑半夏之屬而後效其果增熱者乎故治熱宜黃芩寒則不宜也非惟寒者不宜即平氣者亦不宜蓋凡今之胎婦氣實者少氣虛者多氣虛則陽虛而再用黃芩有即受其損而病者有用時雖或未覺而陰損胎元暗殘母氣以致産婦羸困或兒多脾病者多由乎此奈今人不能察理但以聖藥二字以為胎家必用之藥無論人之陰陽強弱凡屬安胎無不用之其害蓋不少矣至若白朮雖善安胎然或用不得善則其性燥而氣閉故凡陰虛者非可獨用氣滯者亦當權宜是以用藥之難當如盤珠即靈活有不可膠柱而鼓瑟也立齋曰妊娠若元氣不實發熱倦怠或胎氣不安用當歸散因氣惱加枳殼胸膈痞悶再加蘇梗或作痛加柴胡當歸散見調經論外備用方若飲食不甘或欲嘔吐用六君加紫蘇枳殼若惡阻嘔逆頭眩體倦用參橘散未應用六君子湯若惡阻嘔吐不食煩悶亦用參橘散之類參橘散又名人參橘皮湯見前段六君子湯見經期腹痛若頓僕胎動腹痛下血用膠艾湯未應用八珍加膠艾若頓僕毒藥腰痛短氣用阿膠散未應再送知母丸若頓僕胎傷下血腹痛用佛手散未應用八珍送知母丸良方膠艾湯見婦人規古方治妊娠頓僕胎動不安腰腹疼痛或胎上搶或去血腹痛阿膠炒一兩艾葉數莖上二味以水五升煮取二升分三服八珍湯見經不調良方阿膠散見婦人規古方或頓僕或因毒藥胎動不安或脅痛腹痛上搶短氣阿膠艾葉當歸熟地川芎白芍黃耆炙甘草等分上每服四錢薑棗水煎知母丸即一母丸見血熱論外方佛手散又名芎歸湯見殺血心痛若心驚膽怯煩悶不安名子煩用竹葉湯未應血虛佐以四物氣虛佐以四君竹葉湯見婦人規古方治妊娠心驚膽怯煩悶不安名曰子煩一方有當歸防風梔子仁白茯苓麥門冬黃芩各三兩上每服四錢竹葉五片水煎服若因血虛煩熱宜兼用四物若因中氣虛弱宜兼用四君四物湯見經不調四君子湯見血虛經亂若下血不止名胎漏血虛用二黃散血去過多用八珍湯未應用補中益氣湯二黃散見血熱論外方八珍湯見經不調補中益氣湯見經不調若因事而動下血用枳殼湯加生熟地黃未應或作痛更加當歸血不止八珍加膠艾若不時作痛或小腹重墜名胎痛用地黃當歸湯未應加參朮陳皮或因脾氣虛用四君加歸地中氣虛用補中益氣湯枳殼湯見胎氣有熱而不安段地黃當歸湯見婦人規古方一名內補丸治妊娠衝任脈虛補血安胎熟地二兩當歸一兩上每服五錢水煎服為丸法以當歸炒為末熟地搗膏和丸桐子大每服百餘丸溫酒或滾湯下許學士曰大率妊娠惟在抑陽助陰然胎前藥最惡陰陽雜亂致生他病惟枳殼湯所以抑陽四物湯所以助陰耳然枳殼湯其味多寒若單服恐致胎寒腹痛更以內補丸佐之則陽不致強陰不致弱陰陽調和有益胎嗣此前人未嘗論及也若面目虛浮肢體如水氣名子腫用全生白朮散未應用六君子湯下部腫甚用補中益氣倍加茯苓或因飲食失宜嘔吐泄瀉此是脾胃虧損用六君子湯若足趾發腫漸至腿膝喘悶不安或足趾縫出水名水氣用天仙藤散脾胃虛弱兼用四君子湯未應用補中益氣兼以逍遙散全生白朮散見婦人規古方治妊娠面目虛浮四肢腫如水氣名曰胎腫白朮一兩生薑皮大腹皮陳皮白茯苓各半兩上為末每服二錢米飲下如未應佐以人參甘草天仙藤散見婦人規古方治妊娠三月之後足趾發腫漸至腿膝飲食不甘狀如水氣或腳趾間出黃水名曰子氣天仙藤洗略炒香附炒陳皮甘草烏藥等分上每服三五錢加生薑木瓜各三片紫蘇三葉水煎食前日進三服若因脾胃虛弱宜兼六君子中氣下陷須用補中益氣湯逍遙散見經期腹痛若胎氣上攻心腹脹滿作痛名子懸用紫蘇飲飲食不甘兼四君子內熱晡熱兼逍遙散紫蘇飲見胎氣有實滯氣滯不安段若小便澀少或成淋瀝名子淋用安營散不應兼八珍湯腿足轉筋而小便不利急用八味丸緩則不救安營散見婦人規古方治妊娠小便澀少遂成淋瀝名曰子淋甚妙麥門冬通草滑石當歸燈心甘草人參細辛等分上水煎服一方人參細辛加倍為末每服二錢麥冬湯調服若因肺經鬱熱宜用黃芩清肺飲若因膏粱厚味宜用清胃散若因肝經濕熱宜用加味逍遙散八味丸見經不調若項強筋攣語澀痰盛名子癇用羚羊角散羚羊角散見婦人規古方治妊娠虛風頸項強直筋脈攣急語言蹇澀痰涎不利不省人事名曰子癇羚羊角鎊川獨活棗仁五加皮薏苡仁炒防風當歸川芎茯神杏仁去皮尖各五分炙甘草木香各一分上加薑五片水煎服若因肝經風熱或怒火所致須用加味逍遙散或飲食停滯腹脹嘔吐此是脾胃虛弱而不能消化用六君子湯不應用平胃散加參苓或胎作脹或脹作痛此是脾胃氣虛不能承載用安胎飲加升麻白朮不應用補中益氣湯東垣平胃散見古方八陳和陳治脾胃不和不思飲食心腹脅肋脹滿刺痛嘔噦噁心吞酸噫氣體重節痛自利霍亂噫膈反胃等證厚朴薑製炒陳皮去白各五兩蒼朮去皮米泔浸炒八兩炙甘草三兩本方加人參茯苓各二兩即名參苓平胃散上為末每服二錢水一鍾薑三片棗二枚煎七分去渣溫服或去薑棗入鹽一小捻單以沸湯點服亦可如小便不利加茯苓澤瀉如飲食不化加神麯麥芽枳實如胃中氣痛加木香枳實或枳殼如脾胃困倦加人參黃耆如有痰加半夏如便硬腹脹加大黃芒硝如脈大內熱加黃連黃芩安胎飲見婦人規古方治妊娠五七個月用數服可保全産人參白朮當歸熟地川芎白芍藥陳皮甘草炙紫蘇炙黃芩各一錢上用薑水煎服一方有砂仁或臍腹作脹或小便淋閉此是脾胃氣虛胎壓尿胞用四物加二陳參術空心服後探吐藥出氣定又服又吐數次必安或因勞役所傷或食煎炒小便帶血此是血得熱而流於胞中宜清膀胱用逍遙散或遺尿不禁或為頻數此是肝火血熱用加味逍遙散若胸滿腹脹小便不通遍身浮腫名胎水不利用鯉魚湯脾胃虛佐以四君子逍遙散見經期腹痛加味逍遙散見經不調千金鯉魚湯見婦人規古方治妊娠腹脹胎中有水氣遍身浮腫小便不利或胎死腹中皆效當歸芍藥各一錢白朮一錢茯苓一錢半橘紅五分鯉魚一尾不拘大小上作一服將鯉魚去鱗臟白水煮熟去魚用汁鍾半入藥加生薑五片煎一鍾空心服當見胎水下如水未盡胎死腹中脹悶未除再製一服水盡脹消乃已病名同而形證異形證異而病名同聊見本方凡用見證之藥不應當分月經治之徐東皋曰胎有不安而腰疼腹痛甚則至於下墜者未必不由氣血虛無所營養而使之然也夫胎之在腹如果之在枝枝枯則果落固理之自然婦人性偏恣欲火動於中亦能致胎不安而有墮者大抵不外乎屬虛屬火二者之間清熱養血之治盡之矣此外有二因動胎者又不可不知也有因母病動胎者但療母病則胎自穩有因觸傷動胎者當以安胎藥二三劑而胎自安安胎論外方茯苓丸見婦人規古方溫胃安胎治妊娠煩悶頭暈聞食吐逆或胸腹痞悶赤茯苓人參桂心乾薑炮半夏泡洗炒黃橘紅各一兩白朮炒甘草炒枳殼麩炒各二兩上為末蜜丸桐子大每服五十丸米飲下日三服上原方仍有葛根二兩似非所宜也用者當酌之良方黃耆湯見婦人規古方治氣虛胎動腹痛下水糯米一合黃耆炒川芎各一兩上水煎分三服七味阿膠散見婦人規古方治胎動腹痛阿膠炒白茯苓白朮炒川芎當歸陳皮各一錢甘草炒三分上薑棗水煎服泰山磐石散見婦人規古方治婦人血氣兩虛或肥而不實或瘦而血熱或脾肝素虛倦怠少食屢有墮胎之患此方平和兼養脾胃氣血覺有熱者倍黃芩少用砂仁覺胃弱者多用砂仁少加黃芩更宜戒欲事惱怒遠酒醋辛熱之物可永保無墮徐東皋曰婦人凡懷胎二三個月慣要墮落名曰小産此由體弱氣血兩虛臟腑火多血分受熱以致然也醫家又謂安胎多用艾附砂仁熱補尤增禍患而速其墮矣殊不知血氣清和無火煎爍則胎自安而固氣虛則提不住血熱則溢妄行欲其不墮得乎香附雖云快氣開鬱多用則損正氣砂仁快脾氣多用亦耗真氣況香燥之性氣血兩傷求以安胎適又損胎而反墮也今惟泰山磐石散千金保孕丸二方能奪化工之妙百發百中萬無一失甫故表而出之以為好生君子共知也按徐氏此説見於胎産須知治懷胎慣墮之病但我認為它是有片面性的泰山磐石散即聖愈湯合芩術加川斷炙草砂仁糯米如氣血虛而兼熱且無陰道流血者則可若非有熱而又陰道流血者則非所宜人參黃耆當歸川續斷黃芩各一錢川芎白芍藥熟地各八分白朮二錢炙甘草砂仁各五分糯米一撮水一鍾半煎七分食遠服但覺有孕三五日常用一服四月之後方無慮也千金保孕丸見婦人規古方治妊娠腰背痛善於小産服此可免墮胎之患此即良方杜仲丸但彼等分用杜仲四兩同糯米炒去絲川續斷二兩酒洗上為末山藥糊丸桐子大每服八九十丸空心米飲下忌酒醋惱怒良方白朮散見婦人規古方治妊娠傷寒內熱等證白朮黃芩炒各二錢上用薑棗水煎服若陰證者不可用良方三味白朮湯見婦人規古方治妊娠內熱心痛白朮四錢赤芍藥三錢黃芩炒二錢上水煎服忌桃李雀肉益母地黃湯見婦人規古方治妊娠跌墜腹痛下血生地益母草各二錢當歸黃耆炒各一錢上薑水煎服良方鉤藤湯見婦人規古方治妊娠胎動腹痛面青冷汗欲絶鉤藤鉤當歸茯神桑寄生人參各一錢苦梗一錢半上水煎服如有煩熱加石膏醋附丸見經痛論外方良方獨聖散見婦人規古方順氣安胎治妊娠有所傷觸激動胎元腹痛下血極效砂仁不拘多少帶皮同炒勿令焦黑取仁為末上用熱酒調服四五分或一錢此物有安胎導滯易産之功實妊婦之要藥也探胎飲見婦人規古方婦人經水不來三月疑似用此驗之川芎不拘多少為末不見火空心煎艾湯調下方寸匕覺腹中動則有胎也臍之下動者乃血瘕也不動者血凝也病也三因腎著湯見古方八陳熱陳治腎虛身重腰冷如在水中不渴小便自利食飲如故腰下重痛如帶五千錢茯苓白朮各四兩炙甘草乾薑炮各二兩上㕮咀每服四錢水煎空心冷服一方用薑四兩術二兩良方每服有杏仁五分治妊娠腳腫良方當歸黃耆湯見古方八陳補陳治妊娠下痢腹痛小便澀當歸炒黃耆各一兩糯米一合水二鍾煎一鍾溫服滑胎枳殼散見婦人規古方此方能令胎瘦易産湖陽公主每産纍日不下南山道人進此方粉草炒一兩商州枳殼麩炒二兩上為末每服二錢空心沸湯調日三服凡孕六七月宜服之溫隱居方加當歸廣木香各等分或加香附一兩亦可惡阻妊娠之婦每多噁心嘔吐脹滿不食巢氏病源謂之惡阻此證惟胃氣弱而兼滯者多有之或嗜酸擇食或肢體困倦或煩悶脹滿皆其候也然亦有虛實不同所當辨而治之凡惡阻多由胃虛氣滯然亦有素本不虛而忽受胎妊則衝任上壅氣不下行故為嘔逆等證及三月餘而嘔吐漸止者何也蓋胎元漸大則臟氣僅供胎氣故無暇上逆矣凡治此者宜以半夏茯苓湯人參橘皮湯之類隨宜調理使之漸安必俟及期方得貼然也若中脘多痰者用二陳湯加枳殼或用半夏茯苓湯若飲食停滯作脹者宜小和中飲加減主之若氣逆作脹者宜半夏茯苓湯加枳殼蘇梗香附良方半夏茯苓湯見婦人規古方治妊娠脾胃虛弱飲食不化嘔吐不止半夏炮炒黃陳皮砂仁各炒一錢白茯苓二錢甘草炒五分上用薑棗烏梅水煎服一二劑後用茯苓丸人參橘皮湯即參橘散見安胎二陳湯見安胎小和中飲見安胎若脾胃氣虛者宜五味異功散六君子湯人參橘皮湯之類主之若胃虛兼寒多嘔者宜六味異功煎溫胃飲之類主之若肝腎陽虛作嘔者宜理陰煎主之五味異功散見古方八陳補陳治脾胃虛寒飲食少思嘔吐或久患咳嗽面浮氣逆腹滿等證人參白朮炒茯苓炙甘草陳皮各一錢上加薑棗水煎服六君子湯見經期腹痛六味異功煎見新方八陳熱陳治脾胃虛寒嘔吐泄瀉而兼微滯者此即五味異功散加乾薑也溫胃飲見血虛經亂理陰煎見血寒經遲立齋曰半夏乃健脾化痰滯之主藥也脾胃虛弱而嘔吐或痰涎壅滯飲食少思胎不安必用茯苓半夏湯倍加白朮以半夏白朮茯苓陳皮砂仁善能安胎氣健脾胃豫常用驗矣惡阻論外方良方四味白朮散見婦人規古方治妊娠胃虛惡阻吐水甚至十餘日漿粥不入白朮炒一錢人參五分甘草炒丁香各二分上薑水煎服茯苓丸見安胎論外方竹茹湯見婦人規古方治孕婦嘔吐不止噁心少食服此止嘔清痰竹茹彈子大一丸陳皮半夏茯苓各錢半生薑二錢水鍾半粳米一撮煎七分溫服忌羊肉雞魚麵食烏附湯見婦人規古方治孕婦噁心阻食養胃調和元氣烏藥香附制白朮土炒陳皮各一錢人參炙甘草各八分水鍾半薑三片煎七分服吐甚者加丁香砂仁各七粒胎氣上逼妊娠將理失宜或七情鬱怒以致氣逆多有上逼之證若氣逆氣實而脹逼者宜解肝煎若胃寒氣實而逼者宜和胃飲解肝煎見安胎和胃飲見經期腹痛若胃火兼滯者宜枳殼湯若脾虛兼滯者宜紫蘇飲枳殼湯見安胎紫蘇飲見安胎如脾虛而氣不行者宜四君子湯甚者八珍湯若脾氣虛而兼寒者宜五君子煎若脾腎虛寒不行者宜理陰煎若脾腎氣虛兼火者宜逍遙散或加黃芩枳殼砂仁四君子湯見血虛經亂八珍湯見經不調五君子湯見崩淋經漏不止理陰煎見血寒經遲逍遙散見經期腹痛若胎死腹中冷氣上逼嘔惡面青者治如後胎動欲墮條一方治胎氣上逼熱痛下血或煩悶困篤用蔥二十莖水濃煮飲之胎未死即安胎已死即下未效再服若胎動煩躁唇口青黑手足厥冷須用當歸湯按蔥味辛性平除能達表和里之外兼有通陽活血發汗利尿的作用本方有加川芎者有用銀器同米煮粥及作羹服食者可參考良方當歸湯見婦人規古方治胎動煩躁或生理不順唇口青黑手足厥冷當歸人參各二三錢阿膠炒甘草炒各一錢連根蔥白一握上水四碗煎四味至半去渣下蔥再煎一碗分二服胎漏妊婦經血不固者謂之胎漏而胎漏之由有因胎氣者有因病氣者而胎氣之由亦有二焉余嘗診一婦人脈見滑數而別無風熱等病問其經脈則如常不斷而但較前略少耳余曰此必受妊者也因胎小血盛有餘而然後於三月之外經脈方止果産一男故胎妊之婦多有此類今常見懷胎七八個月而生子者人但以血止為度謂之不足月然其受胎於未止之前至此而足而實人所不知也第此等胎氣亦有陰陽盛衰之辨如母氣壯盛蔭胎有餘而血之溢者其血雖漏而生子仍不弱此陰之強也不必治之若父氣薄弱胎有不能全受而血之漏者乃以精血俱虧而生子必萎小此陽之衰也而亦有人所不知也凡此皆先天之由若無可以為力者然栽培根本豈果無斡旋之道乎第見有於無之目及轉強於弱之手為不易得是烏可以尋常語也至若因病而漏者亦不過因病治之而已耳妊娠血熱而漏者保陰煎清化飲擇而用之怒動肝火漏血者保陰煎甚者化肝煎主之保陰煎見血熱經早清化飲見血熱經早化肝煎見崩淋經漏不止脾虛不能攝血者壽脾煎四君子之類主之脾虛血熱氣滯者四聖散主之脾腎兼虛者五陰煎主之壽脾煎見血虛經亂四君子湯見血虛經亂四聖散見婦人規古方治漏胎下血條芩白朮砂仁阿膠各等分上為細末每服二錢艾湯調下一方有芍藥無阿膠按此方若改為湯砂仁用當減半五陰煎見血虛經亂三焦氣血俱虛者五福飲七福飲之類主之五福飲見血熱經早七福飲見血虛經亂勞倦傷而動血者壽脾煎歸脾湯主之偶因傷觸動血者五福飲安胎散主之歸脾湯見經不調安胎散見婦人規古方治妊娠卒然腰痛下血熟地艾葉白芍炒川芎黃耆炒阿膠炒當歸甘草炙地榆各一錢上加薑棗水煎服衝任氣虛不能制約血滑易動者固陰煎祕元煎主之固陰煎見腎虛經亂祕元煎見血虛經亂立齋曰前證若因氣熱用防風黃芩丸若因血熱用加味逍遙散若因血虛用二黃散若因去血太多用八珍湯未應補中益氣湯若因肝火用柴胡清肝散若因脾火用加味歸脾湯若因事下血作痛用八珍湯加阿膠熟艾若因脾胃虛弱用補中益氣湯加五味子若因脾胃虛陷用前湯倍用升麻柴胡若晡熱內熱宜用逍遙散防風黃芩丸見崩漏論外方加味逍遙散見經不調二黃散見血熱論外方八珍湯見經不調補中益氣湯見經不調薛氏柴胡清肝散見古方八陳寒陳治肝膽三焦風熱瘡瘍或怒火憎寒發熱或瘡毒結於兩耳兩脅前後或胸乳小腹下及股足等證柴胡黃芩炒各錢半山梔炒川芎人參各一錢甘草五分連翹桔梗各八分水一鍾半煎服加味歸脾湯見古方八陳補陳治脾經血虛發熱等證即歸脾湯加柴胡山梔各一錢逍遙散見經期腹痛胎漏論外方良方安胎寄生湯見婦人規古方治妊娠下血或胎不安或腰腹作痛桑寄生白朮茯苓各五分甘草一錢上水煎服當歸芍藥湯見婦人規古方治妊娠心腹急痛或去血過多而暈眩當歸白芍藥炒白朮炒茯苓澤瀉各一錢川芎二錢上水煎服妊娠卒然下血妊娠忽然下血其證有四或因火熱迫血則妄行或因鬱怒氣逆則動血或因損觸胎氣胞宮受傷而下血或因脾腎氣陷命門不固而脫血凡此皆動血之最者也不速為調理則必致墮胎矣然治此者必先察其血去之多少及於血去之後尤當察其邪之微甚如火猶未清仍當清火氣猶未順仍當順氣若因邪而動血血去而營虛則速當專顧元氣以防脫陷此中或當治標或當救本或當兼標本而調理之倘不知先後緩急將恐治標未已而救本無暇也當詳察之若火盛迫血妄行者當察其火之微甚火之微者涼胎飲稍甚者徙薪飲再甚者保陰煎子芩散若肝經有風熱而血下者宜防風黃芩丸若怒氣傷肝氣逆血動而暴至者宜保陰煎若氣有未順而脹滿者四七湯二陳湯或加芎歸之類若兼肝火者宜化肝煎涼胎飲見安胎徙薪飲見崩淋經漏不止保陰煎見血熱經早子芩散見血熱論外方防風黃芩丸見崩漏論外方四七湯見安胎二陳湯見安胎化肝煎見崩淋經漏不止若觸損胎氣胞宮受傷而血下者宜安胎散膠艾湯去血多者倍加人參若從高墮下傷動胎氣而下血者宜益母地黃湯安胎散若因驚氣虛而陷者仍加人參安胎散見胎漏膠艾湯良方膠艾湯見安胎益母地黃湯見安胎論外方若脾胃素弱或偶因傷脾下血者宜壽脾煎歸脾湯或中氣下陷者補中益氣湯若血虛微熱漏血尿血者續斷湯壽脾煎見血虛經亂歸脾湯見經不調補中益氣湯見經不調續斷湯見血熱論外方以上諸動血證若去血未多血無所積胎未至傷而不止者宜涼則涼宜補則補惟以安之固之為主治若血已離位蓄積胞宮為脹為痛而余血未出者欲與留之有不可得欲去其血而不傷營氣則惟四物湯大加當歸為最宜也若察其胎氣已動勢有難留則五物煎決津煎皆切要之藥四物湯見經不調五物煎見血寒論外方決津煎見經期腹痛一方治頓僕胎動用川芎末二錢酒下二三錢胎生即安胎死即下又方治同前用砂仁和皮炒為末每服二錢米飲下腹熱即安胎動欲墮妊娠胎氣傷動者凡跌撲怒氣虛弱勞倦藥食誤犯房室不慎皆能致之若因母病而胎動但治其母若因胎動而母病但安其胎輕者轉動不安或微見血察其不甚速宜安之用前安胎及卒然下血等法若腹痛血多腰痠下墜勢有難留者無如決津煎五物煎助其血而落之最為妥當決津煎見經期腹痛五物煎見血寒論外方若其勢甚而舌青面赤脹滿嘔惡或冷氣上逼者兒已死矣若面青吐沫舌赤是母死也若面舌唇吻俱青口中沫出是母子俱死也若胎已死當速去其胎以救其母氣血虛者惟用決津煎最妙如不應而脹痛上逼勢不容緩者急用平胃散一兩酒水各半投朴硝五錢熱服之或用朴硝一兩以童便調服則逐而下矣下後隨證調補之如無脹急則但用決津煎加朴硝則死胎自下平胃散見安胎凡氣血衰弱無以滋養其胎或母有弱病度其終不能成者莫若下之以免他患宜桂心散或用下胎小品方良方桂心散見婦人規古方治妊娠因病胎不能安者可下之桂心栝蔞牛膝瞿麥各五分或一錢當歸一錢或二三錢上水煎下胎小品方見婦人規古方用麥蘖一升擂碎水二升煮一升服之即下神效按麥蘖能損氣破血如此故凡脾胃虛弱及飲食不化者不宜用明矣又方用牛膝一兩酒一鍾煎七分作二服即下數墮胎夫胎以陽生陰長氣行血隨營衛調和則及期而産若或滋養一有不利則枝枯而果落藤萎而花墜故五常政大論曰根於中者命曰神機神去則機息根於外者命曰氣立氣止則化絶正此謂也凡妊娠之數見墮胎者必以氣脈虧損而然而虧損之由有稟質之素弱者有年力之衰殘者有憂怒勞苦而困其精力者有色欲不慎而盜損其生氣者此外如跌撲飲食之類皆能傷其氣脈氣脈有傷而胎可無恙者非先天之最完固者不能而常人則未之有也且胎懷十月經養各有所主所以屢見小産墮胎者多在三個月及五月七月之間而下次之墮必如期復然正以傷此一經而再值此經則遇闕不能過矣況婦人腎以系胞而腰為腎之府故胎妊之婦最慮腰痛痛甚則墜不可不防故凡畏墮胎者必當察此所傷之由而切為戒慎凡治墮胎者必當察此養胎之源而預培其損保胎之法無出於此若待臨期恐無及也凡胎孕不固無非氣血損傷之病蓋氣虛則提攝不固血虛則灌溉不周所以多致小産故善保胎者必當專顧血虛宜以胎元飲為主而加減用之其次則芍藥芎歸湯再次則泰山磐石散或千金保孕丸皆有奪造化之功所當酌用者也胎元飲見安胎芍藥芎歸湯見婦人規古方即芎歸補中湯治氣血虛半産川芎當歸黃耆炙白朮炒人參芍藥炒杜仲炒艾葉阿膠炒五味子杵炒各一錢甘草炙五分上每服五錢水煎服若脾氣虛弱須用補中益氣湯若氣虛有火宜用安胎飲泰山磐石散見安胎論外方千金保孕丸見安胎論外方又凡胎熱者血易動血動者胎不安故墮於內熱而虛者亦常有之若脾氣虛而血熱者宜四聖散肝腎虛而血熱者宜涼胎飲肝脾虛而血熱者宜固胎煎四聖散見胎漏涼胎飲見安胎固胎煎見新方八陳因陳治肝脾多火多滯而屢墮胎者黃芩二錢白朮一二錢當歸芍藥阿膠各錢半陳皮一錢砂仁五分水一鍾半煎服又立齋法治血虛血熱數墮胎者於調補之外時值初夏教以濃煎白朮湯下黃芩末二錢與數十帖得保而生亦可法也此外凡有他證而胎不安者當於安胎條中酌而治之胎不長妊娠胎氣本乎血氣胎不長者亦惟血氣之不足耳故於受胎之後而漏血不止者有之血不歸胎也婦人中年血氣衰敗者有之泉源日涸也婦人多脾胃病者有之倉廩薄則化源虧而衝任窮也婦人多鬱怒者有之肝氣逆則血有不調而胎失所養也或以血氣寒而不長者陽氣衰則生氣少也或以血熱而不長者火邪盛則真陰損也凡諸病此者則宜補宜固宜溫宜清但因其病而隨機應之則或以及期或以過月胎氣漸充自無不長惟是年邁血衰而然者數在天矣有非可以人力為也鬼胎婦人有鬼胎之説豈虛無之鬼氣果能襲人胞宮而遂得成形者乎此不過由本婦之氣質蓋或以邪思蓄注血隨氣結而不散或以衝任滯逆脈道壅瘀而不行是皆內因之病而必非外來之邪蓋即血癥氣瘕之類耳當即以癥瘕之法治之詳見本條此外如狐魅異類之遇者則實有所受而又非鬼胎之謂亦當於癥瘕類求法下之又凡鬼胎之病必以血氣不足而兼凝滯者多有之但見經候不調而預為調補則必無是病若其既病則亦當以調補元氣為主而繼以去積之藥乃可也然用補之外而欲於補中兼行者無如決津煎欲去其滯而不至猛峻者無如通瘀煎既加調補而欲直收其病者則奪命丹回生丹皆可酌用或以當歸紅花煎濃湯送赤金豆亦妙決津煎見經期腹痛通瘀煎見經期腹痛良方奪命丹見婦人規古方治瘀血入胞脹滿難下急服此藥血即消衣即下按此方頗有回生丹之功用下死胎必效須用當歸方附子炮半兩乾漆碎之炒煙盡牡丹皮各一兩上為細末另用大黃末一兩以好醋一升同熬成膏和前藥丸桐子大溫酒吞五七丸一方有當歸一兩回生丹見婦人規古方治婦人産後諸疾汙穢未淨及一切實邪疼痛死胎瘀血沖逆等證大黃膏法用蘇木三兩河水五碗煎至三碗去渣聽用紅花三兩炒黃色用好酒一大壺煮十餘滾去渣聽用黑豆三升煮熟存汁三碗去豆去皮曬乾為末俱聽用大黃一斤為末用好醋八碗熬成膏次下紅花酒蘇木湯黑豆汁攬勻又熬成膏盆內收盛候用將鍋焦焙乾為末同豆皮末俱入之人參白朮青皮木瓜各三錢當歸川芎元胡蒼朮香附童便炒蒲黃赤茯苓桃仁泥熟地各一兩牛膝三稜山茱萸五靈脂地榆甘草羌活陳皮白芍各五錢良薑四錢烏藥二兩半木香乳香沒藥各一錢上為末用前大黃膏為丸彈子大金薄為衣不拘時隨證擇用湯引送下一丸赤金豆見新方八陳攻陳又名八仙丹治諸積不行凡血凝氣滯疼痛腫脹蟲積結聚癥堅宜此主之此丸去病捷速較之硝黃稜莪之類過傷正氣者大為勝之巴豆霜去皮膜略去油一錢半生附子切略炒燥二錢皂角炒微焦二錢輕粉一錢丁香木香天竺黃各三錢硃砂二錢為衣上為末醋浸蒸餅為丸蘿蔔子大硃砂為衣欲漸去者每服五七丸欲驟行者每服一二十丸用滾水或煎藥或薑醋茶蜜茴香使君煎湯為引送下若利多不止可飲冷水一二口即止蓋此藥得熱則行得冷則止也如治氣濕實滯鼓脹先用紅棗煮熟取肉一錢許隨用七八丸甚者一二十丸同棗肉研爛以熱燒酒加白糖少許送下妊娠藥禁蚖斑水蛭及虻蟲烏頭附子配天雄野葛水銀並巴豆牛膝薏苡與蜈蚣稜莪代赭芫花麝大戟蛇蛻黃雌雄牙硝芒硝牡丹桂槐花牽牛皂角同半夏南星與通草瞿麥乾薑桃仁通碙砂乾漆蟹甲爪地膽茅根莫用好出便産須知妊娠寡欲妊娠之婦大宜寡欲其在婦人多所不知其在男子而亦多有不知者近乎愚矣凡胎元之強弱産育之難易及産後崩淋經脈之病無不悉由乎此其為故也蓋以胎神鞏固之日極宜保護宮城使不知慎而多動欲火盜泄陰精則藩籬由不固而傷血氣由不聚而亂子女由元虧而夭而陰分之病亦無不由此而百生矣此婦人之最宜慎者知者不可不察
