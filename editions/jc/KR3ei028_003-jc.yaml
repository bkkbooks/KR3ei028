body:
  text: 下卷產育類滑胎妊娠滑胎之法惟欲其坐草之期易而且速而難易之由則在血之盈虛不在藥之滑利蓋血多則潤而產必易血虧則澀而產必難故於未產之前但宜以培養氣血為主而預為之地如四物湯滑胎煎五福飲小營煎八珍湯之類即皆滑胎之要藥若不知此而過用滑利等物或產期未近無火無滯而妄用清火行氣沉降苦寒等藥必皆暗殘營氣走泄真陰多致血虧氣陷反為臨期大害若果肥盛氣實者則紫蘇飲保生無憂散滑胎枳殼散之類皆可擇用四物湯見經不調滑胎煎見新方八陣因陣胎氣臨月宜常服數劑以便易生當歸三五錢川芎七分杜仲二錢熟地三錢枳殼七分山藥二錢水二鍾煎八九分食前溫服如氣體虛弱者加人參白朮隨宜用之如便實多滯者加牛膝一二錢五福飲見血熱經早小營煎見血虛經亂八珍湯見經不調紫蘇飲見安胎保生無憂散見婦人規古方臨產服之補其血順其氣或胞胎肥厚根蒂堅牢者皆可使之易產又治小產瘀血腹痛當歸川芎白芍乳香枳殼南木香血餘上等分每服二三錢水煎日二服若胞衣既破其血已涸或元氣困憊急用八珍湯斤許水數碗煎熟時飲救之飲盡再製亦有得生滑胎枳殼散見安胎論外方催生凡妊娠胎元完足彌月而產熟落有期非可催也所謂催生者亦不過助其血氣而利導之耳直待臨期乃可用脫花煎或滑胎煎隨證加減主之或經日久產母困倦難生俱宜服滑胎煎以助其氣血令兒速生其有氣虛無力艱於傳送者必用獨參湯隨多隨少接濟其力皆為催生要法若期未至而妄用行氣導血等劑以為催生亦猶摘方苞之萼揠宋人之苗耳脫花煎見新方八陣因陣凡臨盆將產者宜先服此藥催生最佳並治產難經日或死胎不下俱妙當歸七八錢或一兩肉桂一二錢或三錢川芎牛膝各二錢車前子錢半紅花一錢催生者不用此味亦可水二鍾煎八分熱服或服後飲酒數杯亦妙若胎死腹中或堅滯不下者加朴硝三五錢即下若氣虛困劇者加人參隨宜若陰虛者必加熟地三五錢滑胎煎見滑胎獨參湯見崩淋經漏不止臨盆將產腹痛已甚凡催生之藥無如脫花煎少用肉桂五七分為最穩最妙若氣虛無力者加人參二三錢虛者任意加用之催生若水血下多子道乾澀難出者宜用滑利之物如豬脂油蜜酥油蔥白葵子牛乳滑石榆白皮之類以潤之亦濟急之法也滑胎催生論外方達生散見婦人規古方妊娠臨月服十餘劑則易產或加砂仁枳殼如兼別證以意增減詩云誕彌厥月先生如達注曰先生首生也達小羊也羊子易生故以此名之人參白朮當歸白芍陳皮紫蘇各一錢炙甘草二錢大腹皮酒洗曬乾三錢水一鍾半煎服一方無當歸白芍白朮錢氏生化湯見婦人規古方此錢氏世傳治婦人者當歸五錢川芎二錢甘草炙五分焦姜三分桃仁十粒去皮尖雙仁熟地三錢上㕮咀水二鍾棗二枚煎八分溫服一方無熟地按後世多用無熟地一方附加減法凡胎衣不下或血冷氣閉血枯氣弱等證連服生化湯二三劑即下或用此送益母丸一丸即下蓋益母草行血養血性善走而不傷人者也凡婦人無論胎前產後皆宜此藥凡血暈虛暈加荊芥穗六七分凡產婦氣虛氣脫倦怠無力加人參黃耆凡陽虛厥逆加附子肉桂脈虛煩渴加麥冬五味子氣壅有痰加陳皮竹瀝血虛血燥便結加麻仁杏仁蓯蓉多汗不眠加茯神棗仁黃耆上體多汗加麻黃根下體多汗加漢防己煩熱加丹皮地骨皮口噤如風反張瘛瘲者加荊芥防風各三四分惡露未盡身發寒熱頭痛脅脹其小腹必然脹痛加紅花丹皮肉桂各三四分玄胡一錢內傷飲食加山楂陳皮砂仁或神麯麥芽外傷寒濕或加蒼朮白朮血積食積胃有燥糞臍腹脹痛加大黃二錢產後下血不止或如屋漏水沉黑不紅或斷或來或如水或有塊淋瀝不休此氣血大虛之候不可誤用寒涼其脈浮脫者可加附子輩諸陽分藥否則無救矣佛手散單用當歸三錢川芎二錢此即其變方也會稽錢氏世傳曰嘗論產證本屬血虛陰亡陽孤氣亦俱病如大補則氣血陡生倘失調則諸邪易襲四物避芍藥之寒四物得薑桃之妙氣毋耗散法兼補虛食必扶脾勿專消導熱不可用芩連恐致宿穢凝滯寒不宜用桂附反招新血流崩三陽見表證之多似可汗也用麻黃則重竭其陽三陰見里證之劇似可下也用承氣則大涸其血耳聾脅痛乃腎虛惡露之停休用柴胡譫語汗多乃元弱似邪之證毋同胃實厥由陽氣之衰難分寒熱非大補不能回陽痙因陰血之虧豈論剛柔非滋營陰以潤絡潮熱似瘧以瘧治則遷延神亂如邪以邪論則立困總屬大虛須從峻補去血多而大便燥蓯蓉加於生化非潤腸和氣之能通患汗出而小便難六君倍用參耆必生津助液之可利加參生化頻服救產後之危活命長生調攝須產前加意加味芎歸湯見婦人規古方治分娩交骨不開或五七日不下垂死者生男女婦人發一握燒存性自死龜殼一個或佔過者亦可酥炙川芎當歸各一兩上咀每用一兩水煎服良久不問生死胎自下良方當歸湯滑胎催生見胎氣上逼經驗滑石散見婦人規古方治產難凡水下胎干胎滯不生用此最效滑石飛過一兩白蜜香油各半盞上將油蜜慢火熬熟三四沸掠去沫調滑石末頓服外以油調於產婦臍腹上下摩之立效佛手散見殺血心痛穩婆產婦臨盆必須聽其自然弗宜摧逼安其神志勿使驚慌直待花熟蒂圓自當落矣所以凡用穩婆必須擇老成忠厚者預先囑之及至臨盆務令從容鎮靜不得用法摧逼余嘗見有穩婆忙冗性急者恐顧此失彼因而勉強試湯分之掐之逼之使下多致頭身未順而手足先出或橫或倒為害不小若未有緊陣不可令其動手切記切記又或有生息不順及雙胎未下之類但宜穩密安慰不可使產母聞知恐驚則氣散愈難生息又嘗見有奸詭之婦故為哼呀之聲或輕事重做以顯己能以圖酬謝因致產婦驚疑害尤非細極當慎也立齋醫案載一穩婆云止有一女於分娩時適當巡街侍御行牌取我視其內室分娩女為此驚嚇未產而死後見侍御更以威顏分付迨視產母胎雖順而頭偏在一邊此時若以手入推正可保順生因畏其威不敢施手但回稟云此是天生天化非人力所能因是子母俱不能救由此視之可見產時當用靜鎮自然而一毫驚恐疑畏有不可使混於其間者產要凡孕婦臨月忽然腹痛或作或止或一二日或三五日胎水少來但腹痛不安者名曰弄胎非當產也又有一月前或半月前忽然腹痛如欲產而不產者名曰試產亦非產也凡此腹痛無論胎水來與不來俱不妨事但當寬心候時可也若果欲生則痛極連腰乃將產也蓋腎繫於腰胞系於腎故耳又試捏產母手中指本節跳動即當產也此時兒逼產門穀道挺迸水血俱下方可坐草試湯瓜熟蒂懸此乃正產之候也產婦腹痛未甚且須寬心行動以便兒身舒轉如腰腹痛甚有產之兆即當正身仰臥或起坐舒伸務宜安靜從容待兒轉身向下其產必順而且易最不宜預為驚擾入手以致產婦氣怯胞破漿干使兒轉身不易則必有難產之患產婦初覺欲生便須惜力調養不可用力妄施恐致臨產乏力若兒方轉身而用力太早則多致橫逆須待順而臨門一逼自下若時候未到用力徒然臨產房中不宜多人喧嚷驚慌宜閉戶靜以待生將產時宜食稠軟白粥勿令飢渴以乏氣力亦不宜食硬冷難化之物恐產時乏力以致脾虛不能消化則產後有傷食之病產婦產室當使溫涼得宜若產在春夏宜避陽邪風是也產在秋冬宜避陰邪寒是也故於盛暑之時亦不可衝風取涼以犯外邪又不宜熱甚致令產母頭疼面赤亦不宜人眾若熱氣熏蒸亦致前患其或有熱極煩渴而血暈血溢者亦可少與涼水暫與解之然亦不可多用若冬末春初余寒尚盛產室不可無火務令下體和暖衣被亦當溫厚庶不為寒氣所侵可免胎寒血滯難產之患且產後胎元既落氣血俱去乘虛感邪此時極易故不可不慎凡富貴之家過於安逸者每多氣血壅滯常致胎元不能轉動此於未產之先亦須常為運動庶使氣血流暢胎易轉則產亦易矣是所當預為留意者妊娠將產不可占卜問神如巫覡之徒哄嚇謀利妄言凶險禱神祇保產產婦聞之致生疑懼夫憂慮則氣結滯而不順多至難產所宜戒也產時胞漿未下但只穩守無妨若胞漿破後一二時辰不生即當服催生等藥如脫花煎滑胎煎或益母丸之類蓋漿乃養兒之生漿幹不產必其胎元無力愈遲則愈干力必愈乏所以速宜催之脫花煎見催生滑胎煎見滑胎良方益母丸見婦人規古方一名返魂丹治婦人赤白帶惡露時下不止及治婦人胎前產後經中諸般奇痛無所不療本草云此草胎前無滯產後無虛故名益母益母草一味一名茺蔚子一名野天麻方梗對節生葉葉類天麻四五月間開紫花是白花者非上於五月採取曬乾連根莖葉勿犯鐵器磨為細末煉蜜為丸如彈子大每服一丸用熱酒和童便化下或隨證用湯引送下一方以此為末每服二錢或酒或童便或隨證用引服之一方凡產時倉卒未合只用生益母草搗汁入蜜少許服之其效甚大一益母膏方依前採取搗爛以布濾取濃汁用砂鍋文武火熬成膏如黑砂糖色為度入磁罐收貯每服二三匙酒便調下或於治血湯藥中加一匙服之尤妙產婦與酒不可多而致醉凡產前醉則乏力而四肢不用產後酒多恐引入血分四肢致後日有動血及四肢無力髓骨痠痛之患六逆產一橫生者以兒方轉身產母用力逼之太早故致兒身未順而先露手臂但令母安然仰臥穩婆以手徐推兒臂下體令其正直復以中指摸其肩弗使臍帶攀系即生二倒生者因兒未及轉身產母努力故令兒先露足令母正臥以手徐推足入良久仍推兒身徐俟轉正近門即生三偏生者因兒未順生路產母努力逼兒頭偏一邊雖若露頂實額角也亦照前法推正即生若兒頂後骨偏拄穀道旁以手從外後旁輕輕托正即生四礙產者兒身雖順門路雖正但不能下仍因胎轉時臍帶絆肩而然令產母仰臥以手輕推兒向上乃用中指按兒兩肩理順臍帶即生五坐產者因兒將產其母疲倦久坐椅褥抵其生路而然須用手巾一條拴系高處令產母以手攀之輕輕屈足舒伸以開生路兒即順生六盤腸產者臨產母腸先出子產而腸未收故曰盤腸產古法以醋水各半盞默然噀產母面背則收一法以蓖麻子四十九粒研爛塗母頭頂待腸收上急洗去俗以水噀面背驚之而腸亦收但恐驚則氣散反致他疾戒之一方治橫逆產難令產母仰臥以小針刺兒手腳心三五次用鹽擦之手腳即縮上轉身即生一方治盤腸產以半夏為末用少許搐鼻中腸自上又方用大紙捻以麻油潤滲點著吹滅以煙燻產婦鼻中腸即上又方腸出盛以潔淨漆器濃煎黃耆湯浸之腸即上胞破產難凡產婦胎未順而胞先破者其因有二蓋一有母質薄弱胞衣不固因兒轉動隨觸而破者此氣血之虛也一有兒身未轉以坐草太早用力太過而胞先破者此舉動之傷也若胞破久而水血乾產道澀則兒難下宜急用大料四物湯或五物煎滑胎煎五福飲當歸湯之類助其氣血並濃煎蔥湯熏洗產戶使其暖而氣達則自當順下若持久力乏血已耗涸則甚危矣當用八珍湯料一斤益母草四兩水數碗煎熟不時飲之亦有得生者或以黃耆芎歸數斤以大釜煎藥氣氤氳滿室使產母口鼻俱受其氣亦良法也四物湯見經不調五物煎見血寒論外方滑胎煎見滑胎五福飲見血熱經早當歸湯見胎氣上逼八珍湯見經不調大抵產難之證多患於鬱悶安佚富貴之家治法雖云胎前清氣產後補血然不可拘泥若脾胃不健氣血不充必當預為調補不然臨產必多患難產難經日不下別無危證者宜用脫花煎催之極妥極妙脫花煎見催生一醫宿客店治店婦臨產數日不生下體俱冷無藥甚窘令取椒橙葉茱萸共煎湯一盆令產婦以小凳坐盆內熏洗良久小腹皆暖氣溫血行遂產一方以紫蘇煎湯熏洗大抵遇嚴寒時月產久傷冷氣血必凝此熏洗之法亦要法也外以淋湯內以羊肉湯必效一方令產婦以自己髮梢含於口中令其噁心作嘔即下亦治胞衣不出胞衣不出胞衣不出有以氣血疲弱不能傳送而停擱不出者其證但見無力而別無痛脹治當補氣助血宜速用決津煎或滑胎煎保生無憂散局方黑神散之類主之有以惡露流入胞中脹滯不出者蓋兒既脫胞帶必下墜故胞在腹中形如仰葉仰則盛聚血水而脹礙難出惟老成穩婆多有識者但以手指頂其胞底以使血散或以指摸上口攀開一角使惡露傾瀉則腹空自落矣決津煎見經期腹痛滑胎煎見滑胎保生無憂散見滑胎局方黑神散見婦人規古方一名烏金散靈苑方名肉桂散治產後惡露不盡胎衣不下血氣攻心腹痛不止及治脾腎陰虛血不守舍吐衄等證黑豆二兩炒當歸去蘆酒洗熟地蒲黃白芍甘草炙乾薑炮肉桂各一兩上為末每服二錢童便酒各半調服良方黑神散有炮附子半兩無蒲黃又一法以本婦頭髮攪入喉中使之作嘔則氣升血散胞軟亦自落矣凡胎胞不出者多死授以此法甚效若血滲胞中停蓄既久而為脹為痛或喘或急則非逐血破血不可也宜速用奪命丹或用失笑散以熱酒調服使血散脹消其衣自下若氣血兼虛者亦惟決津煎為善奪命丹見鬼胎失笑散見經期腹痛一方用蓖麻子仁一兩研爛貼母右足心衣下速洗去緩則腸亦出若腸不收即以此膏塗腦頂則腸自入一方用紅花一兩酒煮濃汁服一方用產婦鞋底炙熱熨小腹上下即出一方用皂角燒為末每服一錢溫酒調服胞衣論外方牛膝散胎衣不下腹脹見經痛論外方氣脫血暈產時胎胞既下氣血俱去忽爾眼黑頭眩神昏口噤昏不知人古人多雲惡露乘虛上攻故致血暈不知此證有二曰血暈曰氣脫也若以氣脫作血暈而用辛香逐血化痰等劑則立刻斃矣不可不慎也一氣脫證產時血既大行則血去氣亦去多致昏暈不省微虛者少頃即蘇大虛者脫竭即死但察其面白眼閉口開手冷六脈細微之甚是即氣脫證也速用人參一二兩急煎濃湯徐徐灌之但得下咽即可救活若少遲延則無及矣余嘗救此數人無不隨手而愈此最要法也又嘗見有禁參而斃者云新產後不可用參用參則補住惡血必致為害即勸之亦不肯用直待斃而後悔者亦數人矣又有云產後必過七日方可用參此等愚昧訛傳不知始自何人誤人不淺萬萬不可信也一血暈之證本由氣虛所以一時昏暈然血壅痰盛者亦或有之如果形氣脈氣俱有餘胸腹脹痛上衝此血逆證也宜失笑散若痰盛氣粗宜二陳湯如無脹痛氣粗之類悉屬氣虛宜大劑芎歸湯八珍湯之類主之失笑散見經期腹痛二陳湯見安胎芎歸湯見殺血心痛八珍湯見經不調一猝時昏暈藥有未及宜燒秤錘令赤用器盛至床前以醋沃之或以醋塗口鼻令酸氣入鼻收神即醒或以破舊漆器或以乾漆燒煙燻之使鼻受其氣皆可但此法雖輕而暴暈者所宜若氣虛之甚而暈厥者非用大補之劑終無益也兒初生初誕法詳小兒門凡嬰兒初生當隨手包裹切不可為風寒所侵蓋兒在腹中遮護最密及其初脫胞胎肌膚脆嫩極易感邪若在夏令自所無慮但覺稍寒即須慎之嘗見兒生未久多有驚風發熱抽搐等病率由乎此小兒初生天氣微涼即大忌洗沐恐腠理不密元氣發泄而外邪乘之也凡產母分娩艱難勞傷胎氣多有兒雖脫胞而乏力垂危或已死者切不可便斷臍帶當急用大紙捻蘸香油於臍帶上往來燒斷之取其陽氣以續胎元俄頃兒得啼聲即已活矣且可免胃寒泄瀉之病凡見此者若以刀斷臍帶則子母皆多難保此出立齋醫案凡燒帶之法惟素多陽虛及產時氣脫者最宜用之以助陽氣若母氣陽強或兒聲洪亮者皆不宜用恐火從臍入日後致生熱毒則反為害不小子死腹中凡子死腹中者多以觸傷或犯禁忌或以胎氣薄弱不成而殞或以胞破血乾持久困敗但察產母腹脹舌黑者其子已死若非產期而覺腹中陰冷重墜或為嘔惡或穢氣上衝而舌見青黑者皆子死之證宜速用下死胎方下之下後察其虛實隨加調補自愈若唇舌面色俱青則母子皆危之兆也補遺方治胎死腹中用紅花以酒煮汁飲二三碗即下新法下胎方用當歸一兩厚朴三錢陳皮二錢入酒水各一碗煎至一碗加朴硝三五錢再煎十餘沸去渣熱服死胎自下或只用脫花煎更妙死胎論外方回生丹見鬼胎下死胎方見婦人規古方凡胎死腹中其舌多見青黑口中甚穢而嘔腹中不動只覺陰冷重墜者是用平胃散一兩以黃酒河水各一鍾煎至一鍾入朴硝三五錢再煎三五沸溫服其死胎即化水而出萬不失一又方單用朴硝末三錢以熱酒和熱童便調服立出或用佛手散以酒調服亦妙桂香散見婦人規古方治胎死腹中不下桂心三錢麝香五分上為末作一服酒調下琥珀散見經痛論外方產門不開不閉子宮不收交骨不開產門不閉無非陰氣不足陰氣不足則氣不達所以不開不開則產必艱難宜加味芎歸湯補而開之大有奇效或十全大補湯亦可加味芎歸湯見滑胎論外方十全大補湯見調經論外備用方產門不閉由陰氣大虛不能收攝或由陰火下流而然故或為陰挺突出或為腫脹或為淋瀝不禁若氣血俱虛者宜十全大補湯加五味子補而斂之或痛而覺熱者宜加味逍遙散若憂思傷脾血熱者加味歸脾湯若暴怒傷肝動火者龍膽瀉肝湯加味逍遙散見經不調加味歸脾湯見胎漏良方龍膽瀉肝湯見古方八陣寒陣亦名龍膽湯治肝經濕熱小便赤澀或脅脹口苦寒熱凡肝經有餘之證宜服之龍膽草酒拌炒人參天冬麥冬生甘草黃連炒山梔知母各五分黃芩七分柴胡一錢五味三分水一鍾半煎服子宮不收而外墜者宜補中益氣湯加醋炒芍藥斂而舉之或外以黃耆煎湯熏洗亦妙或以硫黃湯熏洗硫黃散敷之一方治產後子宮不斂用荊芥藿香椿根白皮煎湯熏洗神效一方治產後子腸不收外用枳殼訶子五倍子白礬煎湯熏洗若不收再灸頂心百會穴數壯即上一方子宮脫出用蓖麻仁十四枚研爛塗頂心入即洗去一方治產後陰脫用絹袋盛炒熱蛇床子熨之亦治陰痛又法用蛇床子五兩烏梅十四個煎水日洗五六次小產小產之證有輕重有遠近有稟賦有人事由稟賦者多以虛弱由人事者多以損傷凡正產者出於熟落之自然小產者由於損折之勉強此小產之所以不可忽也若其年力已衰產育已多欲其再振且固自所難能凡見此者但得保其母氣則為善矣若少年不慎以致小產此則最宜調理否則下次臨期仍然復墜以至二次三次終難子嗣系不小矣凡此安之之法見前數墮胎條中既產調理之法亦與大產相似詳後產後條中俱當按而用之凡婦人年及中衰胎元無力則常有胎不能長及多小產昏暈之患此氣血衰敗而然血氣既衰則凡於小產之後多有胎既落而復又下墜如更有一胎欲產者此非胎也乃因氣虛而胞宮隨胎下陷也產母不知必至驚慌此無足慮但以壽脾煎或八珍十全大補湯之類主之則自安矣壽脾煎見血虛經亂八珍湯見經不調十全大補湯見調經論外備用方又凡小產有遠近其在二月三月為之近五月六月為之遠新受而產者其勢輕懷久而產者其勢重此皆人之所知也至若猶有近者則隨孕隨產矣凡今艱嗣之家犯此者十居五六其為故也總由縱欲而然第自來人所不知亦所不信茲謹以筆代燈用指迷者倘濟後人實深願也請詳言之蓋胎元始肇一月如珠露二月如桃花三月四月而後血脈形體具五月六月而後筋骨毛髮生方其初受亦不過一滴之玄津耳此其橐籥正無依根荄尚無地鞏之則固決之則流故凡受胎之後極宜節欲以防氾濫而少年縱情罔知忌憚雖胎固欲輕者保全亦多其有兼人之勇者或恃強而不敗或既敗而復戰當此時也主方欲靜客不肯休無奈狂徒敲門撞戶顧彼水性熱腸有不啟扉而從隨流而逝者乎斯時也落花與粉蝶齊飛火棗共交梨並逸合汙同流已莫知其昨日孕而今日產矣朔日孕而望日產矣隨孕隨產本無形跡蓋明產者胎已成形小產必覺暗產者胎仍似水直溜何知故凡今之䘕䘕家多無大產以小產之多也娶娼妓者多少子息以其子宮滑而慣於小產也今嘗見艱嗣求方者問其陽事則曰能戰問其功夫則曰盡通問其意況則怨嘆曰人皆有子我獨無亦豈知人之明產而爾之暗產耶此外如受胎三月五月而每有墮者雖衰薄之婦常有之然必由縱欲不節致傷母氣而墮者為尤多也故凡恃強過勇者多無子以強弱自相殘也縱肆不節者多不育以盜損胎元之氣也豈悉由婦人之罪哉欲求我方者當以此篇先讀之則傳方之思已過半矣小產論外方人參黃耆湯見婦人規古方治小產氣虛血下不止人參黃耆炒當歸白朮炒白芍炒艾葉各一錢阿膠炒二錢上作一劑水煎服當歸川芎湯見婦人規古方治小產後瘀血心腹疼痛或發熱惡寒當歸熟地黃白芍藥炒玄胡索炒川芎桃仁紅花香附青皮炒澤蘭牡丹皮上水煎入童便酒各小半若以手按腹愈痛此是瘀血為患宜用此藥或失笑散按之反不痛此是血虛宜用四物參苓白朮若痛而作嘔此是胃虛宜用六君子若或作瀉此是脾虛宜用六君子送二神丸殿胞煎見新方八陣因陣治小產後腹痛產後兒枕疼痛等證如神當歸五七錢或一兩川芎炙甘草各一錢茯苓一錢肉桂一二錢或五七分水一鍾煎八分熱服如脈細而寒或嘔者加乾薑炒黃色一二錢如血熱多火者去肉桂加酒炒芍藥一二錢如脈弱陰虛者加熟地三五錢如氣滯者加香附一二錢或烏藥亦可腰痛加杜仲一二錢下胎斷產下胎斷產本非仁者之事然有婦人臨產艱危或病甚不勝產育者則下胎斷產之法有不得已亦不可廢者也至若水銀虻蟲水蛭斑蝥之屬不惟傷胎且傷母矣用者不可造次下胎方千金去胎方見婦人規古方大麩曲五升漬酒一斗煮二三沸去滓分五服隔宿勿食旦再服其胎如縻母無所苦千金不傳下胎小品方見胎動欲墮扶羸小品方見婦人規古方虛弱人慾下胎宜用此人參粉草川芎肉桂乾薑桃仁黃芩蟹爪上等分每服一兩水二鍾煎八分空心服未動再服廣濟下胎方見婦人規古方並下死胎俱效天花粉四兩肉桂牛膝豆豉各三兩上咀用水七碗煎二碗半分三服每服後一時許又進一服良方桂心散見胎動欲墮一方不拘生胎死胎用蓖麻仁二個巴豆一個麝香一分研貼臍中並足心即下或月一粒溫酒吞下又方下生胎用蓖麻子一斷產方斷產小品方見婦人規古方斷產墮胎有驗故蠶蛻紙方一尺上燒為末空心酒調服終身不受孕千金斷產方見婦人規古方四物湯一劑芸臺子一撮即油菜子紅花水鍾半煎八分經後空心服則不受孕丹溪斷子法見婦人規古方用白麵曲一升無灰酒五升作糊煮至三升半濾去滓分作三服候經至前一日晚五更及天明各吃一服經即不行終身無子矣斷產灸法見婦人規古方一傳方欲絕產者灸臍下二寸三分陰動脈中三壯此當自臍中至骨際折作五寸約之產後類論產後大補氣血產後病治嘗見丹溪云產後當大補氣血即有雜證以末治之一切病多是血虛皆不可發表此其意謂血氣隨胎而去必屬大虛故無論諸證皆當以大補為先其他皆屬可緩余於初年誠然佩服及執而用之則每為所困經者數次始悟其言雖有理而未免言之過也即今產科所宗無非此法余目睹其誤及親為解救者蓋不少矣故敢剖析於後實有所見不得不言非存心自炫故毀先賢若然則徒為笑罵之招耳賓雖至愚必不為也觀者深察此意凡產後氣血俱去誠多虛證然有虛者有不虛者有全實者凡此三者但當隨證隨人辨其虛實以常法治療不得執有誠心概行大補以致助邪此辨不可不真也產後虛證無非隨人元氣必素弱之人多有之或於產後血氣俱去而更弱者亦有之此當因人察脈因脈察證若脈氣形氣病氣俱不足此當以全虛治之若形氣不足病氣有餘或兼火邪或兼外邪或以飲食停滯是亦虛中有實不得不詳審而治此中委曲未能言盡惟明者悟之產後不虛證蓋或其素日無病或以年少當時或以素耐辛苦貧勞之質此輩本無不足及其一旦受孕乃於無病腹中參入此物故致血氣壅塞為脹為嘔是皆添設有餘之病及其既產始見通快所留得去仍復故吾常人之產此類極多果何虛之有然或以內傷或以外感產後之病難保必無倘有所犯去之即愈若概行大補果能堪否即臨盆帶去血氣未免暫見耗損然以壅滯之餘不過皆護胎隨從之物去者當去生者旋生不出數日必已來復此生化自然之理何至是產皆虛也凡治此類但當因證用治若執云產後必當大補氣血則實實之病必所不免而輕者必甚甚者必危矣由此觀之則立言者固不易而用言者又豈易哉產後全實證有如外感風寒頭痛身熱便實中滿脈緊數洪大有力者此表邪之實證也又火之盛者必熱渴躁煩或便結腹脹口鼻舌焦黑酷喜冷飲眼哆尿管痛赤脈見洪滑此內熱之實證也又鬱怒動肝胸脅脹痛大便不利脈弦而滑此氣逆之實證也又惡露未盡瘀血上衝心腹脹滿疼痛拒按大便難而小便利此血逆之實證也又凡富貴之家保護太過或過用人參耆術以致氣壅或過用糖酒炭火以致內熱或產本不虛而妄用大補之藥以致增病此調攝之實證也又或因產過食恐其勞困固令勉強以致停蓄不散此內傷之實證也以上諸證姑舉要者以見其概然既有表邪則不得不解既有火邪則不得不清既有內傷停滯則不得不開通消導且人有強弱產有虛實病有真假治有逆從固不可以同日語也觀六元正紀大論曰婦人重身毒之何如曰有故無殞亦無殞也此自經常不易之大法亦何庸贅辨之若此第因丹溪之言人多偏執故不得不詳盡其說以解後人之惑也諸虛實治法詳具後條論產後三禁觀病機機要云治胎產之病當從厥陰證論之宜無犯胃氣及上二焦是為三禁謂不可汗不可下不可利小便發其汗則同傷寒下早之證利大便則脈數而傷脾利小便則內亡津液胃中結燥但使不犯三禁則營衛自和而寒熱自止矣凡用治之法如發渴則白虎氣弱則黃耆血痛則當歸腹痛則芍藥大抵產病天行從加減柴胡雜證從增損四物宜察脈證而用之詳此說雖為產育之大法然病變不同倘有是證則不得不用是藥所謂有病則病受之也第此經常之法固不可不知而應變之權亦不可執一也產後腹痛產後腹痛最當辨察虛實血有留瘀而痛者實痛也無血而痛者虛痛也大都痛而且脹或上衝胸脅或拒按而手不可近者皆實痛也宜行之散之若無脹滿或喜揉按或喜熱熨或得食稍緩者皆屬虛痛不可妄用推逐等劑凡新產之後多有兒枕腹痛者摸之亦有塊按之亦微拒手故古方謂之兒枕皆指為胞中之宿血此大不然夫胞胎俱去血亦豈能獨留蓋子宮蓄子既久忽爾相離血海陡虛所以作痛胞門受傷必致壅腫所以亦若有塊而實非真塊腫既未消所以亦頗拒按治此者但宜安養其臟不久即愈惟殿胞煎為最妙其次則四神散五物煎皆極佳者若誤認為瘀而妄用桃仁紅花玄胡青皮之屬反損臟氣必增虛病有母體本虛而少血者即於產時亦無多血此輩尤非血滯若有疼痛只宜治以前法或以大小營煎黃雌雞湯主之殿胞煎見小產論外方四神散見血寒論外方五物煎見血寒論外方大營煎見血熱經早小營煎見血虛經亂良方黃雌雞湯見婦人規古方治產後虛羸腹痛當歸白朮炒熟地黃黃耆炒桂心各半兩小黃雌雞一隻去頭足腸翅細切上先用水七碗煮雞至三碗每用汁一碗藥四錢煎日三服凡新產之後其有陽氣虛弱而寒從中生或寒由外入以致心腹作痛嘔吐不食四肢厥冷者宜九蜜煎大岩蜜湯或理陰煎主之產當寒月以致寒氣入腹臍下脹痛手不可近者宜羊肉湯主之若氣實寒甚者宜蟠蔥散九蜜煎見新方八陣因陣治產後陽氣虛寒或陰邪入臟心腹疼痛嘔吐不食四肢厥冷此與大岩蜜湯略同而稍勝之當歸熟地各三錢芍藥酒炒焦茯苓各錢半炙甘草乾薑炒肉桂北細辛各一錢吳茱萸制五分水二鍾煎服大岩蜜湯見婦人規古方治產後陽氣虛寒心腹作痛不食嘔吐四肢厥逆生地當歸芍藥炒乾薑吳茱萸桂心獨活甘草炒小草各一兩細辛半兩按小草即遠志之苗上每服半兩水煎服理陰煎見血寒經遲良方羊肉湯見婦人規古方治產婦脾虛寒邪內乘以致腹痛或頭眩臍脅急痛精羊肉四兩當歸川芎各半兩生薑一兩上以水十盞煎至四盞分四次空心服局方蟠蔥散見古方八陣熱陣治男婦脾胃虛冷滯氣不行攻刺心腹痛連胸脅膀胱小腸寒疝氣疝及婦人血氣刺痛蒼朮米泔浸切炙甘草各八錢三稜煨蓬朮煨茯苓青皮各六錢丁皮砂仁去殼檳榔各四錢延胡索三錢乾薑炒肉桂各三錢按丁皮即丁香樹皮上每服五錢水一盞入連根蔥白一莖煎七分空心熱服或為末用蔥湯調服二三錢產後惡露不盡留滯作痛者亦常有之然此與虛痛者不同必其由漸而甚或大小便不行或小腹硬實作脹痛極不可近手或自下上衝心腹或痛極牙關緊急有此實證當速去其血近上者宜失笑散近下者宜通瘀煎奪命丹回生丹或未效當用決津煎為善失笑散見經期腹痛通瘀煎見經期腹痛奪命丹見鬼胎回生丹見鬼胎決津煎見經期腹痛產後有脾虛腎虛而為腹痛者此不由產而由臟氣之不足若脾氣虛寒為嘔吐為少食而兼腹痛者宜五君子煎六君子湯溫胃飲之類主之若腎氣虛寒為瀉為利而兼腹痛者宜胃關煎理陰煎之類主之五君子煎見崩淋經漏不止六君子湯見經期腹痛溫胃飲見血虛經亂胃關煎見新方八陣熱陣治脾腎虛寒作瀉或甚至久瀉腹痛不止冷痢等證焦乾姜一至三錢吳茱萸五七分制白朮炒一至三錢熟地三五錢或一兩山藥炒二錢白扁豆炒二錢炙甘草一二錢水二鍾煎七分食遠溫服瀉甚者加肉豆蔻一二錢麵炒用或破故紙亦可氣虛勢甚者加人參隨宜用陽虛下脫不固者加製附子一二三錢腹痛甚者加木香七八分或加厚朴八分滯痛不通者加當歸二三錢滑脫不禁者加烏梅二個或北五味子二十粒若肝邪侮脾者加肉桂一二錢產後有飲食停滯及氣逆作痛亦當因其類而消去之如排氣飲大和中飲之類皆可酌用排氣飲見經期腹痛大和中飲見新方八陣和陣治飲食留滯積聚等證陳皮一二錢枳實一錢砂仁五分山楂二錢麥芽二錢厚朴一錢半澤瀉一錢半水一鍾半煎七八分食遠溫服脹甚者加白芥子胃寒無火或噁心者加炮乾薑一二錢疼痛者加木香烏藥香附之類多痰者加半夏仲景曰產後腹中㽲痛當歸生薑羊肉湯主之並治腹中寒疝虛勞不足當歸生薑羊肉湯見婦人規古方治產婦腹中㽲痛寒痛血氣不足虛弱甚者及寒月生產寒氣入於子門手不可犯臍下脹滿此產後之寒證也並治寒疝腹中痛及脅痛裡急者精羯羊肉一斤當歸三兩生薑五兩上用水八升煮取三升加蔥椒鹽溫服七合日三服若寒多者加生薑成一斤痛多而嘔者加橘皮二兩白朮一兩立齋曰前證若因氣滯用延胡索散若因外寒用五積散若因怒氣用四物加木香柴胡若因血虛用四物參朮炮姜若因陽氣虛弱用四君當歸炮姜若因脾虛血弱用六君當歸炮姜延胡索散即玄胡當歸散見經痛論外方局方五積散見古方八陣散陣治感冒寒邪頭疼身痛項背拘急惡寒嘔吐肚腹疼痛及寒濕客於經絡腰腳骨髓痠痛及痘瘡寒勝等證當歸麻黃蒼朮陳皮各一錢厚朴制乾薑炮芍藥枳殼各八分半夏白芷各七分桔梗炙甘草茯苓肉桂人參各五分川芎四分水二鍾姜三片蔥白三莖煎八分不拘時服又歌曰痢後偏生腳痛風局方五積自能攻就中或卻麻黃去酒煮多多服見功產後發熱產後發熱有風寒外感而熱者有邪火內盛而熱者有水虧陰虛而熱者有因產勞倦虛煩而熱者有去血過多頭暈悶亂煩熱者諸證不同治當辨察產後有外感發熱者蓋臨盆之際多有露體用力無暇他顧此時或遇寒邪則乘虛而入感之最易若見頭疼身痛憎寒發熱或腰背拘急脈見緊數即產後外感證也然此等外感不過隨感隨病自與正傷寒宿感者不同故略加解散即自痊可勿謂新產之後不宜表散但當酌其虛實而用得其宜耳凡產後感邪氣不甚虛者宜三柴胡飲若氣虛脾弱而感者宜四柴胡五柴胡飲若肝脾腎三陰不足而感者宜補陰益氣煎若虛寒之甚者宜理陰煎若產婦強壯氣實而感者宜正柴胡飲若兼內火盛而外邪不解者宜一柴胡飲若風寒俱感表裡俱滯者宜五積散三柴胡飲見熱入血室四柴胡飲見熱入血室五柴胡飲見新方八陣散陣五為土數從脾胃也脾土為五臟之本凡中氣不足而外邪有不散者非此不可此與四柴胡飲相表裡但四柴胡飲止調氣分此則兼培血氣以逐寒邪尤切於時用者也神效不可盡述凡傷寒瘧疾痘瘡皆所宜用柴胡一至三錢當歸二三錢熟地三五錢白朮二三錢芍藥錢半炒用炙甘草一錢陳皮酌用或不必用水一鍾半煎七分食遠熱服寒勝無火者減芍藥加生薑三五七片或乾薑一二錢或再加桂枝一二錢則更妙脾滯者減白朮氣虛者加人參隨宜腰痛者加杜仲頭痛者加川芎勞倦傷脾陽虛者加升麻一錢補陰益氣煎見熱入血室理陰煎見血寒經遲正柴胡飲見新方八陣散陣凡外感風寒發熱惡寒頭疼身痛痎瘧初起等證凡血氣平和宜從平散者此方主之柴胡一至三錢防風一錢陳皮一錢半芍藥二錢甘草一錢生薑三五片水一鍾半煎七八分熱服如頭痛者加川芎一錢如熱而兼渴者加葛根一二錢如嘔惡者加半夏一錢五分如濕勝者加蒼朮一錢如胸腹有微滯者加厚朴一錢如寒氣勝而邪不易解者加麻黃一二三錢去浮沫服之或蘇葉亦可一柴胡飲見熱入血室五積散見產後腹痛產後有火證發熱者但外感之熱多在表火證之熱多在裡此必以調攝太過或時令熱甚或強以酒或誤用參朮薑桂大補之藥或過用炭火或窗牖太密人氣太盛或氣體本實而過於動作凡屬太過者皆能生火火盛於內多見潮熱內熱煩渴喜冷或頭痛多汗便實尿赤及血熱妄行但無表證脈見緩滑不緊而發熱者便是火證宜清化飲保陰煎之類主之若本元不虛或火之甚而勢之急者即徙薪飲抽薪飲亦所常用不必疑也清化飲見血熱經早保陰煎見血熱經早徙薪飲見崩淋經漏不止抽薪飲見血熱經早產後有陰虛發熱者必素稟脾腎不足及產後氣血俱虛故多有之其證則倏忽往來時作時止或晝或夜進退不常或精神困倦怔忡恍惚但察其外無表證而脈見弦數或浮弦豁大或微細無力其來也漸非若他證之暴至者是即陰虛之候治當專補真陰宜小營煎三陰煎五陰煎之類隨宜主之小營煎見血虛經亂三陰煎見血虛經亂五陰煎見血虛經亂若陰虛兼火而微熱者宜一陰煎若陰虛兼火之甚而大熱者宜加減一陰煎若陰虛火盛熱而多汗者宜當歸六黃湯若陰中之陽虛火不歸源而熱者宜大營煎理陰煎右歸飲之類主之若血虛陽不附陰煩熱作渴者宜人參當歸湯若氣血俱虛發熱煩躁面赤作渴宜八珍湯十全大補湯若熱甚而脈微者宜急加桂附或以為火則禍在反掌一陰煎見血虛經亂加減一陰煎見血熱經遲當歸六黃湯見熱入血室大營煎見血熱經早理陰煎見血寒經遲右歸飲見腎虛經亂人參當歸湯見婦人規古方治去血過多內熱短氣頭痛悶亂骨節作痛或虛煩咽燥人參當歸生地桂心麥冬白芍藥各等分上用粳米一合竹葉十片水二鍾煎一鍾去米入藥五錢棗二枚煎服或總煎之亦可虛甚者用熟地黃八珍湯見經不調十全大補湯見調經論外備用方產後有去血過多發熱者其證必煩渴短氣頭痛頭暈悶亂內熱是亦陰虛之屬宜人參當歸湯主之立齋曰大凡元氣虛弱而發熱者皆內真寒而外假熱也但用六君或補中益氣加炮姜溫補脾氣諸證自退若四肢畏冷急加附子凡新產陰血暴傷陽無所附而外熱宜用四物炮姜補陰以配陽若因誤服寒涼克伐之劑而外熱此為寒氣格陽於外宜用四君子加薑桂如不應急加附子若或肌膚髮熱面目赤色煩渴引飲此血脫髮躁宜用當歸補血湯六君子湯見經期腹痛補中益氣湯見經不調當歸補血湯見崩淋經漏不止產後乍寒乍熱產後乍寒乍熱總由血氣虛損陰陽不和而然若陽勝則乍熱陰勝則乍寒凡陰勝而寒多者宜增損四物湯理陰煎若陽勝而熱多者宜四物湯三陰煎若陽氣陷入陰中而乍寒乍熱者宜補中益氣湯補陰益氣煎若陰陽俱虛而寒熱者宜八珍湯十全大補湯若敗血不散流入陰中而作寒熱者宜決津煎殿胞煎若血實氣壅者宜奪命丹增損四物湯見血寒論外方理陰煎見血寒經遲四物湯見經不調三陰煎見血虛經亂補中益氣湯見經不調補陰益氣煎見熱入血室八珍湯見經不調十全大補湯見調經論外備用方決津煎見經期腹痛殿胞煎見小產論外方奪命丹見鬼胎陳無擇曰敗血流閉諸陰則寒流閉諸陽則熱宜五積散若有外感者宜從前產後發熱治五積散見產後腹痛蓐勞蓐草荐也產婦坐草艱難以致過勞心力故曰蓐勞此即產後勞倦也其證則或為寒熱如瘧或頭疼自汗或眩暈昏沉或百節疼痛或倦怠喘促飲食不甘形體虛羸之類皆其候也悉當以培補元氣為主若初產後蓐勞困倦惟豬腰湯為妙或用黃雌雞湯白茯苓散若蓐勞虛汗不止宜母雞湯若兼臟寒者宜羊肉湯若氣血俱虛者宜五福飲十全大補湯若兼外邪發熱而中寒背惡寒者宜理陰煎詳加減法治之若兼陽虛內寒者宜五君子煎或理陰煎若陽盛陰虛兼內熱者宜五福飲加芍藥黃芩地骨皮之類隨宜用之豬腰湯見婦人規古方治產後褥勞寒熱如瘧自汗無力咳嗽頭痛腹痛俱效豬腰一對當歸白芍藥酒炒各一兩上以藥二味用水三碗煎至二碗去滓將豬腰切如骰子塊同晚米一合香豉一錢和蔥椒鹽煮稀粥空心日服一次神效或加人參更妙黃雌雞湯見產後腹痛白茯苓散見婦人規古方治產後蓐勞頭目肢體疼痛寒熱如瘧白茯苓一兩人參當歸黃耆川芎白芍藥炒熟地桂心各半兩豬腰一對上以水三盞入豬腰並薑棗各三事煎二盞去渣入前藥半兩煎一盞服母雞湯見婦人規古方治產後褥勞虛汗不止人參黃耆白朮白茯苓麻黃根牡蠣煅各三錢上用母雞一隻去毛雜淨水六七碗同藥煮至三碗任意服之羊肉湯見產後腹痛五福飲見血熱經早十全大補湯見調經論外備用方補陰益氣煎見熱入血室補中益氣湯見經不調理陰煎見血寒經遲五君子煎見崩淋經漏不止產後喘促產後喘急有二乃一以陰虛之極一以寒邪在肺蓋產後既以大虛焉得氣實而喘若肺無寒邪而見喘促者此以血去陰虛孤陽無主故氣窮短促而浮脫於上此實肝腎不接無根將脫之兆最為危候經曰肝苦急急食甘以緩之正此類也惟貞元飲為治此之神劑若氣虛兼寒者宜大補元煎或理陰煎若風寒外感邪氣入肺而喘急者此必氣粗胸脹或多咳嗽自與氣短似喘上下不接者不同治當以疏散兼補為主宜金水六君煎或六君子湯若單以寒邪入肺氣實氣壅而本無虛者宜六安煎或二陳湯加蘇葉之類主之貞元飲見新方八陣補陣治氣短似喘呼吸促急提不能升咽不能降氣道噎塞勢劇垂危者世人但知為氣急其病在上而不知元海無根虧損肝腎此子午不交氣脫證也尤為婦人血海常虧者最多此證宜急用此飲以濟之緩之敢云神劑凡診此證脈必微細無神若微而兼緊尤為可畏倘庸眾不知妄云痰逆氣滯用牛黃蘇合及青皮陳皮枳殼破氣等劑則速其危矣熟地七八錢甚者一二兩炙甘草一至三錢當歸二三錢水二鍾煎八分溫服如兼嘔惡或惡寒者加煨姜三五片如氣虛脈微至極者急加人參隨宜如肝腎陰虛手足厥冷加肉桂一錢大補元煎見血熱經早理陰煎見血寒經遲金水六君煎見新方八陣和陣治肺腎虛寒水泛為痰或年邁陰虛血氣不足外受風寒咳嗽嘔惡多痰喘急等證神效當歸二錢熟地三五錢陳皮一錢半半夏二錢茯苓二錢炙甘草一錢水二鍾生薑三五七片煎七八分食遠溫服如大便不實而多濕者去當歸加山藥如痰盛氣滯胸脅不快者加白芥子七八分如陰寒盛而嗽不愈者加細辛五七分如兼表邪寒熱者加柴胡一二錢六君子湯見經期腹痛六安煎見新方八陣和陣治風寒咳嗽及非風初感痰滯氣逆等證陳皮一錢半半夏二三錢茯苓二錢甘草一錢杏仁一錢去皮尖切白芥子五七分老年氣弱者不用水一鍾半加生薑三五七片煎七分食遠服凡外感風邪咳嗽而寒氣盛者多不易散宜加北細辛七八分或一錢若冬月嚴寒邪甚者加麻黃桂枝亦可若風勝而邪不甚者加防風一錢或蘇葉亦可若頭痛鼻塞者加川芎白芷蔓荊子皆可若兼寒熱者加柴胡蘇葉若風邪咳嗽不止而兼肺胃之火者加黃芩一二錢甚者再加知母石膏所用生薑只宜一片凡寒邪咳嗽痰不利者加當歸二三錢老年者尤宜若氣血不足者當以金水六君煎與此參用凡非風初感痰勝而氣不順者加藿香一錢五分兼脹滿者加厚朴一錢暫開痰氣然後察其寒熱虛實而調補之若氣虛猝倒及氣平無痰者皆不可用此方二陳湯見安胎喘嗽論外方陳氏二母散見婦人規古方治產後熱血上攻留於肺經咳嗽喘促知母貝母人參桃仁杏仁俱去皮尖白茯苓上等分每服五錢加姜水煎服二味參蘇飲見婦人規古方治產後瘀血入肺咳嗽喘急人參一兩蘇木二兩上作一劑水煎服若既愈當用六君子以補脾胃若口鼻黑氣起宜急用此藥加附子五錢亦有得生者產後惡露不止產後惡露不止若因血熱者宜保陰煎清化飲有傷衝任之絡而不止者宜固陰煎加減用之若肝脾氣虛不能收攝而血不止者宜壽脾煎或補中益氣湯若氣血俱虛而淡血津津不已者宜大補元煎或十全大補湯若怒火傷肝而血不藏者宜加味四物湯若風熱在肝而血下泄者宜一味防風散一止血方用蒲黃二兩水煎頓服保陰煎見血熱經早清化飲見血熱經早固陰煎見腎虛經亂壽脾煎見血虛經亂補中益氣湯見經不調大補元煎見血熱經早十全大補湯見調經論外備用方加味四物湯見經不調一味防風散見崩漏論外方血不止論外方人參當歸湯見產後發熱佛手散見殺血心痛產後發痙產後發痙乃陰血大虧證也其證則腰背反張戴眼直視或四肢強勁身體抽搐在傷寒家雖有剛痙柔痙之辨然總之則無非血燥血枯之病而實惟足太陽與少陰主之蓋膀胱與腎為表裡腎主精血而太陽之脈絡於頭目項背所以為病若此若其所致之由則凡如傷寒誤為大汗以亡液大下以亡陰或潰瘍膿血大泄之後乃有此證故在產後亦惟去血過多或大汗大瀉而然其為元氣虧極血液枯敗也可知凡遇此證速當察其陰陽大補氣血用大補元煎或理陰煎及十全大補湯之類庶保其生若認為風痰而用發散消導等劑則死無疑矣大補元煎見血熱經早理陰煎見血寒經遲十全大補湯見調經論外備用方產後大便秘澀產後大便秘澀以其失血亡陰津液不足而然宜濟川煎加減主之及後立齋法俱妙濟川煎見新方八陣補陣凡病涉虛損而大便閉結不通則硝黃攻擊等劑必不可用若勢有不得不通者宜此主之此用通於補也當歸三五錢牛膝二錢肉蓯蓉酒洗去咸二三錢澤瀉一錢半升麻五七分或一錢枳殼一錢虛甚者不必用水一鍾半煎八分食前服如氣虛者但加人參無礙如有火加黃芩如腎虛加熟地立齋曰前證若計其日期飲食已多即用藥通之禍在反掌之間矣必待其腹滿覺脹欲去不能者此乃結在大腸宜用豬膽汁潤之若服苦寒疏通反傷中氣通而不止或成他證若去血過多用十全大補湯血虛火燥用加味四物湯氣血俱虛用八珍湯雖數日不通飲食如常腹中如故仍用八珍加桃仁杏仁治之若泥其日期飲食之多而通之則誤矣十全大補湯見調經論外備用方加味四物湯見經不調八珍湯見經不調產後雜證方良方黃龍湯產後外感見調經論外備用方良方交加散產後中風見經痛論外方海藏愈風湯見古方八陣和陣一名舉卿古拜散治一切失血筋脈緊急產後或汗後搐搦荊芥穗為細末上先炒大豆黃卷以酒沃之去黃卷取淨汁調前末三四錢服之輕者一服重者二三服即止氣虛者忌服童便調亦可交加散見古方八陣和陣產後類風不省人事治瘈瘲或戰振或產後不省人事口吐痰涎當歸荊芥穗等分上為細末每服二錢水一鍾酒少許煎七分灌服神效良方七珍湯見婦人規古方治產後不語人參石菖蒲生地川芎各一兩細辛七錢防風硃砂另研各半兩上為末每服一錢薄荷湯調服補脬飲見婦人規古方治產後傷動脬破不能小便而淋瀝生黃絲絹一尺剪碎白牡丹皮根白芨各一錢俱為末用水一碗同煮至絹爛如餳空心頓服服時不得作聲作聲則不效人參湯產後諸虛見調經論外備用方良方麻黃根湯見婦人規古方治產後虛汗不止身熱發渴驚悸不安麻黃根人參黃耆炒當歸牡蠣煅粉甘草上每服四五錢水煎服良方趁痛散見婦人規古方治產後骨節疼痛發熱頭重四肢不舉牛膝酒炒甘草炒薤白各一兩當歸白朮炒黃耆炒桂心獨活加姜各半兩上每服半兩水煎加味小柴胡湯乳母肝火發熱見經不調帶濁夢遺類帶下凡婦人淋帶雖分微甚而實為同類蓋帶其微而淋其甚者也總由命門不固而不固之病其因有六蓋一以心旌之搖之也心旌搖則命門應命門應則失其所守此由於不遂者也一以多欲之滑之也情欲無度縱肆不節則精道滑而命門不禁此由於太遂者也一以房室之逆之也凡男女相臨遲速有異此際權在男子而婦人情興多致中道而止止則逆逆則為濁為淋此由於遂而不遂乃女子之最多而最不肯言者也以上三證凡帶濁之由乎此者十居八九而三者之治必得各清其源庶可取效然源未必清而且旋觸旋發故藥餌之功必不能與情竇爭勝此帶濁之所以不易治也此三者之外則尚有濕熱下流者有虛寒不固者有脾腎虧陷而不能收攝者當各因其證而治之心旌搖心火不靜而帶下者先當清火宜硃砂安神丸清心蓮子飲直指固精丸之類主之若無邪火而但見心虛帶下者宜秘元煎人參丸心虛白濁歌茯菟丸之類東垣硃砂安神丸見古方八陣寒陣一名黃連安神丸治心神煩亂發熱怔忡不寐或寐中驚悸頭運同暈等證生地硃砂另飛為衣當歸各一錢甘草五分黃連一錢半湯浸蒸餅為丸黍米大每服十五丸或二十丸津液咽之或食後用溫水涼水送下亦可清心蓮子飲見古方八陣寒陣治熱在氣分口乾作渴小便淋濁或口舌生瘡咽疼煩躁黃芩麥冬地骨皮車前子炒甘草各錢半人參黃耆石蓮子柴胡茯苓各一錢上每服五錢水煎服直指固精丸見古方八陣固陣治腎虛有火精滑心神不安黃柏酒炒知母酒炒各一兩牡蠣煅龍骨煅蓮蕊芡實山茱萸遠志甘草制茯苓各三錢上為末山藥糊丸桐子大每服五十丸空心溫酒下秘元煎見血虛經亂人參丸見古方八陣補陣寧心益智安神固精人參茯苓茯神棗仁遠志益智牡蠣各五錢硃砂二錢半為末棗肉丸服心虛白濁歌見古方八陣補陣白濁皆因心氣虛不應只作腎虛醫四君子湯加遠志一服之間見效奇局方茯菟丸見古方八陣固陣治思慮太過心腎虛損真陽不固尿有餘瀝或小便白濁夢寐遺精等證菟絲子制五兩白茯苓三兩石蓮肉二兩酒糊丸桐子大每服三五十丸空心鹽湯或米湯下一方有北五味子四兩兼治三消欲事過度滑泄不固而帶下者宜秘元煎壽脾煎固陰煎苓朮菟絲丸濟生固精丸鎖精丸金鎖思仙丹之類主之壽脾煎見血虛經亂固陰煎見腎虛經亂苓朮菟絲丸見新方八陣固陣治脾腎虛損不能收攝以致夢遺精滑困倦等證白茯苓白朮米泔洗炒蓮肉去心各四兩五味二兩酒蒸山藥炒二兩杜仲酒炒三兩炙甘草五錢菟絲子用好水淘淨入陳酒浸一日文火煮極爛搗為餅焙乾為末十兩上用山藥末以陳酒煮糊為丸桐子大空心滾白湯或酒下百餘丸如氣虛神倦不能收攝者加人參三四兩尤妙濟生固精丸見古方八陣固陣治下元虛損白濁如脂或胞氣虛寒腰重少力小便無度並效牡蠣煅菟絲子酒浸蒸炒韭子炒龍骨煅北五味炒白茯苓桑螵蛸酒炙白石脂煅各等分上為細末酒糊丸桐子大每服七十丸空心鹽湯下局方鎖精丸見古方八陣固陣治白濁白帶小便頻數破故紙青鹽白茯苓五味子炒等分一方用五倍子上為末酒糊丸桐子大每服三十丸空心溫酒下萬氏金鎖思仙丹見古方八陣固陣治男子嗜欲太過精血不固此澀以去脫之劑蓮蕊芡實石蓮子各十兩金櫻膏三斤上以金櫻煎膏如餳入前三味藥末和丸桐子大空心鹽酒下三十丸服久精神完固大能延年平時服食忌葵菜車前子人事不暢精道逆而為濁為帶者初宜六味地黃湯或威喜丸之屬以利之久不止者宜固陰煎苓朮菟絲丸之屬以固之六味地黃湯見經不調和劑威喜丸見古方八陣固陣治元陽虛憊精滑白濁遺尿及婦人血海久冷淫帶夢泄等證白茯苓去皮四兩切塊同豬苓二錢五分同於瓷器內煮二十餘沸取出曬乾不用豬苓黃蠟四兩上以茯苓為末熔黃蠟搜和為丸如彈子大每空心細嚼滿口生津徐徐咽服以小便清利為效忌米醋惟糠醋可用尤忌氣怒動性濕熱下流而為帶濁脈必滑數色見紅赤證有煩渴而多熱者宜保陰煎加味逍遙散或經驗豬肚丸亦佳若熱甚兼淋而赤者宜龍膽瀉肝湯保陰煎見血熱經早加味逍遙散見經不調經驗豬肚丸見古方八陣固陣止夢遺泄精進飲食健肢體此藥神應瘦者服之自肥莫測其理白朮麵炒五兩苦參白者三兩牡蠣左扇者煅研四兩上為末用雄豬肚一具洗淨以瓷罐煮極爛木石臼搗如泥和藥再加豬肚汁搗半日丸如小豆大每服四五十丸日進三服米飲下久服自覺身肥而夢遺永止龍膽瀉肝湯見產門不閉元氣虛弱而帶下者宜壽脾煎菟絲煎七福飲十全大補湯九龍丸之屬若陽氣虛寒脈見微澀色白清冷腹痛多寒者宜加薑附或用家韭子丸菟絲煎見安胎七福飲見血虛經亂十全大補湯見調經論外備用方丹溪九龍丸見古方八陣固陣治腎虛精滑金櫻子枸杞山茱萸蓮蕊蓮肉當歸熟地芡實白茯苓各等分上為末酒糊丸桐子大每服五六十丸或酒或鹽湯下三因家韭子丸見古方八陣固陣治少長遺溺及男子虛劇陽氣衰敗小便白濁夜夢遺精此藥補養元氣進美餘食按此方當除去石斛倍用菟絲庶乎尤效家韭子炒六兩鹿茸酥炙四兩肉蓯蓉酒浸牛膝酒浸熟地當歸各二兩菟絲子酒煮巴戟肉各一兩半杜仲炒石斛桂心乾薑炮各一兩酒糊丸桐子大每服五七十丸加至百餘丸食前溫酒鹽湯任下凡小兒遺尿者多因胞指膀胱寒亦稟受陽氣不足也作小丸服之脾腎氣虛下陷而多帶者宜用壽脾煎歸脾湯補中益氣湯之屬歸脾湯見經不調補中益氣湯見經不調立齋曰前證或因六淫七情或因醉飽房勞或因膏粱厚味或服燥劑所傷或虧損陽氣下陷或濕痰下注蘊積而成故言帶也凡此皆當壯脾胃升陽氣為主佐以各經見證之藥若色青者屬肝用小柴胡加山梔或濕熱壅滯小便赤澀龍膽瀉肝湯色赤者屬心用小柴胡加黃連山梔當歸思慮過傷用妙香散等藥色白者屬肺用補中益氣加山梔色黃者屬脾用六君子加山梔柴胡不應歸脾湯色黑者屬腎用六味地黃丸若氣血俱虛八珍湯陽氣陷下補中益氣湯濕痰下注前湯加茯苓半夏蒼朮黃柏氣虛痰飲下注四七湯送腎氣丸不可拘肥人多痰瘦人多火而以燥濕瀉火之藥輕治之也小柴胡湯見崩淋經漏不止良方辰砂妙香散見古方八陣固陣治心氣不足驚癇或精神恍惚虛煩少氣少睡夜多盜汗心虛遺精白濁服之安神鎮心黃耆山藥薑汁炒茯苓茯神遠志甘草湯制各一兩人參炙甘草桔梗各五錢木香二錢麝香一錢另研硃砂三錢另研上為末每服二錢不拘時溫酒調下或用麥麵湯調下局方王荊公妙香散見古方八陣固陣安神秘精定心氣人參龍骨五色者益智各一兩白茯神白茯苓遠志制甘草炙各五錢硃砂飛二錢半上為末每服二錢空心臨臥溫酒調下六君子湯見經期腹痛八珍湯見經不調四七湯見安胎腎氣丸即八味丸見經不調帶濁論外方醋附丸治氣滯帶濁腹中急痛見經痛論外方金櫻膏見古方八陣補陣治虛勞遺精白濁最效金櫻子經霜後採紅熟者撞去刺切開去核搗碎煮之濾榨淨汁用熬成膏人參桑螵蛸新瓦焙燥山藥各二兩杜仲薑汁益智仁各一兩薏仁山茱萸芡實枸杞各四兩青鹽三錢上咀用水同熬二次去渣熬成膏將金櫻膏對半和勻空心白滾湯下三四匙克應丸見婦人規古方治婦人赤白帶下熟地赤芍各二兩當歸二兩赤石脂煅醋淬龍骨牡蠣煅酒淬茯苓丹皮艾葉制川芎各一兩上為末醋糊丸桐子大每服五十丸空心白湯送下百一固元丹見古方八陣固陣治元臟久虛遺精白濁五淋及小腸膀脫疝氣婦人赤白帶下血崩便血等疾以小便頻利為效好蒼朮刮淨米泔浸咀片一斤擇堅而小者佳惟茅山者尤妙分作四份制之一份用小茴香食鹽各一兩同炒一份用川椒補骨脂各一兩同炒一份用川烏頭川楝子肉各一兩同炒一份用醇醋老酒各半斤同煮乾焙燥上連炒諸藥同為末用酒煮糊丸桐子大每服三五十丸男以溫酒女以醋湯空心下此高司法方也白芷散治下元虛滑見調經論外備用方益母丸治帶濁諸病見產要海藏白芍藥散見婦人規古方治婦人赤白帶下臍腹疼痛如神白芍二兩炒乾薑半兩炒上為細末每服三錢空心溫米湯調下晚又進一服十日見效白濁遺淋淫濁與帶下之不同者蓋白帶出於胞宮精之餘也淫濁出於膀胱水之濁也雖膀胱與腎為表裡故帶濁之源無非皆出於陰分然帶由脾腎之虛滑者多淫濁由膀胱之濕熱者多此其所以有辨也若淫濁初起而見熱澀者宜大分清飲若初起無火而但有窒塞者宜小分清飲或五苓散若肝經怒火下流宜加味逍遙散若肝火盛而見痛澀者宜龍膽瀉肝湯若服寒涼利藥太過以致下焦虛寒不固者宜萆薢分清飲若元氣虛寒下陷者宜壽脾煎補中益氣湯若脾濕下流者宜歸脾湯六君子湯若久而不愈肝腎虛滑下陷者宜壽脾煎秘元煎家韭子丸大分清飲見新方八陣寒陣治積熱閉結小水不利或致腰腹下部極痛或濕熱下利黃疸溺血邪熱蓄血腹痛淋閉等證茯苓澤瀉木通各二錢豬苓一錢梔子二錢枳殼車前子各一錢水一鍾半煎八分食遠溫服如內熱甚者加黃芩黃柏草龍膽之屬如大便堅硬脹滿者加大黃二三錢如黃疸小水不利熱甚者加茵陳二錢如邪熱蓄血腹痛者加紅花青皮各一錢五分小分清飲見新方八陣和陣治小水不利濕滯腫脹不能受補等證此方主之茯苓二三錢澤瀉二三錢薏仁二錢豬苓二三錢枳殼一錢厚朴一錢水一鍾半煎七分食前服如陰虛水不能達者加生地牛膝各二錢如黃疸者加茵陳二錢如無內熱而寒滯不行者加肉桂一錢仲景五苓散見古方八陣和陣治暑熱煩躁霍亂泄瀉小便不利而渴淋澀作痛下部濕熱白朮豬苓茯苓各七錢半桂枝五錢澤瀉一兩二錢半古法為細末每服二錢白湯調下日三服今法以水煎服加味逍遙散見經不調龍膽瀉肝湯見產門不閉楊氏萆薢分清飲見古方八陣熱陣治真元不足下焦虛寒或服寒涼刮藥過多小便白濁頻數無度澄如膏糊等證益智仁川萆薢石菖蒲烏藥各等分上㕮咀每服五六錢水一鍾入鹽一捻煎七分食前溫服一方加茯苓甘草壽脾煎見血虛經亂補中益氣湯見經不調歸脾湯見經不調六君子湯見經期腹痛秘元煎見血虛經亂家韭子丸見帶下淋濁論外方良方滑石散見婦人規古方治熱淋滑石五分研通草車前子葵子各四分上為末以漿水調服牛膝膏見古方八陣和陣治死血作淋桃仁去皮尖歸尾酒洗各一兩生地黃酒洗赤芍藥各兩半川芎五錢牛膝去蘆四兩酒浸一宿上㕮咀用好水十鍾炭火慢煎至二鍾入麝香少許分四次空心服如夏月須用冷水換浸之則不壞三味牛膝湯見古方八陣寒陣治小便不通莖中痛及婦人血熱內結腹堅痛牛膝根葉一握生用當歸一兩黃芩去黑心半兩上咀每服一兩許水一鍾半煎七分食遠服日三婦人夢與鬼交人稟五行正氣以生氣正則正氣邪則邪氣強則神旺氣衰則鬼生如刺法論曰神失守位則邪鬼外干即此類也然婦人之夢與邪交其證有二一則由欲念邪思牽擾意志而為夢者此鬼生於心而無所外干也一則由稟賦非純邪得以入故妖魅敢於相犯此邪之自外至者亦有之矣病因有內外則證亦有不同病由內生者外無形跡不過於夢寐間常有所遇以致遺失及為恍惚帶濁等證亦如男子之夢遺其機一也但在女子多不肯言耳至若外有邪犯者其證則異或言笑不常如有對晤或喜幽寂不欲見人或無故悲泣而面色不變或面帶桃花其脈息則乍疏乍數三五不調或伏沉或促結或弦細或代易不常是皆妖邪之候凡此二者若失於調理久之不愈則精血日敗真陰日損乃致潮熱發熱神疲體倦飲食日減經水日枯肌肉消削漸成勞損脈見緊數多致不救凡治此者所因雖有不同而傷精敗血其病則一故凡病生於心者當先以靜心為主然後因其病而藥之神動者安其神定其志精滑者固其精養其陰尤當以培補脾腎要約門戶以助生氣為主若為妖魅所侵則內當調補正氣如歸神湯之類外宜速灸鬼哭穴以驅邪氣則自當漸愈其穴以兩手大指相併縛定用艾炷於爪甲角騎縫灸之務令兩甲連肉四處著火方效或七壯或二七壯兩足大趾亦名足鬼眼集驗歸神湯見婦人規古方治婦人夢交盜汗心神恍惚四肢乏力飲食少進人參白朮白茯苓歸身各一錢棗仁陳皮各八分圓眼肉七枚甘草羚羊角琥珀末各五分上羚羊琥珀二味不煎余藥煎熟去渣入二末和勻食前服乳病類乳少婦人乳汁乃衝任氣血所化故下則為經上則為乳若產後乳遲乳少者由氣血之不足而猶或無乳者其為衝任之虛弱無疑也治當補化源而兼通利宜豬蹄湯若乳將至而未得通暢者宜湧泉散豬蹄湯見婦人規古方治氣血不足乳汁不下用八物湯即八珍湯加黃耆漏蘆陳皮木通先以豬蹄煮汁二碗煎藥服之或加天花粉又方用豬蹄一副通草二兩甘草一錢穿山甲十四片炒將豬蹄洗切入水六碗同藥煎煮約至三碗加蔥薑鹽料取汁飲之忌冷物要吃羹湯助其氣血乳汁自下夏月不可失蓋時用蔥湯洗乳為佳良方湧泉散見婦人規古方下乳忌食薑椒辛辣飲食王不留行瞿麥麥門冬龍骨各二錢上用豬蹄汁一碗酒一杯煎服以木梳於乳上梳下產婦乳汁不來其原有二蓋一因氣血不足故乳汁不來宜用豬蹄湯是即虛者補之也一因肥胖婦人痰氣壅盛乳滯不來者宜用漏蘆湯之類是壅者行之也良方漏蘆湯見婦人規古方治婦人肥盛脈氣壅結乳少漏蘆二兩蛇蛻一條土瓜根上共為末酒調下二錢乳出產後乳自出乃陽明胃氣之不固當分有火無火而治之無火而泄不止由氣虛也宜八珍湯十全大補湯若陽明血熱而溢者宜保陰煎或四君子湯加梔子若肝經怒火上衝乳脹而溢者宜加減一陰煎若乳多脹滿而溢者宜溫帛熨而散之若未產而乳自出者以胎元薄弱滋溉不全而然謂之乳泣生子多不育八珍湯見經不調十全大補湯見調經論外備用方保陰煎見血熱經早四君子湯見血虛經亂加減一陰煎見血熱經遲吹乳妒乳產後吹乳因兒飲乳為口氣所吹致令乳汁不通壅結腫痛不急治之多成癰腫速服栝蔞散外以南星末敷之更以手揉散之勢甚者惟連翹金貝煎最妙栝蔞散見婦人規古方治吹乳腫痛栝蔞一個乳香二錢上用酒煎服外用南星為末以溫湯調塗連翹金貝煎見新方八陣因陣治陽分癰毒或在臟腑肺膈胸乳之間者此方最佳甚者連用數服無有不愈金銀花貝母土者更佳蒲公英夏枯草各三錢紅藤七八錢連翹一兩或五七錢用好酒二碗煎一碗服服後暖臥片時火盛煩渴乳腫者加天花粉若陽毒內熱或在頸項之間者用水煎亦可產後妒乳因無兒飲乳或兒未能飲余乳蓄結作脹或婦人血氣方盛乳房作脹以致腫痛增通憎寒發熱不吮通之必致成癰若腫不消用麥芽二三兩炒熟水煎服立消一方用陳皮一兩甘草一錢水煎服一方治吹乳乳癰腫痛用萱草根擂酒服之以滓菴患處袖珍方用豬牙皂角去皮蜜炙為末酒服一錢又詩云婦人吹奶法如何皂角燒灰蛤粉和熱酒一杯調八字管教時刻笑呵呵乳癰乳岩腫痛勢甚熱毒有餘者宜以連翹金貝煎先治之甚妙立齋法曰婦人乳癰屬膽胃二腑熱毒氣血壅滯故初起腫痛發於肌表肉色焮赤其人表熱發熱或發寒熱或憎寒頭痛煩渴引飲用人參敗毒散神效栝蔞散加味逍遙散治之腫自消散若至數日之間膿成潰竅稠膿湧出膿儘自愈若氣血虛弱或誤用敗毒久不收斂膿清脈大則難治乳岩屬肝脾二臟鬱怒氣血虧損故初起小核結於乳內肉色如故其人內熱夜熱五心煩熱肢體倦瘦月經不調用加味逍遙散加味歸脾湯神效栝蔞散多自消散若積久漸大巉巖色赤出水內潰深洞為難療但用前歸脾湯等藥可延歲月若誤用攻伐危殆迫矣大凡乳證若因恚怒宜疏肝清熱焮痛寒熱宜發表散邪焮腫痛甚宜清肝消毒並隔蒜灸不作膿或膿不潰補氣血為主不收斂或膿稀補脾胃為主膿出反痛或發寒熱補氣血為主或晡熱內熱補血為主若飲食少思或作嘔吐補胃為主飲食難化或作泄瀉補脾為主勞碌腫痛補氣血為主怒氣腫痛養肝血為主兒口所吹須吮通揉散成癰治以前法潮熱暮熱亦主前藥大抵男子多由房勞耗傷肝腎婦人鬱怒虧損肝脾治者審之世有孕婦患此名曰內吹然其所致之因則一惟用藥不可犯其胎耳連翹金貝煎見吹乳人參敗毒散見古方八陣散陣亦名敗毒散治四時傷寒瘟疫憎寒壯熱風濕風眩項強身體疼痛不問老少皆可服或嶺南煙瘴之地疫癘時行或處卑濕腳氣痿弱等證此藥不可缺日三服以效為度人參茯苓枳殼甘草川芎羌活獨活前胡柴胡桔梗各等分水一鍾半姜三片煎服或為細末沸湯點服神效栝蔞散見外科鈐古方治乳癰及一切癰疽初起腫痛即消膿成即潰膿出即愈治癰之方甚多獨此方神效瘰癧瘡毒尤效凡一切癰疽餘毒皆宜用之栝蔞一個爛研當歸酒洗生甘草各半兩乳香沒藥各一錢上用酒煎服良久再服如不能飲以酒水各半煎之如數劑不效宜以補氣血之藥兼服之若肝經血虛結核不消佐以四物柴胡升麻白朮茯苓若肝脾氣血虛弱佐以四君芎歸柴胡升麻若憂鬱傷脾氣血虧損佐以歸脾湯加味逍遙散見經不調加味歸脾湯見胎漏子嗣類宜麟策總論共十二段天地絪縕萬物化醇男女構精萬物化生此造化自然之理也亦無思無為之道也故有人道即有夫婦有夫婦即有子嗣又何有乏嗣之說然天有不生之時地有不毛之域則人不能無乏嗣之流矣然則生者自生乏者當乏而求嗣之說又何為之果可求耶果不可求耶則其中亦自有說亦自有法矣所謂說者非為不生不毛者而說也亦非為少壯強盛者而說也蓋不生不毛者出於先天之稟賦非可以人力為也少壯強盛者出於妙合之自然不必識不必知也惟是能子弗子者無後難堪本非天付衰老無兒者精力日去豈比少年此所以有挽回之人力則有說而有法矣雖法之垂諸古者已不為少然以余覺之則若有未盡其妙蘊者焉因而臚列其法曰天時曰地利曰人事曰藥食曰疾病總五類二十四條但凡其一便足敗乃公事矣賓於晚年得子率鑑乎此凡苦於是者惟察之信之則祚㣧之猷或非渺小故命之曰宜麟策時氣天時一凡交會下種之時古云宜擇吉日良時天德月德及干支旺相當避丙丁之說顧以倉猝之頃亦安得擇而後行似屬迂遠不足憑也然惟天日晴明光風霽月時和氣爽及情思安寧精神閒裕之況則隨行隨止不待擇而人人可辨於斯得子非惟少疾而必且聰慧賢明胎元稟賦實基於此至有不知避忌者犯天地之晦冥則受愚蠢迷濛之氣犯日月星辰之薄蝕則受殘缺刑剋之氣犯雷霆風雨之慘暴則受狠惡驚狂之氣犯不陰不陽倏熱倏寒之變幻則受奸險詭詐之氣故氣盈則盈乘之則多壽氣縮則縮犯之則多夭顧人生六合之內凡生長壯老已何非受氣於生成而智愚賢不肖又孰非稟質於天地此感兆元始之大本苟思造命而贊化育則當以此為首務陰陽天時二乾道成男坤道成女此固生成之至道然亦何以見之亦何以用之蓋乾坤之用用在坎離坎離之用陰陽而已夫離本居陽何以為女以陽之中而陰之初也坎本居陰何以為男以陰之中而陽之初也蓋中者盛於上盛者必漸消初者生於下生者必漸長故陽生於坎從左而漸升升則為陽而就明陰生於離從右而漸降降則為陰而就晦此即陰陽之用也而千變萬化莫不由之由之推廣則凡冬至夏至一歲之陰陽也子東午西一日之陰陽也有節有中月令之陰陽也或明或晦時氣之陰陽也節前節後消長之陰陽也月光潮汛盈虛之陰陽也再以及人則老夫少妻陰若勝矣有顛之倒之之妙彼強此弱陽亦在也有操之縱之之權顧無往而非陰陽之用也知之而從陽避陰則乾道成男不知而背陽向陰則坤道成女矣明眼人其鑑而悟之筆有難於盡意也地利地利一地利關於子嗣非不重也有陰宅之宜子孫者常見螽斯之多有陽宅之宜子嗣者惟生氣天乙方為最吉然吉地吉人每多不期而會所謂有德斯有人有人斯有土此其所致之由自非偶然故曰必先有心地而後有陰地信非誣也第其理深義遂有非一言可悉然宗枝攸系誠有不可不知者此外如寢室交會之所亦最當知宜忌凡神前廟社之側井灶塚柩之旁及日月火光照臨沉陰危險之地但覺神魂不安之處皆不可犯倘有不謹則夭枉殘疾飛災橫禍及不忠不孝之流從而出矣驗如影響可不慎哉基址地利二欲綿瓜瓞當求基址蓋種植者必先擇地砂礫之場安望稻黍求子者必先求母薄福之婦安望熊羆倘欲為子嗣之謀而不先謀基址計非得也然而基址之說隱微叵測察亦誠難姑舉其顯而易者十餘條以見其概云耳大都婦人之質貴靜而賤動貴重而賤輕貴厚而賤薄貴蒼而賤嫩故凡唇短嘴小者不堪此子處之部位也耳小輪薄者不堪此腎氣之外候也聲細而不振者不堪此丹田之氣本也形體薄弱者不堪此藏蓄之宮城也飲食纖細者不堪此倉廩血海之源也發焦齒豁者不堪肝虧血而腎虧精也睛露臀削者不堪藏不藏而後無後也顏色嬌豔者不堪與其華者去其實也肉肥勝骨者不堪子宮隘而腎氣詘也嬝娜柔脆筋不束骨者不堪肝腎虧而根幹不堅也山根唇口多青氣者不堪陽不勝陰必多肝脾之滯逆也脈見緊數弦澀者不堪必真陰虧弱經候不調而生氣杳然者也此外如虎頭熊項橫面豎眉及聲如豺狼之質必多刑剋不吉遠之為宜又若剛狠陰惡奸險剋薄之氣尤為種類源流子孫命脈所繫烏可近之雖曰堯亦有丹朱舜亦有瞽叟二氣相合未必非一優一劣之所致倘使陰陽有序種址俱宜而稼穡有不登者未之有也惟一有偏勝則偏象見矣是種之不可不擇者有如此不然則麟趾之詩果亦何為而作者耶余因人艱嗣之苦復見人有不如無之苦故願天常生好人所以並慮及之十機人事一陰陽之道合則聚不合則離合則成不合則敗天道人事莫不由之而尤於斯道為最合與不合機有十焉使能得之權在我矣一曰闔闢乃婦人之動機也氣靜則闔氣動則闢動緣氣至如長鯨之飲川如巨觥之無滴斯時也吸以自然莫知其入故未有闢而不受者未有受而不孕者但此機在瞬息之間若未闢而投失之太早闢已而投失之太遲當此之際自別有影響情狀可以默會不可以言得也惟有心人能覺之帶雨施云鮮不榖矣二曰遲速乃男女之合機也遲宜得遲速宜見速但陰陽情質稟有不齊固者遲不固者速遲者嫌速則猶飢待食及咽不能速者畏遲則猶醉杯欲吐不得遲速不侔不相投矣以遲遇疾宜出奇由逕勿呈先聲以疾遇遲宜靜以待挑而後戰能反其機適逢其會矣三曰強弱乃男女之畏機也陽強陰弱則畏如蜂蠆避如戈矛陽弱陰強則聞風而靡望塵而北強弱相凌而道同意合者鮮矣然撫弱有道必居仁由義務得其心克強固難非聚精會神安奪其魂此所以強有不足畏弱有不足虞者亦在乎為之者之何如耳四曰遠近乃男女之會機也或以長材排闥唐突非堪或以偷覷蹠門敢窺堂室欲拒者不能欲吞者不得暌隔如斯其能妒乎然斂跡在形致遠在氣斂跡在一時養氣非頃刻使不有教養之夙謀恐終無剛勁之銳氣又安能直透重圍而使鳩居鵲巢也五曰盈虛乃男女之生機也胃有盈虛飽則盈而飢則虛也腎有盈虛蓄則盈而泄則虛也盛衰由之成敗亦由之不知所用則得其幸而失其常也六曰勞逸乃男女之氣機也勞者氣散而怯逸者氣聚而堅既可為破敵之兵機亦可為種植之農具動得其宜勝者多矣七曰懷抱乃男女之情機也情投則合情悖則離喜樂從陽故多陽者多喜鬱怒從陰故多陰者多怒多陽者多生氣多陰者多殺氣生殺之氣即孕育賢愚之機也莫知所從又胡為而然乎八曰暗產乃男子之失機也勿謂我強何虞子嗣勿謂年壯縱欲亦何妨不知過者失佳期強者無酸味而且隨得隨失猶所莫知自一而再再而三則亦如斯而已矣前有小產病所當並察之九曰童稚乃女子之時機也方苞方萼生氣未舒甫童甫笄天癸未裕曾見有未實之粒可為種不未足之蠶可為繭不強費心力而年衰者能待乎其亦不知機也矣十曰二火乃男女之陽機也夫君火在心心其君主也相火在腎腎其根本也然二火相因無聲不應故心宜靜不靜則火由欲動而自心挑腎先心後腎者以陽爍陰出乎勉強勉強則氣從乎降而丹田失守已失元陽之本色腎宜足腎足則陽從地起而由腎及心先腎後心者以水濟火本乎自然自然則氣主乎先而百脈齊到斯誠化育之真機然伶薄之夫每從勉強故多犯虛勞詎雲子嗣樸厚之子常由自然故品物咸亨奚慮後人知機君子其務陽道之真機乎蓄妾人事二無故置妾大非美事凡諸反目敗亂多有由之可已則已是亦齊家之一要務也其若年邁妻衰無後為大則勢有不得不置者然置之易而蓄之難使蓄不有法則有蓄之名無蓄之實亦仍與不蓄等耳而蓄之之法有情況焉有寢室焉以情況言之則主母見妾大都非出樂從所以或多嗔怒或多罵詈或因事責其起居或假借加以聲色是皆常情之所必至者而不知產育由於血氣血氣由於情懷情懷不暢則衝任不充衝任不充則胎孕不受雖云置妾果何益與凡蓄妾之不可過嚴者以此再以寢室言之則宜靜宜遠宜少近耳目者為妙蓋私構之頃銳宜男子受宜女人其銳其受皆由乎氣當此時也專則氣聚而直前怯則氣餒而不攝此受與不受之機也然勇怯之由其權在心蓋心之所至氣必至焉心有疑懼氣不至矣心有不至氣亦不至矣倘臨期驚有所聞則氣在耳而不及器矣疑有所見則氣在目而不及器矣或忿或畏則氣結在心而不至器矣氣有不至則如石投水而水則無知也且如兩陣交鋒最嫌奸細之偵伺一心無二何堪讒間以相離閨思兵機本無二致凡妾室之不可不靜而遠者以此雖然此不過為錦囊無奈者設倘有高明賢淑因吾言而三省惟宗祧之是慮不惟不妒而且相憐則愈近愈慰而遠之之說豈近人情又若有恭謹良人小心奉治則求容已幸又安敢有遠而敬之之念其然其然吾未知之何也已藥食藥食一種子之方本無定軌因人而藥各有所宜故凡寒者宜溫熱者宜涼滑者宜澀虛者宜補去其所偏則陰陽和而生化著矣今人不知此理而但知傳方豈宜於彼者亦宜於此耶且或見一人偶中而不論宜否而遍傳其神兢相制服又豈知張三之帽非李四所可戴也今錄十方於後擇宜用之庶獲濟矣婦人血氣俱虛經脈不調不受孕者惟毓麟珠隨宜加減用之為最妙其次則八珍益母丸亦佳若臟寒氣滯之甚者用續嗣降生丹亦妙毓麟珠見新方八陣因陣治婦人氣血俱虛經脈不調或斷續或帶濁或腹痛或腰痠或飲食不甘瘦弱不孕服一二斤即可受胎凡種子諸方無以加此人參白朮土炒茯苓芍藥酒洗各二兩川芎炙甘草各一兩當歸熟地蒸搗各四兩菟絲子制四兩杜仲酒炒鹿角霜川椒各二兩上為末煉蜜丸彈子大每空心嚼服一二丸用酒或白湯送下或為小丸吞服亦可如男子制服宜加枸杞胡桃肉鹿角膠山藥山茱萸巴戟肉各二兩如女子經遲腹痛宜加酒炒破故紙肉桂各一兩甚者再加吳茱萸五錢湯泡一宿炒用如帶多腹痛加破故紙一兩北五味子五錢或加龍骨一兩醋煅用如子宮寒甚或泄或痛加製附子炮乾薑隨宜如多鬱怒氣有不順而為脹為滯者宜加酒炒香附二兩或甚者再加沉香五錢如血熱多火經早內熱者加川續斷地骨皮各二兩或另以湯劑暫清其火而後服此或以湯引酌宜送下亦可八珍益母丸見婦人規古方治血氣兩虛脾胃並弱飲食少思四肢無力月經不調或腰痠腹脹或斷或續赤白帶下身作寒熱罔不獲效服一月之後即可受胎虛甚者用藥一斤必能受子人參白朮土炒茯苓川芎各一兩當歸酒洗熟地酒洗各二兩炙甘草五錢芍藥醋炒一兩益母草四兩五六月採取只用上半截帶葉者不見鐵器曬杵為末上為末煉蜜丸彈子大空心蜜湯或酒下一丸或為小丸亦可脾胃虛寒多滯者加砂仁一兩薑汁炒腹中脹悶者加山楂肉一兩飯上蒸熟多郁者加香附一兩酒製此徐思鶴醫統方又一方名八珍益母十全丸於前方內用益母草八兩外加沉香四錢思鶴曰資益坤元補養氣血除淋帶壯形體胎前和氣產後補虛真婦人之聖劑超古今之神方有室家者不可不知也予哂斯世之醫惟集古方香附勝金丹為女人開鬱調經之要藥殊不審古今虛實之異古人氣實故可用香附開導香附味辛性燥但能開破而已多用之大耗氣血虛者愈虛病者愈甚而於滋補何有哉今世十婦九虛非補不可再用香附以耗之寢成怯弱之證是辨之不早則危殆而難痊矣婦人經脈不調或氣血兩虛而身體素弱者宜服此以調養之經不通者服一料即通不調者一月即調素不孕者服一月即孕胎前間用一服則胎固而安產後用一服以童便酒化開調下則無壅滯血暈之候多服之補虛活血凡治產後諸疾極穩若急欲取效以酒調化服續嗣降生丹見婦人規古方治婦人五臟虛損子宮冷憊不能成孕並治男子精寒不固陽事衰弱白濁夢泄婦人帶下寒熱諸虛百損盜汗短氣無不感應此方乃溫隱居求嗣保生篇所載云東京焦員外三世無嫡嗣後遇一神僧問其故曰無嗣者有三一祖宗無德自身無行二夫妻年命恐犯禁忌按此均屬唯心之詞三精神不守妻妾血寒焦公曰治之有道乎僧曰先修德後修身三年之後到台山令行童賜以方藥名續嗣降生丹依方服之後不及二十年子孫數人皆貴顯此方無怪誕克伐之品且溫且固凡血海虛寒者服之必佳但溫力有餘補力不足倘益以人參白朮熟地川芎炙甘草各一兩則八珍全而溫補贊育之功當非淺也因命名曰加味續嗣降生丹當歸酒洗杜仲酒炒茯神益智仁龍骨煅桂心吳茱萸制乾薑半生半熟川椒去目臺烏藥各一兩白芍藥酒炒川牛膝酒浸半夏制防風秦艽石菖蒲去毛北細辛桔梗各五錢附子一枚重一兩者臍下作一竅入硃砂一錢麵裹煨熟取出硃砂留為衣牡蠣大片者以童便浸四十九日每五日一換取出用硫黃一兩為末酒和塗遍用紙皮糊實米醋浸濕外以鹽泥厚固之候乾用炭五斤煅過為末每料止用二兩余可收貯再用上為末以酒煮糯米糊為丸梧子大以前硃砂為衣每服三五十丸漸至七八十丸空心滾白湯或鹽湯溫酒下男子臟氣平和而惟精血不足者宜還少丹全鹿丸無比山藥丸若右腎陽氣不足者宜右歸丸或毓麟珠俱妙若陽痿精衰虛寒年邁艱嗣者必宜贊育丹若陽盛陰虛左腎精氣不足者宜左歸丸或延年益嗣丹若火盛水虧多內熱者宜大補陰丸此外如河車種玉丸烏雞丸黑錫丹之類皆可用之楊氏還少丹見古方八陣補陣治脾腎虛寒飲食少思發熱盜汗遺精白濁其氣虧損肌體瘦弱等證熟地黃二兩山藥山茱萸杜仲薑湯炒枸杞二兩牛膝酒浸遠志薑汁浸炒肉蓯蓉酒浸北五味川續斷楮實子舶茴香菟絲子巴戟肉各一兩上為細末煉蜜丸桐子大每服五十丸空心鹽酒下秘方全鹿丸見古方八陣補陣此藥能補諸虛百損五勞七傷功效不能盡述人制一料服之可以延年一紀其法須四人共制一鹿分而服之逾年又共制之四人共制四年則每人得一全鹿若一人獨制一料恐久留變壞藥力不全矣中鹿一隻縛殺之退去毛將肚雜洗淨同鹿肉加酒煮熟將肉橫切焙乾為末取皮同雜仍入原湯熬膏和藥末肉末加煉蜜和搗為丸其骨須酥炙為末同入之人參白朮炒茯苓炙甘草當歸川芎生地黃熟地黃黃耆蜜炙天門冬麥門冬枸杞杜仲鹽水炒牛膝酒拌蒸山藥炒芡實炒菟絲制五味子鎖陽酒拌蒸肉蓯蓉破故酒炒巴戟肉胡蘆巴酒拌蒸川續斷覆盆子酒拌蒸楮實子酒拌蒸秋石陳皮上各一斤川椒去目炒小茴香炒沉香青鹽各半斤上先須精製諸藥為末和勻一處候鹿膠成就和搗為丸桐子大焙乾用生黃絹作小袋約盛一斤懸置透風處用盡一袋又取一袋陰濕天須用火烘一二次為妙每服八九十丸空心臨臥薑湯鹽湯白湯任下冬月溫酒亦可局方無比山藥丸見古方八陣補陣治諸虛損傷肌肉消瘦耳聾目暗常服壯筋骨益腎水令人不老山藥二兩菟絲子三兩酒浸蒸五味揀淨六兩肉蓯蓉四兩切片酒浸焙杜仲三兩酒炒牛膝一兩酒浸蒸熟地澤瀉山茱萸茯苓巴戟肉赤石脂各一兩上為細末煉蜜為丸桐子大每服三五十丸食前溫酒或米飲下右歸丸見腎虛經亂贊育丹見新方八陣因陣治陽痿精衰虛寒無子等證妙方熟地八兩蒸搗白朮用冬朮八兩當歸枸杞各六兩杜仲酒炒仙茅酒蒸一日巴戟肉甘草湯炒山茱萸淫羊藿羊脂拌炒肉蓯蓉酒洗去甲韭子炒黃各四兩蛇床子微炒附子制肉桂各二兩上煉蜜丸服或加人參鹿茸亦妙左歸丸見腎虛經亂延年益嗣丹見血熱論外方丹溪大補陰丸見古方八陣寒陣降陰火補腎水黃柏鹽酒炒知母鹽酒炒各四兩熟地酒洗蒸搗爛龜板酥炙黃各六兩上為細末用豬脊髓蒸熟和煉蜜同搗為丸桐子大每服五六十丸空心薑鹽酒送下河車種玉丸見婦人規古方紫河車一具只要母氣壯盛厚大新鮮者但去胞內瘀血不必挑去鮮紅血脈以米泔水洗淨用布絞乾石臼內生杵如糊用山藥末四五兩收干捻為薄餅八九個於砂鍋內焙乾以香如肉脯為妙大熟地酒洗烘乾八兩枸杞烘乾五兩白茯苓人乳拌曬三次歸身酒洗人參菟絲制阿膠炒珠各四兩丹皮酒洗白薇酒洗各二兩沉香一兩桂心山茱萸香附米用酒醋水三物各半碗浸三日曬乾略烘各三兩大川芎酒浸切片曬乾二兩上煉蜜為丸桐子大每服百餘丸空心或酒或白湯鹽湯任下如帶濁多者加赤白石脂各二兩須以清米泔飛過用服藥後忌生蘿蔔生藕蔥蒜綠豆粉之類烏雞丸見婦人規古方治婦人羸弱血虛有熱經水不調崩漏帶下骨蒸不能成胎等疾烏骨白毛公雞一隻重二斤半許者閉殺之去毛雜外用艾葉四兩青蒿四兩切碎納一半在雞肚內以小酒罈一個入雞並所剩蒿艾用童便和水灌令沒雞二寸許煮絕干取出去骨余俱同搗如薄餅焙乾為細末聽用南香附去毛淨一斤分四份用米泔童便酒醋各浸一份春秋一二日夏一日冬四日取出曬乾略炒人參熟地當歸酒浸洗生地川芎白芍各三兩黃耆白朮川牛膝柴胡知母丹皮各二兩鱉甲醋浸炙黃三兩白茯苓二兩半秦艽一兩半黃連炒地骨皮貝母玄胡索乾薑炮焦各一兩上俱為末用酒醋各半煮爛為丸桐子大每服五六十丸漸加至百丸溫酒米飲任下忌煎炒辛辣等物及莧菜又烏雞丸熟地當歸白朮山藥山茱萸棗肉柿餅蓮肉各四兩黃耆蜜炙三兩鹿角膠狗脊杜仲枸杞蓮鬚香附阿膠川芎各二兩烏藥一兩半上藥制淨用烏骨雞一隻悶殺之干去毛去雜連骨捶碎用酒醋各半同藥煮熟去骨烘乾共為末即將余汁少入面打糊為丸任意用引送下唐氏烏雞丸人參懷生地懷熟地青蒿子去梗香附四制鱉甲各三兩白朮棗仁肉枸杞麥冬雲苓地骨皮去骨丹皮去骨白芍各二兩歸身二兩半川芎甘草各一兩上先將諸藥備完聽用乃取絲毛烏骨白公雞一隻約重一斤許者撲倒去毛穢頭足腸雜不用將雞切作四塊先以鱉甲鋪銅鍋底次入雜藥以免焦腐漸漸加童便約至鬥許煮至極爛撈起曬乾為末將鱉甲去裙並雞骨俱以原汁醮炙至干為末同前藥煉蜜為丸桐子大每空心用清湯送下百餘丸局方黑錫丹見古方八陣熱陣治痰氣壅塞上盛下虛腎水虧竭心火炎盛或一應下虛陰寒真頭痛等證及婦人血海久冷無子赤白帶下黑錫去滓二兩炒末硫黃二兩肉桂五錢附子炮木香沉香舶茴香故紙陽起石水飛葫蘆巴酒浸炒肉豆蔻麵裹煨金鈴子蒸去皮核各一兩上用新鐵銚將錫花開下硫黃末提起以木杵擂極細放地上退火毒同餘藥研一日至黑光色為度酒糊丸桐子大陰乾入布袋內擦令光瑩每服四十丸空心薑鹽湯下女人艾棗湯下用藥法藥食二凡男女胎孕所由總在血氣若血氣和平壯盛者無不孕育育亦無不長其有不能孕者無非氣血薄弱育而不長者無非根本不固即如諸病相加無非傷損血氣如果邪逆未除但當以煎劑略為撥正撥正之後則必以調服氣血為主斯為萬全之策所以凡種子丸散切不可雜以散風消導及敗血苦寒峻利等藥蓋凡宜久服而加以此類則久而增氣未有不反傷氣血而難於孕者也再若香附一物自王好古曰乃婦人之仙藥多服亦能走氣而後世不言走氣但相傳曰香附為婦人之要藥由是但治婦人則不論虛實無弗用之不知香附氣香味辛性燥惟開鬱散氣行血導滯乃其所長若氣虛用之大能泄氣血虛用之大能耗血如古方之女金丹及四制香附丸之類惟氣實血滯者用之為宜凡今婦人十有九虛顧可以要藥二字而一概用之乎用之不當則漸耗漸弱而胎元之氣必反將杳然矣飲食藥食三凡飲食之類則人之臟氣各有所宜似不必過為拘執惟酒多者為不宜蓋胎種先天之氣極宜清楚極宜充實而酒性淫熱非惟亂性亦且亂精精為酒亂則濕熱其半真精其半耳精不充實則胎元不固精多濕熱則他日痘疹驚風脾敗之類率已受造於此矣故凡欲擇期布種者必宜先有所慎與其多飲不如少飲與其少飲猶不如不飲此亦胎元之一大機也欲為子嗣之計者其母以此為後著男病疾病一疾病之關於胎孕者男子則在精女人則在血無非不足而然凡男子之不足則有精滑精清精冷者及臨事不堅或流而不射者或夢遺頻數或便濁淋澀者或好色以致陰虛陰虛則腰腎痛憊或好男風以致陽極陽極則亢而亡陰或過於強固強固則勝敗不洽或素患陰疝陰疝則肝腎乖離此外則或以陽衰陽衰則多寒或以陰虛陰虛則多熱若此者是皆男子之病不得盡諉之婦人也倘知其由而宜治則治之宜反則反之必先其在我而後及婦人則事無不濟矣女病疾病二婦人所重在血血能構精胎孕乃成欲察其病惟於經候見之欲治其病惟於陰分調之蓋經即血也血即陰也陰以應月故月月如期此其常也及其為病則有或先或後者有一月兩至者有兩月一至者有枯絕不通者有頻來不止者有先痛而後行者有先行而後痛者有淡色黑色紫色者有瘀而為條為片者有精血不充而化作白帶白濁者有子宮虛冷而陽氣不能生化者有血中伏熱而陰氣不能凝成者有血癥氣痞子臟不收月水不通者凡此皆真陰之病也真陰既病則陰血不足者不能育胎陰氣不足者不能攝胎凡此攝育之權總在命門正以命門為衝任之血海而胎以血為主血不自生而又以氣為主是皆真陰之謂也所以凡補命門則或氣或血皆可謂之補陰而補陰之法即培根固本之道也凡自壯至老乃人人之所不可缺者而矧以先天後天之肇基又將舍是而何求乎是以調經種子之法亦惟以填補命門顧惜陽氣為之主然精血之都在命門而精血之源又在二陽心脾之間蓋心主血養心則血生脾胃主飲食健脾胃則氣布二者胥和則氣暢血行此情志飲食又當先經脈而為之計者亦無非補陰之源也使不知本末先後而妄為之治則又烏足以言調經種子之法以上宜麟策終盈虛吟誰識雌雄在坎離玄關消息有真機坎虛離實云非是坎實離虛亦是非天以至剛方得體地緣無日乃成泥三生同有金丹在試問仙翁知不知辨古種子之法古人言之不少而余謂其若未盡善者蓋亦有疑而云然謹並列而辨之亦以備達者之裁正廣嗣訣云三十時辰兩日半二十八九君須算落紅滿地是佳期金水過時從霍亂霍亂之時枉費功樹頭樹底覓殘紅但解開花能結子何愁丹桂不成叢按此言婦人經期方止其時子宮正開便是布種之時過此佳期則子宮閉而不受胎矣然有十日半月及二十日之後受胎者又何為其然也又一哲婦曰若依此說則凡有不端者但於後半月為之自可無他慮矣善哉言也此言果可信否道藏經曰婦人月信止後一日三日五日合者乾道成男二日四日六日合者坤道成女按此以單數屬陽故成男偶數屬陰故成女果若然則誰不知之得子何難也總未必然諸氏遺書云男女之合二精交暢若陰血先至陽精後沖血開裹精精入為骨而男形成矣陽精先至陰血後參精開裹血血入為本而女形成矣按此一說余初見之甚若有味有理及久察之則大有不然蓋相合之頃豈堪動血惟既結之後則精以肇基血以滋育而胎漸成也即或以血字改為精字曰陰精先至似無不可然常見初笄女子有一合而即孕者彼於此時畏避無暇何雲精泄但其情動則氣至氣至則陰闢陰闢則吸受吸受則無不成孕此自然之正理也若褚氏之說似穿鑿矣東垣曰經水斷後一二日血海始淨精勝其血感者成男四五日後血脈已旺精不勝血感者成女按此說亦非確論今見多生女者每加功於月經初淨而必不免於女豈亦其血勝而然乎丹溪曰陰陽交媾胎孕乃凝所藏之處名曰子宮一系在下上有兩歧中分為二形如合缽一達於左一達於右精勝其血則陽為之主受氣於左子宮而男形成精不勝血則陰為之主受氣於右子宮而女形成按此乃與聖濟經左動成男右動成女之說同第以子宮驗之無不皆有兩瓣故在男子亦有二丸而子宮之義諒亦如此信非謬也惟左受成男右受成女之說則成非事後莫測其然即復有左射右射之法第恐陰中闔闢自有其機即欲左未必左欲右未必右而陰陽相勝之理則在天時人事之間似仍別有一道雖知此說終無益也述古褚氏遺書曰建平孝王妃姬皆麗無子擇民家未笄女子入御又無子問曰求男有道乎澄對曰合男女必當其年男雖十六而精通必三十而娶女雖十四而天癸至必二十而嫁皆欲陰陽完實然後交而孕孕而育育而子堅壯強壽今未笄之女天癸始至已近男色陰氣早泄未完而傷未實而動是以交而不孕孕而不育育而子脆不壽此王之所以無子也然婦人有所產皆女者有所產皆男者大王誠能訪求多男婦人至宮府有男之道也王曰善未再期生六男夫老陽遇少陰老陰遇少陽亦有子之道也癥瘕類論證癥瘕之病即積聚之別名內經止有積聚疝瘕並無癥字之名此後世之所增設者蓋癥者徵也瘕者假也徵者成形而堅硬不移者是也假者無形而可聚可散者是也成形者或由血結謂之血癥或由食結謂之食癥無形者瘕在氣分氣滯則聚而見形氣行則散而無跡此癥瘕之辨也然又有痛者有不痛者痛者聯於氣血所以知氣血行則愈故痛者易治不痛者不通氣血另結窠囊藥食難及故不痛者難治此又治之有辨也其他如肺之積曰息奔心之積曰伏梁脾之積曰痞氣肝之積曰肥氣腎之積曰奔豚以至後世有曰痃癖曰痞塊之屬亦不過以形見之處有不同故名亦因之而異耳總之非在氣分則在血分知斯二者則癥瘕二字已盡之矣但血症氣瘕各有虛實而宜攻宜補當審之真而用之確也諸經義另詳積聚門所當參閱骨空論曰任脈為病男子內結七疝女子帶下瘕聚張子和曰遺溺閉癃陰痿脬痹精滑白淫皆男子之疝也若血涸月事不行行後小腹有塊或時動移前陰突出後陰痔核皆女子之疝也但女子不謂之疝而謂之瘕血癥瘀血留滯作癥惟婦人有之其證則或由經期或由產後凡內傷生冷或外受風寒或恚怒傷肝氣逆而血留或憂思傷脾氣虛而血滯或積勞積弱氣弱而不行總由血動之時余血未淨而一有所逆則留滯日積而漸以成癥矣然血必由氣氣行則血行故凡欲治血則或攻或補皆當以調氣為先羅謙甫曰養正邪自除必先調養使營衛充實若不消散方可議下但除之不以漸則必有顛覆之害若不守禁忌縱嗜欲其有不喪身者鮮矣血癥作痛或成形不散在臍腹之下若暫見停蓄而根盤未固者只宜五物煎或決津煎加減主之則血無不去痛無不止足稱神劑五物煎見血寒論外方決津煎見經期腹痛婦人形氣病氣俱實或腹脹或痛甚而新有所逆但欲行滯止痛者宜通瘀煎失笑散玄胡當歸散加減四物湯之類疏之導之氣通滯去痛必自愈若稍久且堅而欲消之磨之宜三稜丸萬病丸之類主之通瘀煎見經期腹痛失笑散見經期腹痛玄胡當歸散見經痛論外方良方加減四物湯見婦人規古方治婦人血積當歸川芎芍藥熟地蓬朮三稜肉桂乾漆炒煙盡等分上㕮咀每服五七錢水鍾半煎七分食遠服三稜丸見古方八陣攻陣治血癥血瘕食積痰滯莪朮醋浸炒三稜各三兩青皮麥芽炒半夏各一兩上共用好醋一鍾煮乾共為末醋糊丸桐子大每服四十丸淡醋湯下痰積薑湯下萬病丸見婦人規古方治月經瘀閉臍腹作痛及產後癥瘕等病乾漆炒煙出青白為度牛膝酒洗焙各一兩上為末生地黃一升用砂鍋慢火熬膏丸桐子大每服二十丸空心米飲下形氣強壯而瘀血不行或大便結閉或腹脹痛甚有非下不可者宜良方桃仁承氣湯下之最捷或用奪命丹桃仁煎穿山甲散赤金豆之類皆可然下須詳慎非有大實不得已之證不宜妄用良方桃仁承氣湯見古方八陣攻陣治瘀血小腹作痛大便不利或譫語口乾漱水不咽遍身黃色小便自利或血結胸中疼痛不可近或寒熱昏迷其人如狂桃仁半兩去皮尖大黃炒一兩甘草二錢肉桂一錢上姜水煎發日五更服奪命丹見鬼胎良方桃仁煎見古方八陣攻陣治血瘕桃仁大黃炒各一兩虻蟲半兩炒黑朴硝一兩上為末以醇醋一鍾瓷器中煮三分下前三味不住手攪煎至可丸乃下朴硝丸如桐子大不吃晚食五更初溫酒下五丸日午下穢物如未見再服仍以調氣血藥補之立齋曰向在毗陵一婦人小便不通臍腹脹甚余診之曰此血瘕也用前藥一服腹痛下瘀血血水即愈此藥猛烈大峻氣血虛者斟酌與之穿山甲散見古方八陣攻陣治癥痞瘀血心腹作痛穿山甲炒焦鱉甲醋炙赤芍藥大黃炒乾漆炒煙盡桂心各一兩川芎芫花醋炒歸尾各半兩麝香一錢上為末每服一錢酒調下赤金豆見鬼胎養正之法當察陰陽上下病之久新及邪正強弱之勢其有停瘀雖甚而元氣困弱者不可攻病久而弱積難搖動者不可攻凡此之類皆當專固根本以俟其漸磨漸愈乃為良策如鬱結傷脾者宜用歸脾湯逍遙飲壽脾煎脾胃虛寒者宜溫胃飲養中煎六君子湯肝腎虛寒者宜大營煎暖肝煎理陰煎或良方交加散亦可脾腎虛寒大便泄瀉或不實者宜胃關煎理陰煎病久脾腎氣滯而小腹痛脹者宜八味地黃丸肝火不清血熱而滯者宜加味逍遙散以上諸證凡虛中帶滯者不妨於前藥中各加行氣導滯之品此在用者之圓活也歸脾湯見經不調逍遙飲見腎虛經亂壽脾煎見血虛經亂溫胃飲見血虛經亂養中煎見新方八陣熱陣治中氣虛寒為嘔為泄者人參一至三錢山藥炒二錢白扁豆炒二三錢炙甘草一錢茯苓二錢乾薑炒黃一二錢水二鍾煎七分食遠溫服如噯腐氣滯者加陳皮一錢或砂仁四分如胃中空虛覺餒者加熟地三五錢六君子湯見經期腹痛大營煎見血熱經早暖肝煎見新方八陣熱陣治肝腎陰寒小腹疼痛疝氣等證當歸二三錢枸杞三錢茯苓二錢小茴香二錢肉桂一二錢烏藥二錢沉香一錢或木香亦可水一鍾半加生薑三五片煎七分食遠溫服如寒甚者加吳茱萸乾薑再甚者加附子理陰煎見血寒經遲良方交加散見經痛論外方胃關煎見產後腹痛八味地黃湯即八味丸見經不調加味逍遙散見經不調婦人久癥宿痞脾腎必虧邪正相搏牢固不動氣聯子臟則不孕氣聯衝任則月水不通內治之法宜如前外以阿魏膏貼之仍用熨痞方或用琥珀膏亦可然必須切慎七情及六淫飲食起居而不時隨證調理庶乎可愈阿魏膏見外科鈐古方治一切痞塊更服胡連丸羌活獨活玄參官桂赤芍藥穿山甲生地黃兩頭尖大黃白芷天麻紅花各半兩木鱉十枚去殼亂髮一團槐柳桃枝各半兩上用麻油二斤四兩煎藥黑去渣入發再煎發化仍去渣入上好真正黃丹煎收軟硬得中入後細藥即成膏矣阿魏芒硝蘇合油乳香沒藥各五錢麝香三錢上凡貼膏藥須先用朴硝隨患處鋪半指厚以紙蓋用熱熨斗熨良久如硝耗再加熨之二時許方貼膏藥若是肝積加蘆薈末同熨之熨痞方見古方八陣攻陣一層用麝香二三分摻肉上二層阿魏一二錢三層芒硝一二兩鋪蓋於上上先用蕎麥麵和成條量痞大小圍住鋪藥於內以青布蓋之隨燒磚四五塊輪流布上熨之覺腹中氣行寬快即是痞消之兆以手烘熱摩之亦妙內須服調養氣血之藥食癥凡飲食留聚而為癥痞者或以生冷或以風寒或以忿怒氣逆或以勞倦飢餒而飲食疊進不用消化則積而成癥矣然胃氣強者必不致留聚飲食而飲食之不能化者必由脾腎氣弱而然所以治此者宜酌虛實而為攻補庶乎得效也諸治法詳積聚門宜參而用之立齋曰前證若形氣虛弱須先調補脾胃為主而佐以消導若形氣充實當先疏導為主而佐以補脾胃若氣壅血滯而不行者宜用烏藥散散而行之若脾氣虛而血不行者宜用四君芎歸補而行之若脾氣鬱而血不行者宜用歸脾湯解而行之若肝腎血燥而不行者宜用加味逍遙散清而行之大抵食積痞塊之證皆以邪氣盛則實精氣奪則虛但當養正辟邪而積自除矣雖曰堅者削之客者除之若胃氣未虛或可少用若病久虛乏者不宜輕用良方烏藥散見古方八陣和陣治血氣壅滯心腹作痛烏藥莪朮醋浸炒桂心桃仁當歸青皮木香等分上為末每服二錢熱酒調下四君子湯見血虛經亂歸脾湯見經不調加味逍遙散見經不調氣瘕瘕者假也所謂假者謂其形雖若癥而原無根窠非若癥痞之堅頑有形者也蓋有形者或因血積或因食積積有定形所不可移易者也無形者病在氣分氣逆則甚氣散則緩聚散無根者也惟其無根故能大能小或左或右或近脅肋而如臂如指則謂之痃癖或下臍腹而為脹為急則謂之疝瘕難經曰病有積聚何以別之然積者陰氣也陰沉而伏聚者陽氣也陽浮而動故積者五臟之所生聚者六腑之所成也然則癥由於積積在陰分而有淵藪故攻之非易瘕由於聚聚在陽分而猶烏合故散之非難此癥瘕之辨有如此惟散之之法卻有因通因塞之妙用而人多莫之知也凡病在氣分而無停蓄形積者皆不可下蓋凡用下者可除有形而不可以除無形若氣因形滯者去其積則氣亦順自無不可若全在無形氣分即下亦不去而適足以敗正氣也宜切識之散氣之法只在行氣蓋氣行則散也但行氣之法大有權宜如氣實則壅滯宜破而行之氣閉則留蓄宜利而行之氣熱則乾涸宜寒而行之氣寒則凝結宜溫而行之此散氣治瘕之大法也然瘕聚之證使果氣強力健則流行不息又何瘕聚之有惟正氣不行而後邪氣得聚經曰邪之所湊其氣必虛故凡為此病必氣虛者多虛不知補則正氣不行正氣不行則邪氣不散安望其有瘳乎但實者有據故顯而易見虛每似實故隱而難知此所以當辨其真也破氣行氣之劑凡氣實氣壅之甚而為脹為痛者宜排氣飲木香順氣散木香調氣散四磨湯諸七氣湯之類主之若血中之氣滯而為瘀為痛者宜失笑散通瘀煎調經飲甚者良方奪命丹疝瘕氣聚者荔香散甚者天台烏藥散氣結膀胱小水不利者小分清飲四苓散五苓散氣結大腸干秘不行者搜風順氣丸麻仁丸水虧血虛而秘滯者濟川煎肝氣逆而為聚者解肝煎兼火者化肝煎氣聚兼熱火鬱不行者抽薪飲大分清飲寒滯不行氣結脹聚者抑扶煎和胃飲丁香茯苓湯三焦壅滯氣道不清而中滿腫脹者廓清飲痰飲水氣停蓄胸脅而為吞酸嘔逆者苓朮二陳煎六安煎和胃飲括痰丸之類主之以上諸法惟氣實瘕聚者宜之凡元氣不足者皆不可用排氣飲見經期腹痛統旨木香順氣散見古方八陣和陣治氣滯腹痛脅痛木香香附檳榔青皮陳皮枳殼砂仁厚朴制蒼朮各一錢炙甘草五分水二鍾姜三片煎八分食遠服局方木香調氣散見古方八陣和陣木香白檀香白豆蔻丁香各二錢炙甘草藿香各八錢砂仁四錢上為末每服二錢入鹽少許沸湯點服四磨湯見古方八陣和陣治諸逆氣沉香烏藥枳實檳榔上四味用白湯共磨或下養正丹尤佳一方用白酒磨濟生方用人參無枳實本證加木香即名五磨飲七氣湯見古方八陣和陣治七情之氣鬱結於中心腹絞痛不可忍及不能飲食半夏制五兩人參肉桂甘草炙各一兩上每服三五錢水一鍾半姜三片煎八分服三因七氣湯即四七湯見安胎加味七氣湯見古方八陣和陣即前七氣湯加厚朴茯苓各等分局方七氣湯見古方八陣和陣治七情鬱結臟氣互相刑剋陰陽不和揮霍撩亂吐瀉交作半夏制厚朴芍藥茯苓各二錢人參肉桂橘紅紫蘇水二鍾加薑棗煎服指迷七氣湯見古方八陣和陣治七情相干陰陽不得升降氣道雍滯攻衝作疼積聚癥瘕脹滿等證半夏甘草各七分半香附錢半青皮陳皮桔梗官桂藿香益智莪朮煨各一錢上每服三五錢姜三片棗一枚水煎服統旨七氣湯有三稜玄胡索薑黃草豆蔻無半夏桔梗濟生大七氣湯有三稜無半夏失笑散見經期腹痛通痰煎見經期腹痛調經飲見經期腹痛奪命丹見鬼胎荔香散見新方八陣因陣治疝氣痛極凡在氣分者最宜用之並治小腹氣痛等證神效又心腹久痛方如後荔枝核炮微焦大茴香等分炒上為末用好酒調服二三錢如寒甚者加制過吳茱萸減半用之凡心腹胃脘久痛屢觸屢發者惟婦人多有之用荔核一錢木香八分為末每服一錢清湯調服數服除根寶鑑天台烏藥散見古方八陣和陣治小腸疝氣卒引臍腹疼痛烏藥木香茴香炒良薑炒青皮各半兩檳榔二個川楝子十個巴豆七十粒上將巴豆微打破同川楝子加麵炒黑去面及巴豆不用其餘為細末每服一錢溫酒下甚者姜酒下小分清飲見白濁遺淋五苓散見白濁遺淋四苓散即前五苓散去肉桂見古方八陣和陣搜風順氣丸見古方八陣和陣治痔漏風熱閉結老人燥秘等證車前子兩半大麻子微炒二錢大黃五錢半生半熟牛膝酒浸郁李仁菟絲子酒浸枳殼山藥各二錢上為末煉蜜丸桐子大每服三十丸溫酒下麻仁丸見古方八陣攻陣治大便秘結胃實能食小便熱赤者芝麻四兩研取汁杏仁四兩去皮尖研如泥大黃五兩山梔十兩上為末煉蜜入麻汁和丸桐子大每服五十丸食前白湯下濟川煎見產後大便秘澀解肝煎見安胎化肝煎見崩淋經漏不止抽薪飲見血熱經早大分清飲見白濁遺淋抑扶煎見新方八陣熱陣治氣冷陰寒或暴傷生冷致成瀉痢凡初起血氣未衰脾腎未敗或脹痛或嘔惡皆宜先用此湯此胃關煎表裡藥也宜察虛實用之其有寒濕傷臟霍亂邪實者最宜用此厚朴陳皮烏藥各一錢五分豬苓二錢澤瀉二錢炙甘草一錢乾薑炮一二錢吳茱萸制五七分水一鍾半煎七分食遠溫服如氣滯痛甚者加木香五七分或砂仁亦可如血虛多痛者加當歸二錢如寒濕勝者加蒼朮一錢半和胃飲見經期腹痛楊氏丁香茯苓湯見古方八陣熱陣治脾胃虛寒宿食留滯痞塞疼痛氣不升降以致嘔吐涎沫或嘔酸水不思飲食半夏制橘紅茯苓各一兩半丁香附子制肉桂砂仁各五錢乾薑炮木香各一兩每服四錢水一鍾半姜七片棗一枚煎七分服廓清飲見新方八陣和陣治三焦壅滯胸膈脹滿氣道不清小水不利年力未衰通身腫脹或肚腹單脹氣實非水等證枳殼二錢厚朴一錢半大腹皮一二錢白芥子五七分或一二錢蘿蔔子生搗一錢如中不甚脹能食者不必用此茯苓連皮用二三錢澤瀉二三錢陳皮一錢水一鍾半煎七分食遠溫服如內熱多火小水熱數者加梔子木通各一二錢如身黃小水不利者加茵陳二錢如小腹脹滿大便堅實不通者加生大黃三五錢如肝滯脅痛者加青皮如氣滯胸腹疼痛者加烏藥香附如食滯者加山楂麥芽苓朮二陳煎見新方八陣和陣治痰飲水氣停蓄心下嘔吐吞酸等證豬苓一錢半白朮一二錢澤瀉一錢半陳皮一錢半夏二三錢茯苓一錢半炙甘草八分乾薑炒黃一二錢水一鍾半煎服如肝腎兼寒者加肉桂一二錢六安煎見產後喘促括痰丸見新方八陣和陣治一切停痰積飲吞酸嘔酸胸脅脹悶疼痛等證半夏制二兩白芥子二兩乾薑炒黃一兩豬苓二兩炙甘草五錢陳皮四兩切碎用鹽二錢入水中莊浸一宿曬乾上為末湯浸蒸餅為丸綠豆大每服一錢許滾白湯送下如胸脅疼痛者加臺烏藥二兩補氣以行氣之劑如聖愈湯參歸湯七福飲皆能調心氣之虛滯五味異功散參朮湯能理心脾之氣虛不行獨參湯參附湯能助肺以行五臟之治節若脾胃氣虛而滯者惟六君子湯歸脾湯為宜脾胃虛寒而滯者必溫胃飲理中湯五君子煎最佳若虛在脾腎陰分氣有不行而或為痰飲或為脹滿或為嘔吐腹痛等證非理陰煎不可若虛在血中之氣而為滯為痛微則四物湯甚則五物煎決津煎大營煎方可若肝腎寒滯小腹氣逆而痛者必暖肝煎以溫之若脾腎氣虛門戶不要而為滯為痛者必胃關煎以固之若元氣下陷滯而不升者宜補中益氣湯舉元煎以舉之若元氣大虛氣化不行而滯者必五福飲十全大補湯大補元煎或六味回陽飲以培補之以上皆補氣行氣之法也亦不過為之筌蹄云耳而此中之用誠有未可以言悉者然常人之情尤為氣之滯者惟破之散之為宜而反云補之必不然也不知客之強者以主之弱邪之勝者以正之虛凡今人之病虛者最多而用補者最少治與病違而欲以藥濟人蓋亦罕矣即余以多虛少實諄諄為言而人亦未信姑以人事喻之其或可曉然乎夫人之虛實亦猶人之貧富氣實者若富翁氣虛者若貧士今人於千百中而富者其幾舍富之外盡貧人矣其多其少即此類也又有華其貌而罄其室者人多難測亦此類也但貧人之情可益不可損增一分猶然未足削一分其窘何堪使以潛消暗剝之術而加之貧寒窘乏之士陰移人祚而人不之覺亦甚堪憐矣此道以仁為術其可不以此為心乎嗟乎人生以氣為主得氣則生失氣則死夫智者知人之命不智者知人之病若強不知以為知而徒資便給以人命為嘗試者則其概可知矣東垣聖愈湯見古方八陣補陣治血虛心煩睡臥不寧或五心煩熱人參川芎當歸熟地黃酒拌蒸生地黃酒拌黃耆炙各一錢上水煎服參歸湯亦名人參湯見調經論外備用方七福飲見血虛經亂五味異功散見惡阻參朮湯見古方八陣補陣治氣虛顫掉泄瀉嘔吐等證人參白朮黃耆各二錢白茯苓陳皮炙甘草各一錢甚者加附子一錢水二鍾煎八分食遠服獨參湯見崩淋經漏不止嚴氏參附湯見古方八陣補陣治真陽不足上氣喘急呃逆自利臍腹疼痛手足厥冷嘔惡不食自汗盜汗氣短頭暈等證人參製附子用參鬚倍於附或等分不拘五錢或一兩酌宜用姜水煎服良方有丁香十五粒名加減參附湯六君子湯見經期腹痛歸脾湯見經不調溫胃飲見血虛經亂理中湯見血虛經亂五君子煎見崩淋經漏不止理陰煎見血寒經遲四物湯見經不調五物煎見血寒論外方決津煎見經期腹痛大營煎見血熱經早暖肝煎見血癥胃關煎見產後腹痛補中益氣湯見經不調舉元煎見崩淋經漏不止五福飲見血熱經早十全大補湯見調經論外備用方大補元煎見血熱經早六味回陽飲見新方八陣熱陣治陰陽將脫等證人參二三兩或數錢製附子二三錢炮乾薑二三錢炙甘草一錢熟地五錢或一兩當歸身三錢如泄瀉者或血動者以冬朮易之多多益善水二鍾武火煎七八分溫服如肉振汗多者加炙黃耆四五錢或一兩或冬白朮三五錢如泄瀉者加烏梅二枚或北五味二十粒亦可如虛陽上浮者加茯苓二錢如肝經鬱滯者加肉桂二三錢前陰類陰挺婦人陰中突出如菌如芝或挺出數寸謂之陰挺此或因胞絡傷損或因分娩過勞或因鬱熱下墜或因氣虛下脫大都此證當以升補元氣固澀真陰為主如陰虛滑脫者宜固陰煎秘元煎氣虛陷下者補中益氣湯十全大補湯因分娩過勞氣陷者壽脾煎歸脾湯鬱熱下墜者龍膽瀉肝湯加味逍遙散固陰煎見腎虛經亂秘元煎見血虛經亂補中益氣湯見經不調十全大補湯見調經論外備用方壽脾煎見血虛經亂歸脾湯見經不調龍膽瀉肝湯見產門不閉加味逍遙散見經不調水楊湯治婦人陰中生物癢痛牽引腰腹多由房事太過或因淫欲不遂或因非理所為以致陰戶有傷名曰陰挺金毛狗脊五倍子枯礬魚腥草水楊根黃連各一兩上為末分四劑用有嘴瓦罐煎湯外預以竹筒去節接罐嘴引熱氣熏入陰中或透挺上俟湯溫仍用洗沃之仍服治挺諸藥陰腫婦人陰腫大都即陰挺之類然挺者多虛腫者多熱如氣陷而熱者升而清之宜清化飲加柴胡防風之屬氣閉而熱者利而清之宜大分清飲徙薪飲肝腎陰虛而熱者加味逍遙散氣虛氣陷而腫者補中益氣湯因產傷陰戶而腫者不必治腫但調氣血氣血和而腫自退或由損傷氣滯無關元氣而腫者但以百草湯按即百草煎熏洗之為妙清化飲見血熱經早大分清飲見白濁遺淋徙薪飲見崩淋經漏不止百草煎見新方八陣因陣治百般癰毒諸瘡損傷疼痛腐肉腫脹或風寒濕氣留聚走注疼痛等證無不奇效百草凡田野山間者無論諸品皆可取用然猶以山草為勝辛香者佳冬月可用乾者須預為收採之上不論多寡取以多煎濃湯乘熱熏洗患處仍用布帛蘸熨良久務令藥氣蒸透然後敷貼他藥每日二三次不拘但以頻數為善蓋其性之寒者可以除熱熱者可以散寒香者可以行氣毒者可以解毒無所不用亦無所不利湯得藥性則湯氣無害藥得湯氣則藥力愈行凡用百草以煎膏者其義亦此此誠外科中最要最佳之法亦傳之方外人者也若洗水鼓腫脹每次須用草二三十斤煎濃湯二三鍋用大盆盛貯以席箄遮風熏洗良久每日一次或二次內服廓清飲分利等劑妙甚一方治陰中腫痛用枳殼半斤切炒乘熱以帛裹熨之以消其外仍用少許乘熱裹納陰中冷即易之不三次愈一方用小麥朴硝白礬五倍子蔥白煎湯浸洗甘菊湯治陰戶腫用甘菊苗葉不拘多少搗爛以百沸湯淋汁熏浸洗之陰瘡婦人陰中生瘡多由濕熱下注或七情鬱火或縱情敷藥按古法有用辛溫興奮之藥外敷以助情欲者中於熱毒其外證則或有陰中挺出如蛇頭者謂之陰挺如菌者謂之陰菌或如雞冠或生蟲濕癢或內潰腫爛疼痛常流毒水其內證則或為體倦內熱經候不調或為飲食不甘晡熱發熱或為小腹痞脹腰脅不利或為小水淋瀝赤白帶下凡治此之法若腫痛內外俱潰者宜芍藥蒺藜煎為最佳或四物湯加梔子丹皮膽草荊芥或用加味逍遙散若濕癢者宜芍藥蒺藜煎或歸脾湯加柴梔丹皮淋澀者宜龍膽瀉肝湯加白朮丹皮淋澀而火盛痛脹者宜大分清飲或抽薪飲腫而墜重者補中益氣湯加山梔丹皮可洗者用百草煎可敷者宜螵蛸散完瘡散芍藥蒺藜煎見新方八陣因陣治通身濕熱瘡疹及下部紅腫熱痛諸瘡神效外以螵蛸散敷之龍膽草梔子黃芩木通澤瀉各錢半芍藥生地各二錢白蒺藜連刺槌碎五錢至一兩水二鍾煎八分食遠服如火不甚者宜去龍膽草梔子加當歸茯苓薏仁之屬如濕毒甚者加土茯苓五錢或一二兩四物湯見經不調加味逍遙散見經不調歸脾湯見經不調龍膽瀉肝湯見產門不閉大分清飲見白濁遺淋抽薪飲見血熱經早補中益氣湯見經不調百草煎見陰腫螵蛸散見新方八陣因陣治濕熱破爛毒水淋漓等瘡或下部腎囊足股腫痛下疳諸瘡無不神效海螵蛸不必浸淡人中白或人中黃碙砂亦可等分上為細末先以百草多煎濃湯乘熱熏洗後以此藥摻之如干者以麻油或熬豬油或蜜水調敷之若腫而痛甚者加冰片少許更妙若濕瘡膿水甚者加密陀僧等分或煅過宮粉亦可或煅制爐甘石更佳完瘡散見新方八陣因陣治濕爛諸瘡肉平不斂及諸瘡毒內肉既平而口不收者皆宜用此最妙滑石飛一兩赤石脂飛五錢粉甘草三錢上為末干滲或用麻油調敷或加枯礬一錢癢者極宜蛇蛻散治婦人陰瘡先以荊芥蛇床子熏洗挹干敷藥蛇蛻一條燒存性枯礬黃丹萹蓄藁本各一兩硫黃荊芥穗蛇床子各五錢上為細末香油調搽濕則乾摻陰癢婦人陰癢者必有陰蟲微則癢甚則痛或為膿水淋瀝多由濕熱所化名曰䘌內宜清肝火以龍膽瀉肝湯及加味逍遙散主之外宜桃仁研膏和雄黃末或同雞肝納陰中以制其蟲然無如銀硃煙搽雞肝以納之尤妙銀硃煙見新方八陣因陣治頭髮生蝨及諸瘡之有蟲者用銀硃四五分揩擦厚紙上點著置一干碗中上用一濕碗露縫覆之其煙皆著於濕碗之上乃用指揩擦發中覆以氈絹則蟣蝨皆盡矣此煙以棗肉和捻作餅或作丸或擦於豬雞熟肝之間用貼諸瘡癬之有蟲者及蟲蝕肛門者以綿裹棗丸納肛門中一宿無不神效須留綿帶在外以便出之椒茱湯治婦人陰癢不可忍惟以熱湯泡洗有不能住手者花椒吳茱萸蛇床子各一兩藜蘆半兩陳茶一撮炒鹽二兩以水五升煎湯乘熱熏洗杏仁膏治婦人陰癢不可忍杏仁燒存性麝香少許上為末用舊帛裹之縛定火上炙熱納陰中椿根皮湯治陰癢突出臭椿皮荊芥穗藿香等分上剉煎湯熏洗即癢止而入一方治疳蟲下蝕下部用蒲黃水銀研勻傅入注意水銀量多入血可中毒致死外以鶴蝨草煎湯熏洗炙肝散治婦人陰癢蟲蝕用牛肝或豬肝切三寸長大如錢炙熟納陰中引蟲出盡即愈一方治陰中蟲癢搗桃葉綿裹納陰中日易三四次一方治陰癢同蛇床子一兩白礬五錢煎湯淋洗陰冷婦人陰冷有寒證有熱證寒由陽虛真寒證也熱由濕熱假寒證也假寒者必有熱證如小便澀數黃赤大便燥結煩渴之類是也真寒者小便清利陽虛畏寒者是也真寒者宜補其陽如理陰煎十補丸加減續嗣降生丹假寒者當清其火宜龍膽瀉肝湯加味逍遙散肝腎虛寒者宜暖肝煎鎮陰煎大營煎脾胃虛寒者宜理中湯理陰煎壽脾煎之類主之理陰煎見血寒經遲十補丸見經不調續嗣降生丹見宜麟策龍膽瀉肝湯見產門不閉加味逍遙散見經不調暖肝煎見血癥鎮陰煎見新方八陣熱陣治陰虛於下格陽於上則真陽失守血隨而溢以致大吐大衄六脈細脫手足厥冷危在頃刻而血不能止者速宜用此使孤陽有歸則血自安也如治格陽喉痹上熱者當以此方冷服熟地一二兩牛膝二錢炙甘草一錢澤瀉一錢半肉桂一二錢製附子五七分或一二三錢水二鍾速煎服如兼嘔惡者加乾薑炒黃一二錢如氣脫倦言而脈弱極者宜速速多加人參隨宜用之大營煎見血熱經早理中湯見血虛經亂壽脾煎見血虛經亂交接出血而痛凡婦人交接即出血者多由陰氣薄弱腎元不固或陰分有火而然若脾虛氣陷不能攝血者宜補中益氣湯或補陰益氣煎若脾腎虛弱陰氣不固者宜壽脾煎歸脾湯若肝腎陰虛不守者宜固陰煎若陰火動血者宜保陰煎補中益氣湯見經不調補陰益氣煎見熱入血室壽脾煎見血虛經亂歸脾湯見經不調固陰煎見腎虛經亂保陰煎見血熱經早附類經圖翼針灸要覽血結月事不調氣海中極照海月事不行血崩不止膈俞肝俞腎俞命門氣海中極下元虛冷血崩白濁間使血海復溜行間淋帶赤白命門神闕中極七壯治白帶極效余用前五淋穴癥瘕三焦俞腎俞中極會陰子宮子戶左子宮右子戶在關元旁各開三寸千金翼以三寸為氣門穴詳奇俞類不孕命門腎俞氣海中極關元七壯至百壯或三百壯胞門子戶二穴詳奇俞類陰廉然谷照海子宮冷一法灸神闕穴先以淨干鹽填臍中灸七壯後去鹽換川椒二十一粒上以薑片蓋定又灸十四壯灸畢即用膏貼之艾炷須如指大長五六分許胎屢墮命門腎俞中極交信然谷產難橫生合谷三陰交一治橫逆難產危在頃刻符藥不靈者急於本婦右腳小指尖灸三壯炷如小麥下火立產如神蓋此即至陰穴也子鞠不能下巨闕合谷三陰交至陰三稜針出血橫者即轉直胎衣不下三陰交崑崙下死胎合谷刺補之即下欲取胎肩井合谷三陰交產後惡露不止中極欲絕產臍下二寸三分灸三壯或至七七壯即終身絕孕
